vm:
  fixes:
  - summary: Требуется действие по обновлению прошивки на виртуальных машинах с подключенным
      USB-устройством.
    pull_request: https://github.com/deckhouse/virtualization/pull/2166
    impact: 'Требуется действие по обновлению прошивки на виртуальных машинах с подключенным
      USB-устройством (в статусе ВМ появится соответствующее приглашение на миграцию):

      - либо отключите USB-устройство и выполните миграцию виртуальной машины;

      - или перезагрузите виртуальную машину.


      Пока действие не будет выполнено, виртуальная машина будет продолжать работать,
      но ее нельзя будет перенести.

      После выполнения действия виртуальная машина обновится до текущей версии прошивки
      и снова будет готова к миграции.'
