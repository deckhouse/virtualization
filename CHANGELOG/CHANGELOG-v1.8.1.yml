cdi:
  fixes:
    - summary: >-
        Rename kubevirt_cdi_* metrics to d8_internal_virtualization_kubevirt_cdi_* via
        metricRelabelings
      pull_request: https://github.com/deckhouse/virtualization/pull/2289
module:
  fixes:
    - summary: >-
        Added missing RBAC permissions for virtualization resources, including virtual machine MAC
        addresses, snapshot operations, and node USB devices.
      pull_request: https://github.com/deckhouse/virtualization/pull/2276
vd:
  fixes:
    - summary: >-
        Fixed a potential issue where a virtual disk could get stuck in the Provisioning state when
        using a storage class with the WaitForFirstConsumer mode.
      pull_request: https://github.com/deckhouse/virtualization/pull/2292

