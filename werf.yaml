project: virtualization
configVersion: 1
build:
  imageSpec:
    author: "Deckhouse <contact@deckhouse.io>"
    clearHistory: true
    config:
      keepEssentialWerfLabels: true
      removeLabels:
        - /.*/
---
# Base Images
{{- include "parse_base_images_map" . }}
---
# Base image for VEX attestations (cosign attest --type openvex).
# Consumed by the "vex mitigation" template in .werf/defines/vex.tmpl.
# Defined here (not in .werf/*.yaml) so its tools/* imports are discovered
# by parse_base_images_map, which scans only werf.yaml and images/*/werf.inc.yaml.
image: base/vex
fromImage: tools/coreutils
final: false
import:
- image: builder/alpine
  add: /etc/ssl/certs/ca-certificates.crt
  to: /etc/ssl/certs/ca-certificates.crt
  before: install
- image: tools/cosign
  add: /usr/bin/cosign
  to: /usr/bin/cosign
  before: install
- image: tools/jq
  add: /usr/bin/jq
  to: /usr/bin/jq
  before: install
- image: tools/curl
  add: /usr/bin/curl-static
  to: /usr/bin/curl
  before: install
- image: tools/bash
  add: /usr/bin/bash
  to: /bin/bash
  before: install
---

# Source repo settings
{{- $_ := set . "SOURCE_REPO" (env "SOURCE_REPO" "https://github.com") }}

{{- $_ := set . "DECKHOUSE_PRIVATE_REPO" (env "DECKHOUSE_PRIVATE_REPO" "example.com") }}

# Define packages proxy settings
{{- $_ := set . "DistroPackagesProxy" (env "DISTRO_PACKAGES_PROXY" "") }}

# Delve debag
{{- $_ := set . "DEBUG_COMPONENT" (env "DEBUG_COMPONENT" "") }}

# svace analyze toggler
{{- $_ := set . "SVACE_ENABLED" (env "SVACE_ENABLED" "false") }}
{{- $_ := set . "SVACE_ANALYZE_HOST" (env "SVACE_ANALYZE_HOST" "example.host") }}
{{- $_ := set . "SVACE_ANALYZE_SSH_USER" (env "SVACE_ANALYZE_SSH_USER" "user") }}

{{- $_ := set . "ImagesIDList" list }}


{{- range $path, $content := .Files.Glob ".werf/*.yaml" }}
  {{- tpl $content $ }}
{{- end }}

---
image: images-digests
fromImage: builder/alpine
dependencies:
  {{- range $ImageID := $.ImagesIDList }}
  {{- $ImageName := $ImageID | splitList "/" | last }}
  {{- $ImageNameCamel  := $ImageID | splitList "/" | last  | camelcase | untitle }}
  {{- if eq $ImageName (trimSuffix "-vex-artifact" $ImageName) }}
- image: {{ $ImageID }}
  before: setup
  imports:
    - type: ImageDigest
      targetEnv: MODULE_IMAGE_DIGEST_{{ $ImageNameCamel }}
  {{- end }}
  {{- end }}
import:
- from: tools/jq
  add: /usr/bin/jq
  to: /usr/bin/jq
  before: setup
shell:
  setup:
    - |
      env | grep MODULE_IMAGE_DIGEST | jq -Rn '
        reduce inputs as $i (
          {};
          . * (
            $i | ltrimstr("MODULE_IMAGE_DIGEST_") | sub("=";"_") |
            split("_") as [$imageName, $digest] |
            {($imageName): $digest}
          )
        )
      ' > /images_digests.json
      cat images_digests.json
{{-  if .DEBUG_COMPONENT }}
    - |
      cat <<EOF>> /delve.yaml
      debug:
        component: "{{ .DEBUG_COMPONENT }}"
      EOF
{{-  end }}
---
image: bundle
fromImage: builder/scratch
import:
- image: prepare-bundle
  add: /prep-bundle
  to: /
  after: setup

---
image: prepare-bundle
fromImage: builder/alpine
import:
- image: images-digests
  add: /
  to: /prep-bundle
  after: setup
  includePaths:
    - images_digests.json
  {{-  if .DEBUG_COMPONENT }}
    - delve.yaml
  {{-  end }}
- image: go-hooks-artifact
  add: /go-hooks
  to: /prep-bundle/hooks/go
  after: setup
git:
  - add: /
    to: /prep-bundle
    stageDependencies:
      install:
      - '**/*'
    includePaths:
      - charts
      - crds
      - build/components
      - docs
      - openapi
      - monitoring
      - templates
      - Chart.yaml
      - module.yaml
      - .helmignore
    excludePaths:
      - build/components/README.md
      - docs/images/*.drawio
      - docs/images/*.sh
      - docs/internal
      - openapi/openapi-case-tests.yaml
    {{- if eq .MODULE_EDITION "CE" }}
      - templates/virtualization-audit
      - templates/virtualization-dra
    {{- end }}
shell:
  install:
    - ls -la /prep-bundle
---
image: release-channel-version
fromImage: builder/scratch
import:
- image: prepare-bundle
  add: /prep-bundle
  to: /
  after: install
  includePaths:
    - module.yaml
shell:
  install:
    - echo  '{"version":"{{ env "MODULES_MODULE_TAG" "dev" }}"}' > version.json

# VEX attestation for the module (bundle) image. Covers GO-2026-5932
# (golang.org/x/crypto/openpgp) carried by the hooks/go/virtualization-module-hooks
# binary. Predicate lives in the repo-root known_vulnerabilities.vex.
{{- include "vex mitigation" (list . "bundle") }}
