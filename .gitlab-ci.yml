# Root .gitlab-ci.yml for the deckhouse/virtualization module.
#
# This file is intentionally a thin include-only entrypoint that pulls in the
# real pipeline definition from .gitlab/ci/**. It exists so the GitLab CI
# parser finds a valid top-level document at the repository root, while the
# actual stages, variables, defaults, and jobs live in well-scoped files.
#
# All stages, jobs, and helper templates are loaded through
# .gitlab/ci/includes.yml (see that file for the full include list).
#
# Upstream templates are sourced from deckhouse/3p/deckhouse/modules-gitlab-ci
# at ref v13.0 (HEAD 006d51c35904b434eca2045a449aafb5e37a8827). Swap the
# branch ref for a pinned SHA after the first green pipeline on virt-test.

include:
  - local: '.gitlab/ci/includes.yml'
