giterminismConfigVersion: 1
config:
  goTemplateRendering:  # The rules for the Go-template functions
    allowEnvVariables:
    - /CI_.+/
    - GOPROXY
    - MODULES_MODULE_TAG
    - SOURCE_REPO
    - DECKHOUSE_PRIVATE_REPO
    - MODULE_EDITION
    - DISTRO_PACKAGES_PROXY
    - SVACE_ENABLED
    - SVACE_ANALYZE_HOST
    - SVACE_ANALYZE_SSH_USER
    - DEBUG_COMPONENT
    - ACTIONS_ID_TOKEN_REQUEST_TOKEN
    - VAULT_KEY
    - WERF_SIGN_KEY
  stapel:
    mount:
      allowBuildDir: true
      allowFromPaths:
      - ~/go-pkg-cache
  secrets:
    allowValueIds:
    - SOURCE_REPO
    - DECKHOUSE_PRIVATE_REPO
    - GOPROXY
    - DISTRO_PACKAGES_PROXY
    - CI_JOB_TOKEN
    allowEnvVariables:
      - REGISTRY_USER
      - REGISTRY_PASSWORD
      - VAULT_ADDR
      - WERF_SIGN_KEY
      - WERF_VAULT_AUTH_ROLE
      - WERF_VAULT_AUTH_JWT
      - TRANSIT_SECRET_ENGINE_PATH
      - ACTIONS_ID_TOKEN_REQUEST_TOKEN
      - ACTIONS_ID_TOKEN_REQUEST_URL
helm:
  allowUncommittedFiles:
  - "Chart.lock"
  - "charts/*.tgz"
