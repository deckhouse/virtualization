{{ if eq .Values.storageType "nfs" }}
---
apiVersion: v1
kind: Service
metadata:
  name: nfs-server
  namespace: {{ .Values.namespace }}
  labels:
    app: nfs
spec:
  type: ClusterIP
  selector:
    app: nfs-server
  ports:
    - name: tcp-2049
      port: 2049
      protocol: TCP
    - name: udp-111
      port: 111
      protocol: UDP
{{ end }}