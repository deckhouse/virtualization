{{ if eq .Values.storageType "nfs" }}
---
apiVersion: virtualization.deckhouse.io/v1alpha2
kind: VirtualDisk
metadata:
  labels:
    app: nfs
  name: nfs-vd-data
  namespace: {{ .Values.namespace }}
spec:
  persistentVolumeClaim:
    size: 150G
    {{- if .Values.storageClass }}
    storageClassName: {{ .Values.storageClass }}
    {{- end }}
---
apiVersion: virtualization.deckhouse.io/v1alpha2
kind: VirtualDisk
metadata:
  labels:
    app: nfs
  name: nfs-vd-root
  namespace: {{ .Values.namespace }}
spec:
  dataSource:
    containerImage:
      image: fl64/alpine-3-21-uefi-base:latest
    type: ContainerImage
  persistentVolumeClaim:
    size: 1Gi
    {{- if .Values.storageClass }}
    storageClassName: {{ .Values.storageClass }}
    {{- end }}
---
apiVersion: virtualization.deckhouse.io/v1alpha2
kind: VirtualMachine
metadata:
  labels:
    app: nfs
    vm: vm
  name: nfs-vm
  namespace: {{ .Values.namespace }}
spec:
  blockDeviceRefs:
  - kind: VirtualDisk
    name: nfs-vd-root
  - kind: VirtualDisk
    name: nfs-vd-data
  bootloader: EFI
  cpu:
    coreFraction: 50%
    cores: 1
  disruptions:
    restartApprovalMode: Automatic
  memory:
    size: 512Mi
  provisioning:
    type: UserData
    userData: |
{{ include "cloudinit.alpine" . | indent 6 }}
  runPolicy: AlwaysOn
  virtualMachineClassName: {{ include "infra.vmclass-name" . }}
{{ end }}
