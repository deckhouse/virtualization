---
apiVersion: deckhouse.io/v1alpha1
kind: ModuleConfig
metadata:
  name: csi-nfs
spec:
  enabled: true
  source: deckhouse
  version: 1
---
apiVersion: deckhouse.io/v1alpha2
kind: ModulePullOverride
metadata:
  name: csi-nfs
spec:
  imageTag: main
  scanInterval: 10m
---
apiVersion: deckhouse.io/v1alpha1
kind: ModuleConfig
metadata:
  name: snapshot-controller
spec:
  enabled: true
  version: 1
---
apiVersion: storage.deckhouse.io/v1alpha1
kind: NFSStorageClass
metadata:
  name: nfs
spec:
  connection:
    host: nfs-server.${NAMESPACE}.svc.cluster.local
    share: /
    nfsVersion: "4.1"
  mountOptions:
    mountMode: hard
    timeout: 60
    retransmissions: 3
  reclaimPolicy: Delete
  volumeBindingMode: Immediate
---
apiVersion: storage.deckhouse.io/v1alpha1
kind: NFSStorageClass
metadata:
  name: nfs-2
spec:
  connection:
    host: nfs-server.${NAMESPACE}.svc.cluster.local
    share: /
    nfsVersion: "4.1"
  mountOptions:
    mountMode: hard
    timeout: 60
    retransmissions: 3
  reclaimPolicy: Delete
  volumeBindingMode: Immediate

