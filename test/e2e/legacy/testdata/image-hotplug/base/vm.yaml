apiVersion: virtualization.deckhouse.io/v1alpha2
kind: VirtualMachine
metadata:
  name: vm
spec:
  bootloader: BIOS
  # The VM is created stopped: the test first waits for the PVC-backed image
  # to provision, then pins the VM to the image's node and starts it (a
  # node-local volume can be hotplugged only on its own node).
  runPolicy: AlwaysOff
  virtualMachineClassName: generic
  cpu:
    cores: 1
    coreFraction: 50%
  memory:
    size: 256Mi
  disruptions:
    restartApprovalMode: Manual
  provisioning:
    type: UserDataRef
    userDataRef:
      kind: Secret
      name: cloud-init
  blockDeviceRefs:
    - kind: VirtualDisk
      name: vd-root
