apiVersion: virtualization.deckhouse.io/v1alpha2
kind: VirtualMachine
metadata:
  name: vm
spec:
  bootloader: EFI
  virtualMachineClassName: generic
  cpu:
    cores: 4
    coreFraction: 100%
  memory:
    size: 4Gi
  disruptions:
    restartApprovalMode: Manual
  provisioning:
    type: UserDataRef
    userDataRef:
      kind: Secret
      name: cloud-init
  blockDeviceRefs:
    - kind: VirtualDisk
      name: vd-root
    - kind: VirtualDisk
      name: vd-blank
