# ════════════════════════════════════════════════════════════════════
# PodSecurityEventShipper
# ════════════════════════════════════════════════════════════════════
---
apiVersion: security.deckhouse.io/v1alpha1
kind: PodSecurityEventShipper
metadata:
  name: virtualization-audit
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "1"
    helm.sh/hook-delete-policy: before-hook-creation
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
  namespace: d8-{{ .Chart.Name }}
spec:
  - source: virtualization-audit
    input:
      type: KubernetesPods
      kubernetesPods:
        labelSelector:
          matchLabels:
            app: virtualization-audit
    parser:
      - name: virtualization-audit
        parser:
          type: JSON
        drop_raw: false
    producesDefaults:
      transform:
        - key: timestamp
          value: datetime
        - key: actor.id
          value: request_subject
        - key: metadata.extra.auditID
          value: uid
        - key: metadata.extra.auditLevel
          value: level
        - key: metadata.extra.auditType
          value: type
        - key: metadata.extra.auditName
          value: name
        - key: metadata.extra.operationResult
          value: operation_result
      enrich:
        - target: source.component
          source: Static
          value: virtualization-audit
        - target: object.type
          source: Static
          value: VirtualMachine
        - target: actor.type
          source: Static
          value: User
    produces:
      # ── Module control events ──────────────────────────────────────────
      - eventCode: VIRT_MODULE_CREATED
        extract:
          field: message
          operator: Regex
          values:
            - '.*"type":"Module control".*has been created by.*'
        transform:
          - key: object.name
            value: component
          - key: object.type
            value: component
          - key: metadata.extra.component
            value: component
          - key: metadata.extra.actionType
            value: action_type
          - key: metadata.extra.virtualizationVersion
            value: virtualization_version
          - key: metadata.extra.virtualizationName
            value: virtualization_name

      - eventCode: VIRT_MODULE_UPDATED
        extract:
          field: message
          operator: Regex
          values:
            - '.*"type":"Module control".*has been updated by.*'
        transform:
          - key: object.name
            value: component
          - key: object.type
            value: component
          - key: metadata.extra.component
            value: component
          - key: metadata.extra.actionType
            value: action_type
          - key: metadata.extra.virtualizationVersion
            value: virtualization_version
          - key: metadata.extra.virtualizationName
            value: virtualization_name

      - eventCode: VIRT_MODULE_DELETED
        extract:
          field: message
          operator: Regex
          values:
            - '.*"type":"Module control".*has been deleted by.*'
        transform:
          - key: object.name
            value: component
          - key: object.type
            value: component
          - key: metadata.extra.component
            value: component
          - key: metadata.extra.actionType
            value: action_type
          - key: metadata.extra.virtualizationVersion
            value: virtualization_version
          - key: metadata.extra.virtualizationName
            value: virtualization_name

      - eventCode: VIRT_MODULE_DISABLED
        extract:
          field: message
          operator: Regex
          values:
            - '.*"type":"Module control".*has been disabled by.*'
        transform:
          - key: object.name
            value: component
          - key: object.type
            value: component
          - key: metadata.extra.component
            value: component
          - key: metadata.extra.actionType
            value: action_type
          - key: metadata.extra.virtualizationVersion
            value: virtualization_version
          - key: metadata.extra.virtualizationName
            value: virtualization_name

      # ── Virtualization control events (component pod create/delete) ────
      - eventCode: VIRT_COMPONENT_CREATED
        extract:
          field: message
          operator: Regex
          values:
            - '.*"type":"Virtualization control".*has been created by.*'
        transform:
          - key: object.name
            value: component
          - key: object.type
            value: component
          - key: metadata.extra.component
            value: component
          - key: metadata.extra.actionType
            value: action_type
          - key: metadata.extra.nodeNetworkAddress
            value: node_network_address
          - key: metadata.extra.virtualizationVersion
            value: virtualization_version
          - key: metadata.extra.virtualizationName
            value: virtualization_name
          - key: metadata.extra.qemuVersion
            value: qemu_version
          - key: metadata.extra.libvirtVersion
            value: libvirt_version

      - eventCode: VIRT_COMPONENT_DELETED
        extract:
          field: message
          operator: Regex
          values:
            - '.*"type":"Virtualization control".*has been deleted by.*'
        transform:
          - key: object.name
            value: component
          - key: object.type
            value: component
          - key: metadata.extra.component
            value: component
          - key: metadata.extra.actionType
            value: action_type
          - key: metadata.extra.nodeNetworkAddress
            value: node_network_address
          - key: metadata.extra.virtualizationVersion
            value: virtualization_version
          - key: metadata.extra.virtualizationName
            value: virtualization_name
          - key: metadata.extra.qemuVersion
            value: qemu_version
          - key: metadata.extra.libvirtVersion
            value: libvirt_version

      # ── Control VM: abnormal / OS-initiated lifecycle events ───────────
      - eventCode: VIRT_VM_STOPPED_FROM_OS
        extract:
          field: message
          operator: Regex
          values:
            - '.*"type":"Control VM".*has been stopped from OS.*'
        transform:
          - key: object.uid
            value: virtualmachine_uid
          - key: metadata.extra.actionType
            value: action_type
          - key: metadata.extra.virtualmachineUID
            value: virtualmachine_uid
          - key: metadata.extra.virtualmachineOS
            value: virtualmachine_os
          - key: metadata.extra.storageClasses
            value: storageclasses
          - key: metadata.extra.nodeNetworkAddress
            value: node_network_address
          - key: metadata.extra.qemuVersion
            value: qemu_version
          - key: metadata.extra.libvirtVersion
            value: libvirt_version

      - eventCode: VIRT_VM_RESTARTED_FROM_OS
        extract:
          field: message
          operator: Regex
          values:
            - '.*"type":"Control VM".*has been restarted from OS.*'
        transform:
          - key: object.uid
            value: virtualmachine_uid
          - key: metadata.extra.actionType
            value: action_type
          - key: metadata.extra.virtualmachineUID
            value: virtualmachine_uid
          - key: metadata.extra.virtualmachineOS
            value: virtualmachine_os
          - key: metadata.extra.storageClasses
            value: storageclasses
          - key: metadata.extra.nodeNetworkAddress
            value: node_network_address
          - key: metadata.extra.qemuVersion
            value: qemu_version
          - key: metadata.extra.libvirtVersion
            value: libvirt_version

      - eventCode: VIRT_VM_KILLED_ABNORMAL
        extract:
          field: message
          operator: Regex
          values:
            - '.*"type":"Control VM".*has been killed abnormal way by.*'
        transform:
          - key: object.uid
            value: virtualmachine_uid
          - key: metadata.extra.actionType
            value: action_type
          - key: metadata.extra.virtualmachineUID
            value: virtualmachine_uid
          - key: metadata.extra.virtualmachineOS
            value: virtualmachine_os
          - key: metadata.extra.storageClasses
            value: storageclasses
          - key: metadata.extra.nodeNetworkAddress
            value: node_network_address
          - key: metadata.extra.qemuVersion
            value: qemu_version
          - key: metadata.extra.libvirtVersion
            value: libvirt_version

      # ── Control VM: VMOP lifecycle events (start/stop/restart/migrate/evict) ──
      - eventCode: VIRT_VM_STARTED
        extract:
          field: message
          operator: Regex
          values:
            - '.*"type":"Control VM".*has been started by.*'
        transform:
          - key: object.uid
            value: virtualmachine_uid
          - key: metadata.extra.actionType
            value: action_type
          - key: metadata.extra.virtualmachineUID
            value: virtualmachine_uid
          - key: metadata.extra.virtualmachineOS
            value: virtualmachine_os
          - key: metadata.extra.storageClasses
            value: storageclasses
          - key: metadata.extra.nodeNetworkAddress
            value: node_network_address
          - key: metadata.extra.qemuVersion
            value: qemu_version
          - key: metadata.extra.libvirtVersion
            value: libvirt_version

      - eventCode: VIRT_VM_STOPPED
        extract:
          field: message
          operator: Regex
          # has been stopped by — does NOT match has been stopped from OS
          values:
            - '.*"type":"Control VM".*has been stopped by.*'
        transform:
          - key: object.uid
            value: virtualmachine_uid
          - key: metadata.extra.actionType
            value: action_type
          - key: metadata.extra.virtualmachineUID
            value: virtualmachine_uid
          - key: metadata.extra.virtualmachineOS
            value: virtualmachine_os
          - key: metadata.extra.storageClasses
            value: storageclasses
          - key: metadata.extra.nodeNetworkAddress
            value: node_network_address
          - key: metadata.extra.qemuVersion
            value: qemu_version
          - key: metadata.extra.libvirtVersion
            value: libvirt_version

      - eventCode: VIRT_VM_RESTARTED
        extract:
          field: message
          operator: Regex
          # has been restarted by — does NOT match has been restarted from OS
          values:
            - '.*"type":"Control VM".*has been restarted by.*'
        transform:
          - key: object.uid
            value: virtualmachine_uid
          - key: metadata.extra.actionType
            value: action_type
          - key: metadata.extra.virtualmachineUID
            value: virtualmachine_uid
          - key: metadata.extra.virtualmachineOS
            value: virtualmachine_os
          - key: metadata.extra.storageClasses
            value: storageclasses
          - key: metadata.extra.nodeNetworkAddress
            value: node_network_address
          - key: metadata.extra.qemuVersion
            value: qemu_version
          - key: metadata.extra.libvirtVersion
            value: libvirt_version

      - eventCode: VIRT_VM_MIGRATED
        extract:
          field: message
          operator: Regex
          values:
            - '.*"type":"Control VM".*has been migrated by.*'
        transform:
          - key: object.uid
            value: virtualmachine_uid
          - key: metadata.extra.actionType
            value: action_type
          - key: metadata.extra.virtualmachineUID
            value: virtualmachine_uid
          - key: metadata.extra.virtualmachineOS
            value: virtualmachine_os
          - key: metadata.extra.storageClasses
            value: storageclasses
          - key: metadata.extra.nodeNetworkAddress
            value: node_network_address
          - key: metadata.extra.qemuVersion
            value: qemu_version
          - key: metadata.extra.libvirtVersion
            value: libvirt_version

      - eventCode: VIRT_VM_EVICTED
        extract:
          field: message
          operator: Regex
          values:
            - '.*"type":"Control VM".*has been evicted by.*'
        transform:
          - key: object.uid
            value: virtualmachine_uid
          - key: metadata.extra.actionType
            value: action_type
          - key: metadata.extra.virtualmachineUID
            value: virtualmachine_uid
          - key: metadata.extra.virtualmachineOS
            value: virtualmachine_os
          - key: metadata.extra.storageClasses
            value: storageclasses
          - key: metadata.extra.nodeNetworkAddress
            value: node_network_address
          - key: metadata.extra.qemuVersion
            value: qemu_version
          - key: metadata.extra.libvirtVersion
            value: libvirt_version

      # ── Access to VM: console / VNC / portforward ──────────────────────
      - eventCode: VIRT_VM_ACCESS_CONSOLE
        extract:
          field: message
          operator: Regex
          values:
            - '.*"type":"Access to VM".*via console by.*'
        transform:
          - key: object.uid
            value: virtualmachine_uid
          - key: metadata.extra.actionType
            value: action_type
          - key: metadata.extra.virtualmachineUID
            value: virtualmachine_uid
          - key: metadata.extra.virtualmachineOS
            value: virtualmachine_os
          - key: metadata.extra.storageClasses
            value: storageclasses
          - key: metadata.extra.nodeNetworkAddress
            value: node_network_address
          - key: metadata.extra.qemuVersion
            value: qemu_version
          - key: metadata.extra.libvirtVersion
            value: libvirt_version

      - eventCode: VIRT_VM_ACCESS_VNC
        extract:
          field: message
          operator: Regex
          values:
            - '.*"type":"Access to VM".*via vnc by.*'
        transform:
          - key: object.uid
