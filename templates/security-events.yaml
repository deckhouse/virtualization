          - key: metadata.extra.storageClasses
            value: storageclasses
          - key: metadata.extra.nodeNetworkAddress
            value: node_network_address
          - key: metadata.extra.qemuVersion
            value: qemu_version
          - key: metadata.extra.libvirtVersion
            value: libvirt_version

      - eventCode: VIRT_VM_UPDATED
        extract:
          field: message
          operator: Regex
          values:
            - '.*"type":"Manage VM".*has been updated by.*'
        transform:
          - key: object.uid
            value: virtualmachine_uid
          - key: metadata.extra.actionType
            value: action_type
          - key: metadata.extra.virtualmachineUID
            value: virtualmachine_uid
          - key: metadata.extra.virtualmachineOS
            value: virtualmachine_os
          - key: metadata.extra.storageClasses
            value: storageclasses
          - key: metadata.extra.nodeNetworkAddress
            value: node_network_address
          - key: metadata.extra.qemuVersion
            value: qemu_version
          - key: metadata.extra.libvirtVersion
            value: libvirt_version

      - eventCode: VIRT_VM_DELETED
        extract:
          field: message
          operator: Regex
          values:
            - '.*"type":"Manage VM".*has been deleted by.*'
        transform:
          - key: object.uid
            value: virtualmachine_uid
          - key: metadata.extra.actionType
            value: action_type
          - key: metadata.extra.virtualmachineUID
            value: virtualmachine_uid
          - key: metadata.extra.virtualmachineOS
            value: virtualmachine_os
          - key: metadata.extra.storageClasses
            value: storageclasses
          - key: metadata.extra.nodeNetworkAddress
            value: node_network_address
          - key: metadata.extra.qemuVersion
            value: qemu_version
          - key: metadata.extra.libvirtVersion
            value: libvirt_version

      # ── Integrity check: VM configuration integrity violation ──────────
      - eventCode: VIRT_VM_INTEGRITY_CHECK_FAILED
        extract:
          field: message
          operator: Regex
          values:
            - '.*"type":"Integrity check".*config integrity check failed.*'
        transform:
          - key: metadata.extra.virtualMachineName
            value: virtual_machine_name
          - key: metadata.extra.objectType
            value: object_type
          - key: metadata.extra.controlMethod
            value: control_method
          - key: metadata.extra.reactionType
            value: reaction_type
          - key: metadata.extra.integrityCheckAlgo
            value: integrity_check_algo
          - key: metadata.extra.referenceChecksum
            value: reference_checksum
          - key: metadata.extra.currentChecksum
            value: current_checksum

      # ── Forbidden operation: user attempted a denied action ────────────
      - eventCode: VIRT_FORBIDDEN_OPERATION
        extract:
          field: message
          operator: Regex
          values:
            - '.*"type":"Forbidden operation".*'
        transform:
          - key: metadata.extra.isAdmin
            value: is_admin
          - key: metadata.extra.sourceIP
            value: source_ip
          - key: metadata.extra.forbidReason
            value: forbid_reason
          - key: metadata.extra.actionType
            value: action_type

{{- end }}
