---
# NOTE:
# SecurityEventDefinitions and PodSecurityEventShipper for the virtualization-audit image.
#
# The virtualization-audit binary (built from images/virtualization-artifact/pkg/audit)
# writes structured JSON security events to stdout via fmt.Println.
# Each log line is a self-contained JSON object with a "type" field identifying
# the event category and a "name" field containing a human-readable description.
#
# Event types emitted by the audit image:
#   1. "Module control"         — module created/updated/deleted/disabled
#   2. "Virtualization control" — component (pod) created/deleted in d8-virtualization
#   3. "Control VM"             — VM lifecycle: stopped/restarted from OS, killed abnormally,
#                                  started/stopped/restarted/migrated/evicted via VMOP
#   4. "Access to VM"           — console/VNC/portforward connection initiated/finished
#   5. "Manage VM"              — VM created/updated/deleted via API
#   6. "Integrity check"        — VM configuration integrity check failed
#   7. "Forbidden operation"    — user attempted a forbidden operation
{{- if .Values.global.discovery.apiVersions | has "security.deckhouse.io/v1alpha1/SecurityEventDefinition" }}

# ════════════════════════════════════════════════════════════════════
# SecurityEventDefinition resources
# ════════════════════════════════════════════════════════════════════

