{{- $nodeSelectorSystem := index (include "helm_lib_node_selector" (tuple . "system") | fromYaml) "nodeSelector" | default (dict) | toJson }}
{{- $nodeSelectorMaster := index (include "helm_lib_node_selector" (tuple . "master") | fromYaml) "nodeSelector" | default (dict) | toJson }}
{{- $tolerationsSystem := index (include "helm_lib_tolerations" (tuple . "system") | fromYaml) "tolerations" | default (list) | toJson }}
{{- $tolerationsAnyNode := index (include "helm_lib_tolerations" (tuple . "any-node") | fromYaml) "tolerations" | default (list) | toJson }}
{{- $priorityClassName := include "priorityClassName" . | quote }}
{{ $_ := set . "Firmware" dict }}
{{- $versions_ctx := (.Files.Get "build/components/versions.yml" | fromYaml) }}
{{- range $k, $v := $versions_ctx.firmware }}
  {{- $_ := set $.Firmware $k $v}}
{{- end }}
{{- $dvpNestingLevel := dig "discovery" "dvpNestingLevel" 0 .Values.global | int }}
{{- $logVerbosity := include "kubevirt.logVerbosity" (include "moduleLogLevel" .) | int }}
{{ $delve := (include "delve" . | fromYaml) }}
---
apiVersion: internal.virtualization.deckhouse.io/v1
kind: InternalVirtualizationKubeVirt
metadata:
  name: config
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
spec:
  certificateRotateStrategy: {}
  configuration:
    apiConfiguration:
      restClient:
        rateLimiter:
          tokenBucketRateLimiter:
            qps: 5000
            burst: 6000
    selinuxLauncherType: container_kvm_t
    migrations:
      {{- include "kubevirt.migrations" . | nindent 6 }}
    smbios:
      manufacturer: Flant
      family: Deckhouse
      product: DeckhouseVirtualizationPlatform
      {{- if ge $dvpNestingLevel 0 }}
      sku: "{{ add1 $dvpNestingLevel }}"
      {{- end }}
    evictionStrategy: LiveMigrate
    vmRolloutStrategy: LiveUpdate
    developerConfiguration:
      logVerbosity:
        virtLauncher: {{ $logVerbosity }}
        virtHandler: {{ $logVerbosity }}
        virtController: {{ $logVerbosity }}
        virtAPI: {{ $logVerbosity }}
        virtOperator: {{ $logVerbosity }}
      featureGates:
      - HotplugVolumes
      - Snapshot
      - ExpandDisks
      - Root
      - CPUManager
      - Sidecar
      - VolumeSnapshotDataSource
      {{/*
      Even though these feature gates are enabled by default in KubeVirt 1.6.2, they still must not be removed from the config:
      - VMLiveUpdateFeatures
      - VolumeMigration
      - VolumesUpdateStrategy

      When rolling from KubeVirt 1.3.1 to KubeVirt 1.6.2, the config is updated first,
      and only after some significant time is the virt-controller updated.
      That is, the old version of virt-controller runs with the new config for a fairly long time.
      It is important for the old version of virt-controller to see these feature gates in the new configuration,
      because its business logic does not yet have their default behavior implemented.
      */}}
      - VMLiveUpdateFeatures
      - VolumeMigration
      - VolumesUpdateStrategy
      - HostDevicesWithDRA
      - HostDevices
      - HotplugHostDevicesWithDRA # custom feature gate - added in our KubeVirt fork, not present in upstream
    virtualMachineOptions:
      disableSerialConsoleLog: {}
  customizeComponents:
    patches:
    # Add node placement settings for virt-api, virt-controller, virt-operator, virt-handler.
    - resourceType: Deployment
      resourceName: virt-api
      patch: '[{"op":"replace","path":"/spec/template/spec/nodeSelector","value":{{ $nodeSelectorMaster }}}]'
      type: json
    - resourceType: Deployment
      resourceName: virt-api
      patch: '[{"op":"replace","path":"/spec/template/spec/tolerations","value":{{ $tolerationsAnyNode }}}]'
      type: json
    - resourceType: Deployment
      resourceName: virt-controller
      patch: '[{"op":"replace","path":"/spec/template/spec/nodeSelector","value":{{ $nodeSelectorSystem }}}]'
      type: json
    - resourceType: Deployment
      resourceName: virt-controller
      patch: '[{"op":"replace","path":"/spec/template/spec/tolerations","value":{{ $tolerationsSystem }}}]'
      type: json
    - resourceType: DaemonSet
      resourceName: virt-handler
      patch: '[{"op":"replace","path":"/spec/template/spec/tolerations","value":{{ $tolerationsAnyNode }}}]'
      type: json
    - resourceType: DaemonSet
      resourceName: virt-handler
      patch: '[{"op":"replace","path":"/spec/template/spec/hostNetwork","value":true}]'
      type: json
    {{- if and $delve (hasKey $delve "debug") }}
    # Debug
      {{- if eq $delve.debug.component "delve/virt-api" }}
    - resourceType: Deployment
      resourceName: virt-api
      patch: {{ include "kubevirt.delve_strategic_patch_json" (list $delve.debug.component) }}
      type: strategic
      {{- end }}
      {{- if eq $delve.debug.component "delve/virt-handler" }}
    - resourceType: DaemonSet
      resourceName: virt-handler
      patch: {{ include "kubevirt.delve_strategic_patch_json" (list $delve.debug.component) }}
      type: strategic
      {{- end }}
      {{- if eq $delve.debug.component "delve/virt-controller" }}
    - resourceType: Deployment
      resourceName: virt-controller
      patch: {{ include "kubevirt.delve_strategic_patch_json" (list $delve.debug.component) }}
      type: strategic
      {{- end }}
    {{- end }}
    # Add node affinity for the lowest virtualization level for virt-handler pods
    - resourceType: DaemonSet
      resourceName: virt-handler
      patch: {{ include "kubevirt.virthandler_nodeaffinity_strategic_patch_json" $dvpNestingLevel }}
      type: strategic
    # Run virt-handler pods on required nodes
    - resourceType: DaemonSet
      resourceName: virt-handler
      patch: {{ include "kubevirt.virthandler_nodeseletor_strategic_patch_json" . }}
      type: strategic

    # Set replicas based on HA settings
    - resourceType: Deployment
      resourceName: virt-api
      patch: '[{"op":"replace","path":"/spec/replicas","value": {{ include "helm_lib_is_ha_to_value" (list . 3 1) }}}]'
      type: json
    - resourceType: Deployment
      resourceName: virt-controller
      patch: '[{"op":"replace","path":"/spec/replicas","value": {{ include "helm_lib_is_ha_to_value" (list . 2 1) }}}]'
      type: json
    {{- if (include "helm_lib_ha_enabled" .) }}
    # HA settings for deploy/virt-api.
    - resourceType: Deployment
      resourceName: virt-api
      patch: {{ include "spec_template_spec_antiaffinity_patch" (list "kubevirt.io" "virt-api") }}
      type: strategic
    - resourceType: Deployment
      resourceName: virt-api
      patch: {{ include "spec_strategy_rolling_update_patch" . }}
      type: strategic
    # HA settings for deploy/virt-controller.
    - resourceType: Deployment
      resourceName: virt-controller
      patch: {{ include "spec_template_spec_antiaffinity_patch" (list "kubevirt.io" "virt-controller") }}
      type: strategic
    - resourceType: Deployment
      resourceName: virt-controller
      patch: {{ include "spec_strategy_rolling_update_patch" . }}
      type: strategic
    {{- end }}

    # Add kube-api-rewriter sidecar containers to virt-controller, virt-api, virt-handler and virt-exportproxy.
    {{- $virtControllerRewriterSettings := dict }}
    {{- $_ := set $virtControllerRewriterSettings "healthzPath" "/healthz" }}
    {{- $_ := set $virtControllerRewriterSettings "readyzPath" "/readyz" }}
    {{- $_ := set $virtControllerRewriterSettings "healthzPort" 9090 }}
    {{- $_ := set $virtControllerRewriterSettings "probeScheme" "HTTP" }}
    {{- $_ := set $virtControllerRewriterSettings "injectPodIP" true }}
    {{- $_ := set $virtControllerRewriterSettings "monitoringBindAddress" "$(POD_IP):9090" }}
    {{- $_ := set $virtControllerRewriterSettings "monitoringAuth" (dict "group" "apps" "version" "v1" "resource" "deployments" "namespace" (printf "d8-%s" .Chart.Name) "name" "virt-controller" "subresource" "prometheus-metrics") }}
    - resourceName: virt-controller
      resourceType: Deployment
      patch: {{ include "kube_api_rewriter.pod_spec_strategic_patch_json" (tuple . "virt-controller" $virtControllerRewriterSettings) }}
      type: strategic

    {{- $virtApiRewriterSettings := dict }}
    {{- $_ := set $virtApiRewriterSettings "WEBHOOK_ADDRESS" "https://127.0.0.1:8443" }}
    {{- $_ := set $virtApiRewriterSettings "WEBHOOK_CERT_FILE" "/etc/virt-api/certificates/tls.crt" }}
    {{- $_ := set $virtApiRewriterSettings "WEBHOOK_KEY_FILE" "/etc/virt-api/certificates/tls.key" }}
    {{- $_ := set $virtApiRewriterSettings "webhookCertsVolumeName" "kubevirt-virt-api-certs" }}
    {{- $_ := set $virtApiRewriterSettings "webhookCertsMountPath" "/etc/virt-api/certificates" }}
    {{- $_ := set $virtApiRewriterSettings "healthzPath" "/healthz" }}
    {{- $_ := set $virtApiRewriterSettings "readyzPath" "/readyz" }}
    {{- $_ := set $virtApiRewriterSettings "healthzPort" 9090 }}
    {{- $_ := set $virtApiRewriterSettings "probeScheme" "HTTP" }}
    {{- $_ := set $virtApiRewriterSettings "injectPodIP" true }}
    {{- $_ := set $virtApiRewriterSettings "monitoringBindAddress" "$(POD_IP):9090" }}
    {{- $_ := set $virtApiRewriterSettings "monitoringAuth" (dict "group" "apps" "version" "v1" "resource" "deployments" "namespace" (printf "d8-%s" .Chart.Name) "name" "virt-api" "subresource" "prometheus-metrics") }}
    - resourceName: virt-api
      resourceType: Deployment
      patch: {{ include "kube_api_rewriter.pod_spec_strategic_patch_json" (tuple . "virt-api" $virtApiRewriterSettings) }}
      type: strategic

    {{- $virtHandlerRewriterSettings := dict }}
    {{- $_ := set $virtHandlerRewriterSettings "injectPodIP" true }}
    {{- $_ := set $virtHandlerRewriterSettings "healthzPath" "/healthz" }}
    {{- $_ := set $virtHandlerRewriterSettings "readyzPath" "/readyz" }}
    {{- $_ := set $virtHandlerRewriterSettings "healthzPort" (include "virt_handler.rewriter_healthz_port" . | int) }}
    {{- $_ := set $virtHandlerRewriterSettings "probeScheme" "HTTP" }}
    {{- $_ := set $virtHandlerRewriterSettings "clientProxyPort" (include "virt_handler.rewriter_proxy_port" . | int) }}
    {{- $_ := set $virtHandlerRewriterSettings "kubeconfigFilename" "virt-handler-kube-api-rewriter.kubeconfig" }}
    {{- $_ := set $virtHandlerRewriterSettings "monitoringBindAddress" (printf "$(POD_IP):%s" (include "virt_handler.rewriter_monitoring_port" .)) }}
    {{- $_ := set $virtHandlerRewriterSettings "pprofBindAddress" (printf "$(POD_IP):%s" (include "virt_handler.rewriter_pprof_port" .)) }}
    {{- $_ := set $virtHandlerRewriterSettings "monitoringAuth" (dict "group" "apps" "version" "v1" "resource" "daemonsets" "namespace" (printf "d8-%s" .Chart.Name) "name" "virt-handler" "subresource" "prometheus-metrics") }}
    - resourceName: virt-handler
      resourceType: DaemonSet
      patch: {{ include "kube_api_rewriter.pod_spec_strategic_patch_json" (list . "virt-handler" $virtHandlerRewriterSettings) }}
      type: strategic

    # Add rewriter proxy container port to Services used by webhook configurations.
    # First need to set name for existing port to make strategic patch works later.
    - resourceName: virt-api
      resourceType: Service
      patch: |
        [{"op":"replace", "path":"/spec/ports/0/name", "value":"https"}]
      type: json
    - resourceName: virt-api
      resourceType: Service
      patch: {{ include "kube_api_rewriter.service_spec_port_patch_json" . }}
      type: strategic
    - resourceName: kubevirt-operator-webhook
      resourceType: Service
      patch: {{ include "kube_api_rewriter.service_spec_port_patch_json" . }}
      type: strategic

    # Change service port in virt-api webhook configuration to point to the rewriter proxy container.
    # Run this command to extract names when update Kubevirt:
    # kubectl get validatingwebhookconfigurations.admissionregistration.k8s.io virt-api-validator -o json | jq '.webhooks[]|.name' -r | sort
    # NOTE virt-api-validator is renamed to virt-internal-virtualization-api-validator.
    {{- define "virt-api-validating-webhook-names" -}}
    kubevirt-crd-status-validator.kubevirt.io
    migration-create-validator.kubevirt.io
    migration-policy-validator.kubevirt.io
    migration-update-validator.kubevirt.io
    virt-launcher-eviction-interceptor.kubevirt.io
    virtualmachineclusterinstancetype-validator.instancetype.kubevirt.io
    virtualmachineclusterpreference-validator.instancetype.kubevirt.io
    virtualmachineexport-validator.export.kubevirt.io
    virtualmachineinstances-create-validator.kubevirt.io
    virtualmachineinstances-update-validator.kubevirt.io
    virtualmachineinstancetype-validator.instancetype.kubevirt.io
    virtualmachinepool-validator.kubevirt.io
    virtualmachinepreference-validator.instancetype.kubevirt.io
    virtualmachinepreset-validator.kubevirt.io
    virtualmachinereplicaset-validator.kubevirt.io
    virtualmachinerestore-validator.snapshot.kubevirt.io
    virtualmachinesnapshot-validator.snapshot.kubevirt.io
    virtualmachine-validator.kubevirt.io
    vm-clone-validator.kubevirt.io
    {{- end -}}
    {{- $virtApiValidatingWebhooks := include "virt-api-validating-webhook-names" . | splitList "\n" }}
    - resourceName: virt-internal-virtualization-api-validator
      resourceType: ValidatingWebhookConfiguration
      patch: {{ include "kube_api_rewriter.webhook_spec_port_patch_json" $virtApiValidatingWebhooks }}
      type: strategic

    # Change service port in virt-api webhook configuration to point to the rewriter proxy container.
    # Run this command to extract names when update Kubevirt:
    # kubectl get mutatingwebhookconfigurations.admissionregistration.k8s.io virt-api-mutator -o json | jq '.webhooks[]|.name' -r
    # NOTE virt-api-mutator is renamed to virt-internal-virtualization-api-mutator.
    {{- define "virt-api-mutating-webhook-names" -}}
    migrations-mutator.kubevirt.io
    virtualmachineclones-mutator.kubevirt.io
    virtualmachineinstances-mutator.kubevirt.io
    virtualmachines-mutator.kubevirt.io
    {{- end -}}
    {{- $virtApiMutatingWebhooks := include "virt-api-mutating-webhook-names" . | splitList "\n" }}
    - resourceName: virt-internal-virtualization-api-mutator
      resourceType: MutatingWebhookConfiguration
      patch: {{ include "kube_api_rewriter.webhook_spec_port_patch_json" $virtApiMutatingWebhooks }}
      type: strategic

    # Change service port in virt-operator webhook configuration to point to the rewriter proxy container.
    # Run this command to extract names when update Kubevirt:
    # kubectl get validatingwebhookconfigurations.admissionregistration.k8s.io virt-internal-virtualization-operator-validator -o json | jq ' .webhooks[]|.name' -r
    # NOTE: original virt-operator-validator is renamed to virt-internal-virtualization-operator-validator.
    {{- define "virt-operator-webhook-names" -}}
    kubevirt-validator.kubevirt.io
    kubevirt-update-validator.kubevirt.io
    kubevirt-create-validator.kubevirt.io
    {{- end -}}
    {{- $virtOperatorWebhooks := include "virt-operator-webhook-names" . | splitList "\n" }}
    - resourceName: virt-internal-virtualization-operator-validator
      resourceType: ValidatingWebhookConfiguration
      patch: {{ include "kube_api_rewriter.webhook_spec_port_patch_json" $virtOperatorWebhooks }}
      type: strategic

    # Set priority class name for components.
    {{- define "pod_spec_priority_class_name_patch" -}}
    '{"spec":{"template":{"spec":{"priorityClassName": {{ . }} }}}}'
    {{- end }}
    - resourceType: Deployment
      resourceName: virt-api
      patch: {{ include "pod_spec_priority_class_name_patch" $priorityClassName }}
      type: strategic
    - resourceType: Deployment
      resourceName: virt-controller
      patch: {{ include "pod_spec_priority_class_name_patch" $priorityClassName }}
      type: strategic
    - resourceType: DaemonSet
      resourceName: virt-handler
      patch: {{ include "pod_spec_priority_class_name_patch" $priorityClassName }}
      type: strategic
    # Patch service to target the main virt-handler port
    - resourceType: Service
      resourceName: kubevirt-prometheus-metrics
      patch: '[{"op": "replace", "path": "/spec/ports/0/targetPort", "value": "virt-handler"}]'
      type: json

# Additional environment variables for virt-controller.
{{ define "virt-controller-additional-envs" }}
env:
# Firmware component versions.
- name: QEMU_VERSION
  value: {{$.Firmware.qemu}}
- name: LIBVIRT_VERSION
  value: {{$.Firmware.libvirt}}
{{ end }}
    - resourceType: Deployment
      resourceName: virt-controller
      type: strategic
      patch: '{"spec":{"template":{"spec":{"containers":[ {"name":"virt-controller","env":{{ include "virt-controller-additional-envs" . | fromYaml | pluck "env" | first | toJson }} } ]}}}}'

    # Label for SecurityPolicyException
    - resourceName: virt-handler
      resourceType: DaemonSet
      patch: '{"spec":{"template":{"metadata":{"labels":{"security.deckhouse.io/security-policy-exception": "virt-handler-ds"}}}}}'
      type: strategic

    # Expose virt-handler ports: health API (--port) and console server (--console-server-port).
    - resourceName: virt-handler
      resourceType: DaemonSet
      patch: '{"spec":{"template":{"spec":{"containers":[{"name":"virt-handler","ports":[{"containerPort":{{ include "virt_handler.port" . | int }},"name":"virt-handler","protocol":"TCP"},{"containerPort":{{ include "virt_handler.console_server_port" . | int }},"name":"console","protocol":"TCP"}]}]}}}}'
      type: strategic

    # Rewrite virt-api args, replacing the default ports baked into the image.
    # This is required because customizeComponents.flags only appends flags and cannot replace existing ones.
    - resourceName: virt-api
      resourceType: Deployment
      patch: '{"spec":{"template":{"spec":{"containers":[{"name":"virt-api","args":["--port","8443","--console-server-port","{{ include "virt_handler.console_server_port" . }}","--subresources-only","-v","2"]}]}}}}'
      type: strategic

    # Rewrite virt-handler args with hostNetwork ports, replacing the default ports baked into the image.
    # This is required because customizeComponents.flags only appends flags and cannot replace existing ones.
    - resourceName: virt-handler
      resourceType: DaemonSet
      patch: '{"spec":{"template":{"spec":{"containers":[{"name":"virt-handler","args":["--port","{{ include "virt_handler.port" . }}","--hostname-override","$(NODE_NAME)","--pod-ip-address","$(MY_POD_IP)","--max-metric-requests","3","--console-server-port","{{ include "virt_handler.console_server_port" . }}","--migration-port-range-enabled","true","--migration-port-range-first","{{ include "virt_handler.migration_port_first" . }}","--migration-port-range-last","{{ include "virt_handler.migration_port_last" . }}","--graceful-shutdown-seconds","315","-v","2"]}]}}}}'
      type: strategic

    # Override virt-handler liveness and readiness probes to use the new host-network port.
    - resourceName: virt-handler
      resourceType: DaemonSet
      patch: '{"spec":{"template":{"spec":{"containers":[{"name":"virt-handler","livenessProbe":{"httpGet":{"path":"/healthz","port":{{ include "virt_handler.port" . | int }},"scheme":"HTTPS"},"failureThreshold":3,"initialDelaySeconds":15,"periodSeconds":45,"successThreshold":1,"timeoutSeconds":10},"readinessProbe":{"httpGet":{"path":"/healthz","port":{{ include "virt_handler.port" . | int }},"scheme":"HTTPS"},"failureThreshold":3,"initialDelaySeconds":15,"periodSeconds":20,"successThreshold":1,"timeoutSeconds":10}}]}}}}'
      type: strategic

    # Change host path for directory with capabilities xml files. We have custom qemu with different
    # machine types thus it conflicts with the original kubevirt.
    - resourceName: virt-handler
      resourceType: DaemonSet
      patch: '{"spec":{"template":{"spec":{"volumes":[{"name":"node-labeller","hostPath":{"path":"/var/run/d8-virtualization/node-labeller"}}]}}}}'
      type: strategic

  imagePullPolicy: IfNotPresent
  imagePullSecrets:
    - name: virtualization-module-registry
  workloadUpdateStrategy:
    workloadUpdateMethods:
      - LiveMigrate
