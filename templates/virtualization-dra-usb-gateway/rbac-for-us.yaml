{{- if eq (include "virtualization-dra-usb-gateway.isEnabled" .) "true"}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: virtualization-dra-usb-gateway
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "virtualization-dra-usb-gateway")) | nindent 2 }}
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: d8:{{ .Chart.Name }}:virtualization-dra-usb-gateway
  {{- include "helm_lib_module_labels" (list . (dict "app" "virtualization-dra-usb-gateway")) | nindent 2 }}
rules:
  # TODO: fix me
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: d8:{{ .Chart.Name }}:virtualization-dra-usb-gateway
  {{- include "helm_lib_module_labels" (list . (dict "app" "virtualization-dra-usb-gateway")) | nindent 2 }}
subjects:
  - kind: ServiceAccount
    name: virtualization-dra-usb-gateway
    namespace: d8-{{ .Chart.Name }}
roleRef:
  kind: ClusterRole
  name: d8:{{ .Chart.Name }}:virtualization-dra-usb-gateway
  apiGroup: rbac.authorization.k8s.io
{{- end }}
