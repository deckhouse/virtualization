{{- $priorityClassName := include "priorityClassName" . }}
{{- $delve := (include "delve" . | fromYaml) -}}
{{- define "virtualization-dra-usb-gateway_resources" }}
cpu: 10m
memory: 25Mi
{{- end }}


{{- if eq (include "virtualization-dra-usb-gateway.isEnabled" .) "true"}}

{{- if (.Values.global.enabledModules | has "vertical-pod-autoscaler-crd") }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: virtualization-dra-usb-gateway
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "virtualization-dra-usb-gateway" "workload-resource-policy.deckhouse.io" "every-node")) | nindent 2 }}
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: DaemonSet
    name: virtualization-dra-usb-gateway
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
    - containerName: virtualization-dra-usb-gateway
      minAllowed:
        {{- include "virtualization-dra-usb-gateway_resources" . | nindent 8 }}
      maxAllowed:
        cpu: 20m
        memory: 25Mi
{{- end }}

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: virtualization-dra-usb-gateway
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" "virtualization-dra-usb-gateway")) | nindent 2 }}
spec:
  selector:
    matchLabels:
      app: virtualization-dra-usb-gateway
  template:
    metadata:
      labels:
        app: virtualization-dra-usb-gateway
    spec:
      {{- include "helm_lib_priority_class" (tuple . $priorityClassName) | nindent 6 }}
      {{- include "helm_lib_tolerations" (tuple . "any-node") | nindent 6 }}
      {{- include "helm_lib_module_pod_security_context_run_as_user_root" . | nindent 6 }}
      imagePullSecrets:
        - name: virtualization-module-registry
      serviceAccountName: virtualization-dra-usb-gateway
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/os: linux
      initContainers:
        - name: virtualization-dra-usb-gateway-init
          image: {{ include "helm_lib_module_image" (list . "virtualizationDraUsbGateway") }}
          imagePullPolicy: "IfNotPresent"
          args: ["init"]
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - SYS_MODULE
          volumeMounts:
            - name: lib-modules
              mountPath: /lib/modules
      containers:
        - name: virtualization-dra-usb-gateway
          securityContext:
            privileged: true
          image: {{ include "helm_lib_module_image" (list . "virtualizationDraUsbGateway") }}
          imagePullPolicy: "IfNotPresent"
          args:
            - --usbipd-port=3240
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- if eq (include "moduleLogLevel" .) "debug" }}
            - name: VERBOSITY
              value: "10"
            {{- end }}
            - name: USBIPD_ADDRESS
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          resources:
            requests:
              {{- include "helm_lib_module_ephemeral_storage_only_logs" . | nindent 14 }}
              {{- if not ( .Values.global.enabledModules | has "vertical-pod-autoscaler-crd") }}
              {{- include "virtualization-dra-usb-gateway_resources" . | nindent 14 }}
              {{- end }}
          ports:
            - containerPort: 51515
              name: health
              protocol: TCP
            {{- include "delvePorts" (list $delve "delve/virtualization-dra-usb-gateway") | nindent 12 }}
          {{- if ne "delve/virtualization-dra-usb-gateway" ($delve | dig "debug" "component" "<missing>") }}
          # TODO: add readinessProbe and livenessProbe
          #readinessProbe:
          #livenessProbe:
          {{- end }}
          volumeMounts:
            - name: sys
              mountPath: /sys
            - name: var-run
              mountPath: /var/run
            - name: usb-gateway
              mountPath: /var/run/usb-gateway
      volumes:
        - name: sys
          hostPath:
            path: /sys
        - name: var-run
          hostPath:
            path: /var/run
        - name: lib-modules
          hostPath:
            path: /lib/modules
        - name: usb-gateway
          emptyDir: {}
{{- end }}
