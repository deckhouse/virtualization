on:
  pull_request:
    types: [ opened, edited, synchronize ]
    branches:
      - main
      - cicd/check-no_cyrillic
#  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  no_cyrillic:
    runs-on: ubuntu-latest
    name: check cyrillic
    steps:
      - name: Set up Go 1.21
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run no cyrillic validation
        run: go run tools/testval/main.go
#      - name: Run git diff
#        run: |
#          DIFF_FILES=$(git diff --name-only origin/main origin/${GITHUB_HEAD_REF} | grep -E '\.(go|md|yaml|yml)$')
