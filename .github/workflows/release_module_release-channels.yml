name: Deploy Prod

env:
  MODULES_REGISTRY: ${{ vars.PROD_REGISTRY }}
  MODULE_SOURCE_NAME: ${{ vars.PROD_MODULE_SOURCE_NAME }}
  CI_COMMIT_REF_NAME: ${{ github.ref_name }}
  MODULES_MODULE_NAME: ${{ vars.MODULE_NAME }}
  RELEASE_CHANNEL: ${{ github.event.inputs.channel }}
  MODULES_REGISTRY_LOGIN: ${{ vars.PROD_MODULES_REGISTRY_LOGIN }}
  MODULES_REGISTRY_PASSWORD: ${{ secrets.PROD_MODULES_REGISTRY_PASSWORD }}
  MODULES_MODULE_TAG: ${{ github.event.inputs.tag }}
  SOURCE_REPO: ${{ secrets.SOURCE_REPO }}
  SOURCE_REPO_GIT: ${{secrets.SOURCE_REPO_GIT}}

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Select channel"
        type: choice
        default: alpha
        options:
          - "alpha"
          - "beta"
          - "early-access"
          - "stable"
          - "rock-solid"

      ce:
        type: boolean
        description: CE
      ee:
        type: boolean
        description: EE (also build CE ans SEPlus)

      tag:
        description: "Tag of the module, example v1.21.1"
        type: string
        required: true

      enableBuild:
        type: boolean
        default: true
        description: "Set to true if build is required"

      release_to_github:
        type: boolean
        default: true
        description: "Create GitHub release from changelog PR"

      check_only:
        type: boolean
        description: "Run only check version on release channel"
        default: false

      skip_requirements_check:
        type: boolean
        description: "Skip Deckhouse version requirements check before build"
        default: false

      send_results_to_loop:
        type: boolean
        description: "Send results to Loop"
        default: true

defaults:
  run:
    shell: bash

concurrency:
  group: "${{ github.workflow }}-${{ github.event.inputs.channel }}-${{ github.event.inputs.tag }}"
  cancel-in-progress: true

jobs:
  print-vars:
    runs-on: [self-hosted, large]
    name: Print vars
    steps:
      - name: PRINT VARS
        run: |
          echo MODULES_REGISTRY=$MODULES_REGISTRY
          echo MODULES_MODULE_SOURCE=$MODULES_MODULE_SOURCE
          echo CI_COMMIT_REF_NAME=$CI_COMMIT_REF_NAME
          echo MODULES_MODULE_NAME=$MODULES_MODULE_NAME
          echo RELEASE_CHANNEL=$RELEASE_CHANNEL
          echo MODULE_EDITION=$MODULE_EDITION
          echo DOCKER_CONFIG=$DOCKER_CONFIG
        shell: bash

      - name: Check that input tag is valid
        id: get-tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          echo "Processing tag: $TAG"

          # Check if tag matches vX.Y.Z pattern (release)
          if echo "$TAG" | grep -P '^v\d+\.\d+\.\d+$' > /dev/null; then
            echo "$TAG is a valid release tag"
          else
            echo "Error: Invalid tag format. Use format vX.Y.Z"
            exit 1
          fi
        shell: bash

  check-requirements-before-build:
    name: Check module requirements before build
    runs-on: ubuntu-latest
    needs: print-vars
    if: ${{ !inputs.check_only && (inputs.ce || inputs.ee) }}
    env:
      GO_VERSION: "1.25.9"
      input_channel: ${{ github.event.inputs.channel }}
      input_version: ${{ github.event.inputs.tag }}
    steps:
      - name: Skip requirements check
        if: ${{ inputs.skip_requirements_check }}
        run: |
          echo "Requirements check skipped by user input"
          exit 0

      - name: Install Task
        if: ${{ !inputs.skip_requirements_check }}
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go ${{ env.GO_VERSION }}
        if: ${{ !inputs.skip_requirements_check }}
        uses: actions/setup-go@v5
        with:
          go-version: "${{ env.GO_VERSION }}"

      - uses: actions/checkout@v4
        if: ${{ !inputs.skip_requirements_check }}
        with:
          fetch-depth: 0

      - name: Login to PROD_REGISTRY
        uses: deckhouse/modules-actions/setup@v2
        with:
          registry: ${{ vars.PROD_READ_REGISTRY }}
          registry_login: ${{ secrets.PROD_READ_REGISTRY_USER }}
          registry_password: ${{ secrets.PROD_READ_REGISTRY_PASSWORD }}

      - name: Check module requirements
        if: ${{ !inputs.skip_requirements_check }}
        run: |
          CHANNEL=$input_channel \
          VERSION=$input_version \
          task -d tools/moduleversions check:requirements

  job-CE:
    name: Edition CE
    runs-on: [self-hosted, large]
    needs: [print-vars, check-requirements-before-build]
    if: inputs.ce && !inputs.check_only
    steps:
      - name: Setup Docker config
        run: |
          echo "DOCKER_CONFIG=$(mktemp -d)" >> $GITHUB_ENV

      - run: echo "CE"
      - name: SET VAR
        id: set_vars
        run: |
          echo "MODULES_MODULE_SOURCE=$MODULES_REGISTRY/$MODULE_SOURCE_NAME/ce/modules" >> "$GITHUB_ENV"
          echo "MODULE_EDITION=CE" >> "$GITHUB_ENV"
          echo "MODULES_MODULE_SOURCE=$MODULES_REGISTRY/$MODULE_SOURCE_NAME/ce/modules" >> "$GITHUB_OUTPUT"
          echo "MODULE_EDITION=CE" >> "$GITHUB_OUTPUT"
      - name: ECHO VAR
        run: |
          echo $MODULES_MODULE_SOURCE
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag }}

      - name: Login to PROD_REGISTRY
        uses: deckhouse/modules-actions/setup@v2
        with:
          registry: ${{ vars.PROD_REGISTRY }}
          registry_login: ${{ vars.PROD_MODULES_REGISTRY_LOGIN }}
          registry_password: ${{ secrets.PROD_MODULES_REGISTRY_PASSWORD }}
      - name: Login to DEV_REGISTRY
        uses: deckhouse/modules-actions/setup@v2
        with:
          registry: ${{ vars.DEV_REGISTRY }}
          registry_login: ${{ vars.DEV_MODULES_REGISTRY_LOGIN }}
          registry_password: ${{ secrets.DEV_MODULES_REGISTRY_PASSWORD }}

      - if: ${{ inputs.enableBuild }}
        uses: deckhouse/modules-actions/build@v4
        with:
          module_source: ${{ steps.set_vars.outputs.MODULES_MODULE_SOURCE }}
          module_name: ${{ vars.MODULE_NAME }}
          module_tag: ${{ github.event.inputs.tag }}
          source_repo: ${{secrets.SOURCE_REPO_GIT}}
          source_repo_ssh_key: ${{ secrets.SOURCE_REPO_SSH_KEY }}
          secondary_repo: "${{ vars.DEV_MODULE_SOURCE }}/${{ vars.MODULE_NAME }}"

      - uses: deckhouse/modules-actions/deploy@v2
        with:
          module_source: ${{ steps.set_vars.outputs.MODULES_MODULE_SOURCE }}
          module_name: ${{ vars.MODULE_NAME }}
          module_tag: ${{ github.event.inputs.tag }}
          release_channel: ${{ github.event.inputs.channel }}

      - name: Cleanup Docker config
        run: |
          rm -rf $DOCKER_CONFIG

  job-EE:
    name: Edition EE
    needs: [print-vars, check-requirements-before-build]
    runs-on: [self-hosted, large]
    if: inputs.ee && !inputs.check_only
    steps:
      - name: Setup Docker config
        run: |
          echo "DOCKER_CONFIG=$(mktemp -d)" >> $GITHUB_ENV

      - run: echo "EE"
      - name: SET VAR
        id: set_vars
        run: |
          echo "MODULES_MODULE_SOURCE=$MODULES_REGISTRY/$MODULE_SOURCE_NAME/ee/modules" >> "$GITHUB_ENV"
          echo "MODULE_EDITION=EE" >> "$GITHUB_ENV"
          echo "MODULES_MODULE_SOURCE=$MODULES_REGISTRY/$MODULE_SOURCE_NAME/ee/modules" >> "$GITHUB_OUTPUT"
          echo "MODULE_EDITION=EE" >> "$GITHUB_OUTPUT"
      - name: ECHO VAR
        run: |
          echo $MODULES_MODULE_SOURCE
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag }}

      - uses: deckhouse/modules-actions/setup@v2
        with:
          registry: ${{ vars.PROD_REGISTRY }}
          registry_login: ${{ vars.PROD_MODULES_REGISTRY_LOGIN }}
          registry_password: ${{ secrets.PROD_MODULES_REGISTRY_PASSWORD }}

      - name: Login to PROD_REGISTRY
        uses: deckhouse/modules-actions/setup@v2
        with:
          registry: ${{ vars.PROD_REGISTRY }}
          registry_login: ${{ vars.PROD_MODULES_REGISTRY_LOGIN }}
          registry_password: ${{ secrets.PROD_MODULES_REGISTRY_PASSWORD }}
      - name: Login to DEV_REGISTRY
        uses: deckhouse/modules-actions/setup@v2
        with:
          registry: ${{ vars.DEV_REGISTRY }}
          registry_login: ${{ vars.DEV_MODULES_REGISTRY_LOGIN }}
          registry_password: ${{ secrets.DEV_MODULES_REGISTRY_PASSWORD }}

      - if: ${{ inputs.enableBuild }}
        uses: deckhouse/modules-actions/build@v4
        with:
          module_source: ${{ steps.set_vars.outputs.MODULES_MODULE_SOURCE }}
          module_name: ${{ vars.MODULE_NAME }}
          module_tag: ${{ github.event.inputs.tag }}
          source_repo: ${{secrets.SOURCE_REPO_GIT}}
          source_repo_ssh_key: ${{ secrets.SOURCE_REPO_SSH_KEY }}
          secondary_repo: "${{ vars.DEV_MODULE_SOURCE }}/${{ vars.MODULE_NAME }}"

      - uses: deckhouse/modules-actions/deploy@v2
        with:
          module_source: ${{ steps.set_vars.outputs.MODULES_MODULE_SOURCE }}
          module_name: ${{ vars.MODULE_NAME }}
          module_tag: ${{ github.event.inputs.tag }}
          release_channel: ${{ github.event.inputs.channel }}

      - name: Cleanup Docker config
        run: |
          rm -rf $DOCKER_CONFIG

  job-SE-Plus:
    name: Edition SE Plus
    needs: job-EE
    runs-on: [self-hosted, large]
    steps:
      - name: Setup Docker config
        run: |
          echo "DOCKER_CONFIG=$(mktemp -d)" >> $GITHUB_ENV

      - run: echo "SE Plus"
      - name: SET VAR
        id: set_vars
        run: |
          echo "MODULES_MODULE_SOURCE=$MODULES_REGISTRY/$MODULE_SOURCE_NAME/se-plus/modules" >> "$GITHUB_ENV"
          echo "MODULE_EDITION=EE" >> "$GITHUB_ENV"
          echo "MODULES_MODULE_SOURCE=$MODULES_REGISTRY/$MODULE_SOURCE_NAME/se-plus/modules" >> "$GITHUB_OUTPUT"
          echo "MODULE_EDITION=EE" >> "$GITHUB_OUTPUT"
      - name: ECHO VAR
        run: |
          echo $MODULES_MODULE_SOURCE
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag }}

      - name: Login to PROD_REGISTRY
        uses: deckhouse/modules-actions/setup@v2
        with:
          registry: ${{ vars.PROD_REGISTRY }}
          registry_login: ${{ vars.PROD_MODULES_REGISTRY_LOGIN }}
          registry_password: ${{ secrets.PROD_MODULES_REGISTRY_PASSWORD }}
      - name: Login to DEV_REGISTRY
        uses: deckhouse/modules-actions/setup@v2
        with:
          registry: ${{ vars.DEV_REGISTRY }}
          registry_login: ${{ vars.DEV_MODULES_REGISTRY_LOGIN }}
          registry_password: ${{ secrets.DEV_MODULES_REGISTRY_PASSWORD }}

      - if: ${{ inputs.enableBuild }}
        uses: deckhouse/modules-actions/build@v4
        with:
          module_source: ${{ steps.set_vars.outputs.MODULES_MODULE_SOURCE }}
          module_name: ${{ vars.MODULE_NAME }}
          module_tag: ${{ github.event.inputs.tag }}
          source_repo: ${{secrets.SOURCE_REPO_GIT}}
          source_repo_ssh_key: ${{ secrets.SOURCE_REPO_SSH_KEY }}
          secondary_repo: "${{ vars.DEV_MODULE_SOURCE }}/${{ vars.MODULE_NAME }}"

      - uses: deckhouse/modules-actions/deploy@v2
        with:
          module_source: ${{ steps.set_vars.outputs.MODULES_MODULE_SOURCE }}
          module_name: ${{ vars.MODULE_NAME }}
          module_tag: ${{ github.event.inputs.tag }}
          release_channel: ${{ github.event.inputs.channel }}

      - name: Cleanup Docker config
        run: |
          rm -rf $DOCKER_CONFIG

  job-FE:
    name: Edition FE
    needs: job-EE
    runs-on: [self-hosted, large]
    steps:
      - name: Setup Docker config
        run: |
          echo "DOCKER_CONFIG=$(mktemp -d)" >> $GITHUB_ENV

      - run: echo "FE"
      - name: SET VAR
        id: set_vars
        run: |
          echo "MODULES_MODULE_SOURCE=$MODULES_REGISTRY/$MODULE_SOURCE_NAME/fe/modules" >> "$GITHUB_ENV"
          echo "MODULE_EDITION=EE" >> "$GITHUB_ENV"
          echo "MODULES_MODULE_SOURCE=$MODULES_REGISTRY/$MODULE_SOURCE_NAME/fe/modules" >> "$GITHUB_OUTPUT"
          echo "MODULE_EDITION=EE" >> "$GITHUB_OUTPUT"
      - name: ECHO VAR
        run: |
          echo $MODULES_MODULE_SOURCE
      - name: Validation for tag
        run: |
          echo ${{ github.event.inputs.tag }} | grep -P '^v\d+\.\d+\.\d+'
        shell: bash
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag }}

      - name: Login to PROD_REGISTRY
        uses: deckhouse/modules-actions/setup@v2
        with:
          registry: ${{ vars.PROD_REGISTRY }}
          registry_login: ${{ vars.PROD_MODULES_REGISTRY_LOGIN }}
          registry_password: ${{ secrets.PROD_MODULES_REGISTRY_PASSWORD }}
      - name: Login to DEV_REGISTRY
        uses: deckhouse/modules-actions/setup@v2
        with:
          registry: ${{ vars.DEV_REGISTRY }}
          registry_login: ${{ vars.DEV_MODULES_REGISTRY_LOGIN }}
          registry_password: ${{ secrets.DEV_MODULES_REGISTRY_PASSWORD }}

      - if: ${{ inputs.enableBuild }}
        uses: deckhouse/modules-actions/build@v4
        with:
          module_source: ${{ steps.set_vars.outputs.MODULES_MODULE_SOURCE }}
          module_name: ${{ vars.MODULE_NAME }}
          module_tag: ${{ github.event.inputs.tag }}
          source_repo: ${{secrets.SOURCE_REPO_GIT}}
          source_repo_ssh_key: ${{ secrets.SOURCE_REPO_SSH_KEY }}
          secondary_repo: "${{ vars.DEV_MODULE_SOURCE }}/${{ vars.MODULE_NAME }}"

      - uses: deckhouse/modules-actions/deploy@v2
        with:
          module_source: ${{ steps.set_vars.outputs.MODULES_MODULE_SOURCE }}
          module_name: ${{ vars.MODULE_NAME }}
          module_tag: ${{ github.event.inputs.tag }}
          release_channel: ${{ github.event.inputs.channel }}

      - name: Cleanup Docker config
        run: |
          rm -rf $DOCKER_CONFIG

  check-version-on-release-channel:
    name: Check version on release channel
    runs-on: ubuntu-latest
    env:
      GO_VERSION: "1.25.9"
      input_channel: ${{ github.event.inputs.channel }}
      input_version: ${{ github.event.inputs.tag }}
    needs:
      - job-EE
      - job-SE-Plus
      - job-FE
      - job-CE
    if: ${{ always() && ! contains(needs.*.result, 'failure') || inputs.check_only }}
    strategy:
      matrix:
        check: ["registry", "releases", "documentation"]
    steps:
      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: "${{ env.GO_VERSION }}"

      - name: Login to PROD_REGISTRY
        uses: deckhouse/modules-actions/setup@v2
        with:
          registry: ${{ vars.PROD_READ_REGISTRY }}
          registry_login: ${{ secrets.PROD_READ_REGISTRY_USER }}
          registry_password: ${{ secrets.PROD_READ_REGISTRY_PASSWORD }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check version in registry
        if: ${{ matrix.check == 'registry' && always() }}
        run: |
          CHANNEL=$input_channel \
          VERSION=$input_version \
          task -d tools/moduleversions check:registry

      - name: Check version on site ${{ matrix.check }}
        if: ${{ matrix.check == 'releases' && always() }}
        env:
          input_check_only: ${{ inputs.check_only }}
        run: |
          # When check_only is true, we don't want to wait 120 seconds
          # because we just want to check the version we're interested in on the website
          if [ $input_check_only = false ]; then
            echo "Waiting for site to update (versions are usually updated within 2 minutes)..."
            sleep 120
          fi

          echo "Test that version deployed on site, retrying 5 times with delay of 60 seconds"
          CHANNEL=$input_channel \
          VERSION=$input_version \
          COUNT=5 \
          task -d tools/moduleversions check:releases
      - name: Check version on site ${{ matrix.check }}
        if: ${{ matrix.check == 'documentation' && always() }}
        env:
          input_check_only: ${{ inputs.check_only }}
        run: |
          # When check_only is true, we don't want to wait 300 seconds
          # because we just want to check the version we're interested in on the website
          if [ $input_check_only = false ]; then
            echo "Waiting for site to update (versions are usually updated within 5 minutes)..."
            sleep 300
          fi

          echo "Test that version deployed on site, retrying 5 times with delay of 60 seconds"
          CHANNEL=$input_channel \
          VERSION=$input_version \
          COUNT=5 \
          task -d tools/moduleversions check:docs

  create-github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - job-CE
      - job-EE
      - job-SE-Plus
      - job-FE
      - check-version-on-release-channel
    if: ${{ always() && inputs.release_to_github && !contains(needs.*.result, 'failure') && needs.check-version-on-release-channel.result == 'success' && (inputs.check_only || inputs.ce || inputs.ee) }}
    permissions:
      contents: write
      pull-requests: read
    outputs:
      release_status: ${{ steps.release.outputs.release_status }}
      release_url: ${{ steps.release.outputs.release_url }}
      release_pr_number: ${{ steps.release.outputs.release_pr_number }}
      release_pr_url: ${{ steps.release.outputs.release_pr_url }}
      release_reason: ${{ steps.release.outputs.release_reason }}
    steps:
      - name: Create GitHub release from changelog PR
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          gh release view "$TAG" --repo "$REPOSITORY" >/tmp/release-view.txt 2>/dev/null && release_exists=true || release_exists=false
          if [[ "$release_exists" == "true" ]]; then
            release_url=$(gh release view "$TAG" --repo "$REPOSITORY" --json url --jq '.url')
            echo "release_status=skipped" >> "$GITHUB_OUTPUT"
            echo "release_url=${release_url}" >> "$GITHUB_OUTPUT"
            echo "release_reason=GitHub release already exists for ${TAG}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changelog_prs=$(gh pr list \
            --repo "$REPOSITORY" \
            --state merged \
            --search "label:changelog milestone:${TAG}" \
            --json number,title,url,body,milestone)

          changelog_pr_count=$(echo "$changelog_prs" | jq 'length')
          if [[ "$changelog_pr_count" -ne 1 ]]; then
            echo "Expected exactly one merged changelog PR for milestone ${TAG}, found ${changelog_pr_count}" >&2
            exit 1
          fi

          pr_number=$(echo "$changelog_prs" | jq -r '.[0].number')
          pr_url=$(echo "$changelog_prs" | jq -r '.[0].url')
          pr_body=$(echo "$changelog_prs" | jq -r '.[0].body')

          if [[ -z "${pr_body//[[:space:]]/}" ]]; then
            echo "Changelog PR #${pr_number} body is empty" >&2
            exit 1
          fi

          notes_file=$(mktemp)
          printf '%s\n' "$pr_body" > "$notes_file"

          echo "DRY RUN: gh release create \"$TAG\" --repo \"$REPOSITORY\" --title \"$TAG\" --notes-file \"$notes_file\""
          echo "DRY RUN: release notes source PR #${pr_number}: ${pr_url}"
          echo "DRY RUN: release notes content start"
          cat "$notes_file"
          echo "DRY RUN: release notes content end"

          echo "release_status=dry-run" >> "$GITHUB_OUTPUT"
          echo "release_url=" >> "$GITHUB_OUTPUT"
          echo "release_pr_number=${pr_number}" >> "$GITHUB_OUTPUT"
          echo "release_pr_url=${pr_url}" >> "$GITHUB_OUTPUT"
          echo "release_reason=Dry run: GitHub release would be created from changelog PR #${pr_number}" >> "$GITHUB_OUTPUT"

  send-release-results-to-loop:
    name: Send release results to Loop
    runs-on: ubuntu-latest
    needs:
      - job-CE
      - job-EE
      - job-SE-Plus
      - job-FE
      - check-version-on-release-channel
      - create-github-release
    if: ${{ always() && inputs.send_results_to_loop }}
    steps:
      - name: Send results to Loop
        env:
          LOOP_WEBHOOK_URL: ${{ secrets.LOOP_TEST_CHANNEL }}
          TAG: ${{ github.event.inputs.tag }}
          CHANNEL: ${{ github.event.inputs.channel }}
          RELEASE_TO_GITHUB: ${{ inputs.release_to_github }}
          CHECK_ONLY: ${{ inputs.check_only }}
          CE_ENABLED: ${{ inputs.ce }}
          EE_ENABLED: ${{ inputs.ee }}
          CE_RESULT: ${{ needs.job-CE.result }}
          EE_RESULT: ${{ needs.job-EE.result }}
          SE_PLUS_RESULT: ${{ needs.job-SE-Plus.result }}
          FE_RESULT: ${{ needs.job-FE.result }}
          CHECK_RESULT: ${{ needs.check-version-on-release-channel.result }}
          GH_RELEASE_RESULT: ${{ needs.create-github-release.result }}
          GH_RELEASE_STATUS: ${{ needs.create-github-release.outputs.release_status }}
          GH_RELEASE_URL: ${{ needs.create-github-release.outputs.release_url }}
          GH_RELEASE_PR_NUMBER: ${{ needs.create-github-release.outputs.release_pr_number }}
          GH_RELEASE_PR_URL: ${{ needs.create-github-release.outputs.release_pr_url }}
          GH_RELEASE_REASON: ${{ needs.create-github-release.outputs.release_reason }}
        run: |
          export TZ=Europe/Moscow
          DATE=$(date +"%Y-%m-%d %H:%M:%S UTC+03:00")
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          get_status_emoji() {
            case "$1" in
              success)   echo ":white_check_mark:" ;;
              failure)   echo ":x:" ;;
              cancelled) echo ":warning:" ;;
              skipped)   echo ":fast_forward:" ;;
              *)         echo ":grey_question:" ;;
            esac
          }

          HEADER_ROW="| Edition |"
          STATUS_ROW="| Status |"

          if [[ "$CE_ENABLED" == "true" ]]; then
            HEADER_ROW+=" CE |"
            STATUS_ROW+=" $(get_status_emoji $CE_RESULT) |"
          fi

          if [[ "$EE_ENABLED" == "true" ]]; then
            HEADER_ROW+=" EE |"
            STATUS_ROW+=" $(get_status_emoji $EE_RESULT) |"

            HEADER_ROW+=" SE+ |"
            STATUS_ROW+=" $(get_status_emoji $SE_PLUS_RESULT) |"

            HEADER_ROW+=" FE |"
            STATUS_ROW+=" $(get_status_emoji $FE_RESULT) |"
          fi

          HEADER_ROW+=" Check |"
          STATUS_ROW+=" $(get_status_emoji $CHECK_RESULT) |"

          if [[ "$RELEASE_TO_GITHUB" == "true" && "$CHECK_ONLY" != "true" ]]; then
            HEADER_ROW+=" GitHub Release |"
            if [[ "$GH_RELEASE_RESULT" == "failure" ]]; then
              STATUS_ROW+=" :x: |"
            elif [[ "$GH_RELEASE_STATUS" == "created" ]]; then
              STATUS_ROW+=" :white_check_mark: |"
            elif [[ "$GH_RELEASE_STATUS" == "dry-run" ]]; then
              STATUS_ROW+=" :memo: |"
            elif [[ "$GH_RELEASE_STATUS" == "skipped" ]]; then
              STATUS_ROW+=" :fast_forward: |"
            else
              STATUS_ROW+=" :grey_question: |"
            fi
          fi

          COL_COUNT=$(echo "$HEADER_ROW" | tr -cd '|' | wc -c)
          COL_COUNT=$((COL_COUNT - 1))
          SEPARATOR_ROW="|"
          for ((i=0; i<COL_COUNT; i++)); do
            SEPARATOR_ROW+="---|"
          done

          RELEASE_SUMMARY="## :dvp: **DVP | Release ${TAG} to ${CHANNEL}**\n\n"
          RELEASE_SUMMARY+="Date: ${DATE}\n"
          RELEASE_SUMMARY+="[:link: GitHub Actions Output](${RUN_URL})\n\n"
          RELEASE_SUMMARY+="${HEADER_ROW}\n"
          RELEASE_SUMMARY+="${SEPARATOR_ROW}\n"
          RELEASE_SUMMARY+="${STATUS_ROW}\n"

          echo -e "$RELEASE_SUMMARY"
          curl --request POST \
                --header 'Content-Type: application/json' \
                --data "{\"text\": \"${RELEASE_SUMMARY}\"}" \
                $LOOP_WEBHOOK_URL
