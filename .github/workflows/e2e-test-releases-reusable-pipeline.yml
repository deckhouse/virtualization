name: E2E Release Test Reusable Pipeline

on:
  workflow_call:
    inputs:
      current_release:
        required: true
        type: string
        description: "Current virtualization release tag (e.g. v1.4.1)"
      new_release:
        required: true
        type: string
        description: "New virtualization release tag to upgrade to (e.g. v1.5.0)"
      date_start:
        required: true
        type: string
        description: "Date start"
      randuuid4c:
        required: true
        type: string
        description: "Random UUID first 4 chars"
      cluster_config_k8s_version:
        required: false
        type: string
        default: "Automatic"
        description: "Set k8s version for cluster config, like 1.34, 1.36 (without patch version)"
      cluster_config_workers_memory:
        required: false
        type: string
        default: "8Gi"
        description: "Set memory for workers node in cluster config"
      storage_type:
        required: true
        type: string
        description: "Storage type (replicated or nfs)"
      nested_storageclass_name:
        required: true
        type: string
        description: "Nested storage class name"
      nested_cluster_network_name:
        required: false
        type: string
        default: "cn-4006-for-e2e-test"
        description: "ClusterNetwork name for nested VM additional network interface"
      virtualization_image_url:
        required: false
        type: string
        default: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
        description: "Virtualization image url (default noble-server-cloudimg-amd64.img)"
      deckhouse_channel:
        required: false
        type: string
        default: "alpha"
        description: "Deckhouse release channel"
      pod_subnet_cidr:
        required: false
        type: string
        default: "10.88.0.0/16"
        description: "Pod subnet CIDR"
      service_subnet_cidr:
        required: false
        type: string
        default: "10.99.0.0/16"
        description: "Service subnet CIDR"
      default_user:
        required: false
        type: string
        default: "ubuntu"
        description: "Default user for vms"
      go_version:
        required: false
        type: string
        default: "1.25.10"
        description: "Go version"
      apt_mirror_enabled:
        required: false
        type: boolean
        default: true
        description: "Use custom APT mirror inside VMs cloud-init (Ubuntu). When false, VMs use stock Ubuntu repositories."
      apt_mirror_name:
        required: false
        type: string
        default: "hetzner"
        description: "APT mirror short name (used as /etc/apt/sources.list.d/<name>.list file name)"
      apt_mirror_url:
        required: false
        type: string
        default: "https://mirror.hetzner.com/ubuntu/packages"
        description: "APT mirror base URL (without trailing slash)"
    secrets:
      DEV_REGISTRY_DOCKER_CFG:
        required: true
      VIRT_E2E_NIGHTLY_SA_TOKEN:
        required: true
      PROD_IO_REGISTRY_DOCKER_CFG:
        required: true
      BOOTSTRAP_DEV_PROXY:
        required: true
      DEV_MODULES_REGISTRY_PASSWORD:
        required: true
      E2E_ARTIFACTS_GPG_PASSPHRASE:
        required: true

env:
  CURRENT_RELEASE: ${{ inputs.current_release }}
  NEW_RELEASE: ${{ inputs.new_release }}
  DECKHOUSE_CHANNEL: ${{ inputs.deckhouse_channel }}
  DEFAULT_USER: ${{ inputs.default_user }}
  GO_VERSION: ${{ inputs.go_version }}
  SETUP_CLUSTER_TYPE_PATH: test/dvp-static-cluster
  E2E_SCRIPT_DIR: ${{ github.workspace }}/.github/scripts/bash/e2e
  K8S_VERSION: ${{ inputs.cluster_config_k8s_version }}
  STORAGE_TYPE: ${{ inputs.storage_type }}
  E2E_START_TIME: ${{ inputs.date_start }}

defaults:
  run:
    shell: bash

jobs:
  bootstrap:
    name: Bootstrap cluster
    runs-on: ubuntu-latest
    concurrency:
      group: "${{ github.workflow }}-${{ github.event.number || github.ref }}-${{ inputs.storage_type }}"
      cancel-in-progress: true
    outputs:
      kubeconfig: ${{ steps.generate-kubeconfig.outputs.kubeconfig }}
      namespace: ${{ steps.vars.outputs.namespace }}
    steps:
      - uses: actions/checkout@v6

      - name: Set outputs
        env:
          RANDUUID4C: ${{ inputs.randuuid4c }}
          STORAGE_TYPE: ${{ inputs.storage_type }}
        id: vars
        run: |
          GIT_SHORT_HASH=$(git rev-parse --short HEAD)

          namespace="release-test-$STORAGE_TYPE-$GIT_SHORT_HASH-$RANDUUID4C"

          echo "namespace=$namespace" >> "$GITHUB_OUTPUT"
          echo "sha_short=$GIT_SHORT_HASH" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6

      - name: Setup E2E toolchain
        uses: ./.github/actions/setup-e2e-toolchain
        with:
          checkout: "false"
          install-kubectl: "false"
          install-htpasswd: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to private registry
        id: registry-login
        uses: ./.github/actions/registry-login
        with:
          docker_cfg: ${{ secrets.PROD_IO_REGISTRY_DOCKER_CFG }}

      - name: Configure kubectl via azure/k8s-set-context@v4
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          context: e2e-cluster-nightly-e2e-virt-sa
          kubeconfig: ${{ secrets.VIRT_E2E_NIGHTLY_SA_TOKEN }}

      - name: Generate values.yaml
        working-directory: ${{ env.SETUP_CLUSTER_TYPE_PATH }}
        run: |
          defaultStorageClass=$(kubectl get storageclass -o json \
            | jq -r '.items[] | select(.metadata.annotations."storageclass.kubernetes.io/is-default-class" == "true") | .metadata.name')

          cat <<EOF > values.yaml
          namespace: ${{ steps.vars.outputs.namespace }}
          storageType: ${{ inputs.storage_type }}
          storageClass: ${defaultStorageClass}
          sa: dkp-sa
          enabledModules:
            - console
          deckhouse:
            channel: ${{ env.DECKHOUSE_CHANNEL }}
            podSubnetCIDR: ${{ inputs.pod_subnet_cidr }}
            serviceSubnetCIDR: ${{ inputs.service_subnet_cidr }}
            kubernetesVersion: ${{ env.K8S_VERSION }}
            registryDockerCfg: ${{ secrets.PROD_IO_REGISTRY_DOCKER_CFG }}
            bundle: Default
            proxyEnabled: false
          image:
            url: ${{ inputs.virtualization_image_url }}
            defaultUser: ${{ env.DEFAULT_USER }}
            bootloader: BIOS
          ingressHosts:
            - api
            - grafana
            - dex
            - prometheus
            - console
            - virtualization
          instances:
            aptMirror:
              enabled: ${{ inputs.apt_mirror_enabled }}
              name: ${{ inputs.apt_mirror_name }}
              url: ${{ inputs.apt_mirror_url }}
            masterNodes:
              count: 1
              cfg:
                rootDiskSize: 60Gi
                cpu:
                  cores: 4
                  coreFraction: 50%
                memory:
                  size: 12Gi
            additionalNodes:
            - name: worker
              count: 3
              cfg:
                cpu:
                  cores: 6
                  coreFraction: 50%
                memory:
                  size: ${{ inputs.cluster_config_workers_memory }}
                additionalDisks:
                - size: 250Gi
            networkConfig:
              clusterNetworkName: ${{ inputs.nested_cluster_network_name }}
          EOF

          mkdir -p tmp
          touch tmp/discovered-values.yaml

          REGISTRY=$(base64 -d <<< "${{secrets.DEV_REGISTRY_DOCKER_CFG}}" | jq '.auths | to_entries | .[] | .key' -r)
          AUTH=$(base64 -d <<< "${{ secrets.DEV_REGISTRY_DOCKER_CFG }}" | jq '.auths | to_entries | .[] | .value.auth' -r)
          export REGISTRY AUTH

          yq eval --inplace '.discovered.registry_url = env(REGISTRY)' tmp/discovered-values.yaml
          yq eval --inplace '.discovered.registry_auth = env(AUTH)' tmp/discovered-values.yaml

      - name: Bootstrap cluster [infra-deploy]
        working-directory: ${{ env.SETUP_CLUSTER_TYPE_PATH }}
        run: |
          task infra-deploy
      - name: Bootstrap cluster [dhctl-bootstrap]
        id: dhctl-bootstrap
        working-directory: ${{ env.SETUP_CLUSTER_TYPE_PATH }}
        run: |
          if [[ $(yq eval '.deckhouse.proxyEnabled' values.yaml) == true ]]; then
            export HTTP_PROXY="${{ secrets.BOOTSTRAP_DEV_PROXY }}"
            export HTTPS_PROXY="${{ secrets.BOOTSTRAP_DEV_PROXY }}"
            echo "Proxy settings - configured"
          fi

          task dhctl-bootstrap
          echo "[SUCCESS] Done"
        timeout-minutes: 60
      - name: Label cluster to prevent deletion
        run: |
          kubectl label namespace "${{ steps.vars.outputs.namespace }}" e2e-cluster/do-not-stop-vm-on-e2e-run=true
          kubectl label vmclass "${{ steps.vars.outputs.namespace }}-cpu" e2e-cluster/do-not-stop-vm-on-e2e-run=true
      - name: Bootstrap cluster [show-connection-info]
        working-directory: ${{ env.SETUP_CLUSTER_TYPE_PATH }}
        run: |
          task show-connection-info

      - name: Save ssh to secrets in cluster
        env:
          NAMESPACE: ${{ steps.vars.outputs.namespace }}
        if: always() && steps.dhctl-bootstrap.outcome == 'success'
        run: |
          kubectl -n "$NAMESPACE" create secret generic ssh-key --from-file="${{ env.SETUP_CLUSTER_TYPE_PATH }}/tmp/ssh/cloud"

      - name: Get info about nested cluster and master VM
        working-directory: ${{ env.SETUP_CLUSTER_TYPE_PATH }}
        env:
          NAMESPACE: ${{ steps.vars.outputs.namespace }}
          STORAGE_TYPE: ${{ inputs.storage_type }}
          DEFAULT_USER: ${{ env.DEFAULT_USER }}
        run: |
          bash "${E2E_SCRIPT_DIR}/show-nested-cluster-info.sh" \
            "${NAMESPACE}" \
            "${STORAGE_TYPE}" \
            "${DEFAULT_USER}"

      - name: Generate nested kubeconfig
        id: generate-kubeconfig
        working-directory: ${{ env.SETUP_CLUSTER_TYPE_PATH }}
        env:
          KUBE_CONFIG_PATH: tmp/kube.config
          NAMESPACE: ${{ steps.vars.outputs.namespace }}
          STORAGE_TYPE: ${{ inputs.storage_type }}
          DEFAULT_USER: ${{ env.DEFAULT_USER }}
        run: |
          bash "${E2E_SCRIPT_DIR}/gen-nested-kubeconfig.sh" \
            "${KUBE_CONFIG_PATH}" \
            "${NAMESPACE}" \
            "${STORAGE_TYPE}" \
            "${DEFAULT_USER}" \
            "$GITHUB_OUTPUT"

      - name: cloud-init logs
        if: steps.dhctl-bootstrap.outcome == 'failure'
        env:
          NAMESPACE: ${{ steps.vars.outputs.namespace }}
          STORAGE_TYPE: ${{ inputs.storage_type }}
          DEFAULT_USER: ${{ env.DEFAULT_USER }}
          SETUP_CLUSTER_TYPE_PATH: ${{ env.SETUP_CLUSTER_TYPE_PATH }}
        run: |
          bash "${E2E_SCRIPT_DIR}/collect-cloud-init-logs.sh" \
            "${NAMESPACE}" \
            "${STORAGE_TYPE}" \
            "${DEFAULT_USER}" \
            "${SETUP_CLUSTER_TYPE_PATH}"

      - name: Prepare artifact
        if: success() || failure()
        env:
          SETUP_CLUSTER_TYPE_PATH: ${{ env.SETUP_CLUSTER_TYPE_PATH }}
          KUBECONFIG_B64: ${{ steps.generate-kubeconfig.outputs.kubeconfig }}
        run: |
          bash "${E2E_SCRIPT_DIR}/prepare-artifact.sh" \
            "${SETUP_CLUSTER_TYPE_PATH}" \
            "${KUBECONFIG_B64}"

      - name: Encrypt and upload generated files artifact
        if: success() || failure()
        uses: ./.github/actions/gpg-encrypt-and-upload
        with:
          path: tmp values.yaml
          working-directory: ${{ env.SETUP_CLUSTER_TYPE_PATH }}
          passphrase: ${{ secrets.E2E_ARTIFACTS_GPG_PASSPHRASE }}
          artifact_name: ${{ env.STORAGE_TYPE }}-release-generated-files-${{ env.E2E_START_TIME }}
          retention-days: 3

      - name: Encrypt and upload ssh config artifact
        if: always()
        uses: ./.github/actions/gpg-encrypt-and-upload
        with:
          path: ssh
          working-directory: ${{ env.SETUP_CLUSTER_TYPE_PATH }}/tmp
          passphrase: ${{ secrets.E2E_ARTIFACTS_GPG_PASSPHRASE }}
          artifact_name: ${{ env.STORAGE_TYPE }}-release-generated-files-ssh-${{ env.E2E_START_TIME }}
          retention-days: 3

      - name: Encrypt and upload kubeconfig artifact
        if: always()
        uses: ./.github/actions/gpg-encrypt-and-upload
        with:
          path: ${{ env.SETUP_CLUSTER_TYPE_PATH }}/kube-config
          archive: "false"
          passphrase: ${{ secrets.E2E_ARTIFACTS_GPG_PASSPHRASE }}
          artifact_name: ${{ env.STORAGE_TYPE }}-release-generated-files-kubeconfig-${{ env.E2E_START_TIME }}
          retention-days: 3

      - name: Add encrypted artifacts help to job summary
        if: always()
        uses: ./.github/actions/append-encrypted-artifacts-help

  configure-sdn:
    name: Configure SDN
    runs-on: ubuntu-latest
    needs: bootstrap
    steps:
      - uses: actions/checkout@v6

      - name: Setup E2E toolchain
        uses: ./.github/actions/setup-e2e-toolchain
        with:
          checkout: "false"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check nested kube-api via generated kubeconfig
        uses: ./.github/actions/use-nested-kubeconfig
        with:
          kubeconfig: ${{ needs.bootstrap.outputs.kubeconfig }}
      - name: Enable SDN
        run: bash "${E2E_SCRIPT_DIR}/enable-sdn.sh"

      - name: Wait for nodenetworkinterfaces to be ready
        run: bash "${E2E_SCRIPT_DIR}/wait-nodenetworkinterfaces.sh"

      - name: Configure ClusterNetwork
        run: |
          extraNic=$(kubectl get nodenetworkinterfaces -l network.deckhouse.io/interface-type=NIC -o json | jq -r '.items[] | select(.status.operationalState == "Up") | select(.status.ifName != "eno1" and .status.ifName != "enp1s0") | .metadata.name')

          for nic in $extraNic; do
            echo "[INFO] Label nodenetworkinterface $nic nic-group=extra"
            kubectl label nodenetworkinterfaces "$nic" nic-group=extra
          done

          kubectl get nodenetworkinterface -l nic-group=extra

          cat <<'EOF' | bash "${E2E_SCRIPT_DIR}/apply-clusternetworks.sh"
          ---
          apiVersion: network.deckhouse.io/v1alpha1
          kind: ClusterNetwork
          metadata:
            name: cn-4006-for-e2e-test
          spec:
            parentNodeNetworkInterfaces:
              labelSelector:
                matchLabels:
                  nic-group: extra
            type: Access
          ---
          apiVersion: network.deckhouse.io/v1alpha1
          kind: ClusterNetwork
          metadata:
            name: cn-4007-for-e2e-test
          spec:
            parentNodeNetworkInterfaces:
              labelSelector:
                matchLabels:
                  nic-group: extra
            type: VLAN
            vlan:
              id: 4007
          EOF

          echo "[INFO] Wait for ClusterNetwork cn-4006-for-e2e-test to be ready"
          kubectl wait clusternetworks.network.deckhouse.io --for=condition=Ready cn-4006-for-e2e-test --timeout=120s

          echo "[INFO] Wait for ClusterNetwork cn-4007-for-e2e-test to be ready"
          kubectl wait clusternetworks.network.deckhouse.io --for=condition=Ready cn-4007-for-e2e-test --timeout=120s

  configure-storage:
    name: Configure storage
    runs-on: ubuntu-latest
    needs:
      - configure-sdn
      - bootstrap
    steps:
      - uses: actions/checkout@v6

      - name: Setup E2E toolchain
        uses: ./.github/actions/setup-e2e-toolchain
        with:
          checkout: "false"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check nested kube-api via generated kubeconfig
        uses: ./.github/actions/use-nested-kubeconfig
        with:
          kubeconfig: ${{ needs.bootstrap.outputs.kubeconfig }}
      - name: Configure replicated storage
        id: storage-replicated-setup
        if: ${{ inputs.storage_type == 'replicated' || inputs.storage_type == 'mixed' }}
        working-directory: ${{ env.SETUP_CLUSTER_TYPE_PATH }}/storage/sds-replicated
        run: bash "${E2E_SCRIPT_DIR}/configure-sds-replicated.sh"

      - name: Configure sds-local-volume
        if: ${{ inputs.storage_type == 'local' || inputs.storage_type == 'mixed' }}
        working-directory: ${{ env.SETUP_CLUSTER_TYPE_PATH }}/storage/sds-local-volume
        run: |
          source "${E2E_SCRIPT_DIR}/deckhouse.sh"

          sds_local_volume_ready() {
            local count=90
            local local_volume_status
            local csi_node_desired
            local csi_node_ready
            local deploy_count
            local controller_ready

            for i in $(seq 1 $count); do
              local_volume_status=$(kubectl get modules sds-local-volume -o jsonpath='{.status.phase}' 2>/dev/null || echo "False")
              csi_node_desired=$(kubectl -n d8-sds-local-volume get ds csi-node -o jsonpath='{.status.desiredNumberScheduled}' 2>/dev/null || echo "0")
              csi_node_ready=$(kubectl -n d8-sds-local-volume get ds csi-node -o jsonpath='{.status.numberReady}' 2>/dev/null || echo "0")
              deploy_count=$(kubectl -n d8-sds-local-volume get deploy -o name 2>/dev/null | wc -l | tr -d ' ')
              controller_ready=false

              if [[ "${deploy_count}" -gt 0 ]] && kubectl -n d8-sds-local-volume wait --for=condition=Available deploy --all --timeout=10s >/dev/null 2>&1; then
                controller_ready=true
              fi

              if [[ "${local_volume_status}" == "Ready" && "${csi_node_desired}" -gt 0 && "${csi_node_ready}" -eq "${csi_node_desired}" && "${controller_ready}" == "true" ]]; then
                echo "[SUCCESS] sds-local-volume is ready (module=${local_volume_status}, csi-node=${csi_node_ready}/${csi_node_desired}, deployments=${deploy_count})"
                kubectl get modules sds-local-volume
                kubectl -n d8-sds-local-volume get pods
                return 0
              fi

              echo "[INFO] Waiting for sds-local-volume to be ready (attempt ${i}/${count})"
              echo "[WARNING] Current state: module=${local_volume_status}, csi-node=${csi_node_ready}/${csi_node_desired}, deployments=${deploy_count}, controller_ready=${controller_ready}"
              if (( i % 5 == 0 )); then
                kubectl get ns d8-sds-local-volume || true
                kubectl get modules sds-local-volume -o wide || true
                kubectl -n d8-sds-local-volume get pods || true
                kubectl -n d8-sds-local-volume get ds || true
                kubectl -n d8-sds-local-volume get deploy || true
                d8 s queue list | head -n 25 || true
              fi
              sleep 10
            done

            echo "[ERROR] sds-local-volume did not become ready in time"
            kubectl get modules sds-local-volume -o wide || true
            kubectl -n d8-sds-local-volume get pods || true
            d8 s queue list || true
            echo "::group::deckhouse logs"
            d8 s logs | tail -n 100
            echo "::endgroup::"
            exit 1
          }

          echo "[INFO] Apply sds-local-volume ModuleConfig"
          kubectl apply -f mc.yaml

          echo "[INFO] Wait for sds-local-volume module queue"
          d8_queue
          kubectl wait --for=jsonpath='{.status.phase}'=Ready modules sds-local-volume --timeout=300s
          sds_local_volume_ready

          chmod +x ./lsc-gen.sh
          ./lsc-gen.sh

          echo "[INFO] Show resulting local storage classes"
          kubectl get localstorageclass || true

      - name: Configure NFS storage
        if: ${{ inputs.storage_type == 'nfs' || inputs.storage_type == 'mixed' }}
        id: storage-nfs-setup
        working-directory: ${{ env.SETUP_CLUSTER_TYPE_PATH }}/storage/nfs
        env:
          NAMESPACE: ${{ needs.bootstrap.outputs.namespace }}
          STORAGE_TYPE: ${{ inputs.storage_type }}
          CONFIGURE_DEFAULT_SC: ${{ inputs.storage_type != 'mixed' }}
        run: bash "${E2E_SCRIPT_DIR}/configure-csi-nfs.sh"

  configure-virtualization:
    name: Configure Virtualization (current-release)
    runs-on: ubuntu-latest
    needs:
      - bootstrap
      - configure-storage
    steps:
      - uses: actions/checkout@v6

      - name: Setup E2E toolchain
        uses: ./.github/actions/setup-e2e-toolchain
        with:
          checkout: "false"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup kubeconfig
        uses: ./.github/actions/use-nested-kubeconfig
        with:
          kubeconfig: ${{ needs.bootstrap.outputs.kubeconfig }}
          check-api: "false"
      - name: Configure Virtualization
        run: |
          REGISTRY=$(base64 -d <<< "${{secrets.DEV_REGISTRY_DOCKER_CFG}}" | jq '.auths | to_entries | .[] | .key' -r)

          echo "[INFO] Apply ModuleSource prod config"
          kubectl apply -f -<<EOF
          apiVersion: deckhouse.io/v1alpha1
          kind: ModuleSource
          metadata:
            name: deckhouse-dev
          spec:
            registry:
              ca: ""
              dockerCfg: "${{secrets.DEV_REGISTRY_DOCKER_CFG}}"
              repo: "${REGISTRY}/sys/deckhouse-oss/modules"
              scheme: HTTPS
          EOF

          kubectl wait --for=jsonpath='{.status.phase}'=Active ms deckhouse-dev --timeout=30s

          echo "[INFO] Apply Virtualization module config with current-release tag: ${{ env.CURRENT_RELEASE }}"
          kubectl apply -f -<<EOF
          apiVersion: deckhouse.io/v1alpha1
          kind: ModuleConfig
          metadata:
            name: virtualization
          spec:
            enabled: true
            settings:
              dvcr:
                storage:
                  persistentVolumeClaim:
                    size: 10Gi
                    storageClassName: nested-thin-r1
                  type: PersistentVolumeClaim
              virtualMachineCIDRs:
                - 192.168.10.0/24
            source: deckhouse-dev
            version: 1
          ---
          apiVersion: deckhouse.io/v1alpha2
          kind: ModulePullOverride
          metadata:
            name: virtualization
          spec:
            imageTag: ${{ env.CURRENT_RELEASE }}
            scanInterval: 10h
          EOF

          echo "[INFO] Show ModuleSource"
          kubectl get ms

          echo "[INFO] Show module config virtualization info"
          kubectl get mc virtualization

          echo "[INFO] Show ModulePullOverride virtualization info"
          kubectl get mpo virtualization
      - name: Wait for Virtualization to be ready
        run: |
          source "${E2E_SCRIPT_DIR}/wait-virtualization-ready.sh"

          echo " "
          echo "[INFO] Waiting for Virtualization module to be ready"
          d8_queue

          virtualization_ready

          echo "[INFO] Checking Virtualization module deployments"
          kubectl -n d8-virtualization wait --for=condition=Available deploy --all --timeout 900s
          echo "[INFO] Checking virt-handler pods "
          virt_handler_ready

  test-current-release:
    name: "E2E test (current-release: ${{ inputs.current_release }})"
    runs-on: ubuntu-latest
    needs:
      - bootstrap
      - configure-virtualization
    outputs:
      release_namespace: ${{ steps.export-release-context.outputs.release_namespace }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: "${{ env.GO_VERSION }}"

      - uses: actions/checkout@v6

      - name: Setup E2E toolchain
        uses: ./.github/actions/setup-e2e-toolchain
        with:
          checkout: "false"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup kubeconfig
        uses: ./.github/actions/use-nested-kubeconfig
        with:
          kubeconfig: ${{ needs.bootstrap.outputs.kubeconfig }}
          check-api: "false"
      - name: Install ginkgo
        working-directory: ./test/e2e/
        run: |
          echo "Install ginkgo"
          go install tool

      - name: Download dependencies
        working-directory: ./test/e2e/
        run: |
          echo "Download dependencies"
          go mod download

      - name: Create vmclass for release e2e tests
        run: bash "${E2E_SCRIPT_DIR}/create-e2e-vmclass.sh"

      - name: "Run E2E tests on current-release"
        id: release-e2e
        env:
          CSI: ${{ inputs.storage_type }}
          STORAGE_CLASS_NAME: ${{ inputs.nested_storageclass_name }}
          E2E_CONFIG: ${{ github.workspace }}/test/e2e/default_config.yaml
          RELEASE_TEST_PHASE: pre-upgrade
          RELEASE_UPGRADE_CONTEXT_PATH: ${{ runner.temp }}/release-upgrade-context.json
        run: |
          echo "[INFO] Current release tag: ${{ env.CURRENT_RELEASE }}"
          echo "[INFO] Storage type: ${{ inputs.storage_type }}"
          echo ""
          echo "[INFO] Verifying virtualization module is running"
          kubectl get modules virtualization
          kubectl get mpo virtualization
          echo ""
          echo "[INFO] Running dedicated release suite"
          echo "[INFO] Resources will be intentionally left in the cluster for the upgrade test"
          cd ./test/e2e/
          GINKGO_RESULT=$(mktemp -p "$RUNNER_TEMP")
          junit_report="$GITHUB_WORKSPACE/test/e2e/release_current_suite.xml"
          set +e
          go tool ginkgo \
            -v --race --timeout=45m \
            --junit-report="$junit_report" \
            ./release | tee "$GINKGO_RESULT"
          GINKGO_EXIT_CODE=$?
          set -e
          echo "[INFO] Exit code: $GINKGO_EXIT_CODE"
          exit $GINKGO_EXIT_CODE

      - name: Export release upgrade context
        id: export-release-context
        if: success() && steps.release-e2e.outcome != 'skipped'
        run: |
          context_path="${{ runner.temp }}/release-upgrade-context.json"
          echo "[INFO] Reading release upgrade context from ${context_path}"
          cat "${context_path}"
          echo "release_namespace=$(jq -r '.namespace' "${context_path}")" >> "$GITHUB_OUTPUT"

      - name: Upload current-release test results
        uses: actions/upload-artifact@v7
        if: always() && steps.release-e2e.outcome != 'skipped'
        with:
          name: current-release-e2e-results-${{ github.run_id }}
          path: test/e2e/release_current_suite.xml
          if-no-files-found: ignore
          overwrite: true
          retention-days: 3

      - name: Upload resources from failed current-release tests
        uses: actions/upload-artifact@v7
        if: always() && steps.release-e2e.outcome != 'skipped'
        with:
          name: current-release-resources-from-failed-tests-${{ github.run_id }}
          path: ${{ runner.temp }}/e2e_failed__*
          if-no-files-found: ignore
          retention-days: 3

  patch-modulepulloverride:
    name: "Patch ModulePullOverride to new-release: ${{ inputs.new_release }}"
    runs-on: ubuntu-latest
    needs:
      - bootstrap
      - test-current-release
    outputs:
      upgrade_started_at: ${{ steps.patch-modulepulloverride.outputs.upgrade_started_at }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup E2E toolchain
        uses: ./.github/actions/setup-e2e-toolchain
        with:
          checkout: "false"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup kubeconfig
        uses: ./.github/actions/use-nested-kubeconfig
        with:
          kubeconfig: ${{ needs.bootstrap.outputs.kubeconfig }}
          check-api: "false"
      - name: Show current MPO state
        run: |
          echo "[INFO] Current ModulePullOverride before patching:"
          kubectl get mpo virtualization -o yaml

      - name: "Patch ModulePullOverride to new-release: ${{ env.NEW_RELEASE }}"
        id: patch-modulepulloverride
        run: |
          upgrade_started_at=$(date +%s)
          echo "upgrade_started_at=${upgrade_started_at}" >> "$GITHUB_OUTPUT"
          echo "[INFO] Patching MPO virtualization imageTag from ${{ env.CURRENT_RELEASE }} to ${{ env.NEW_RELEASE }}"
          kubectl patch mpo virtualization --type merge -p '{"spec":{"imageTag":"${{ env.NEW_RELEASE }}"}}'

          echo "[INFO] Show patched ModulePullOverride:"
          kubectl get mpo virtualization -o yaml

      - name: Setup crane and registry auth
        uses: deckhouse/modules-actions/setup@v2
        with:
          registry: ${{ vars.DEV_REGISTRY }}
          registry_login: ${{ vars.DEV_MODULES_REGISTRY_LOGIN }}
          registry_password: ${{ secrets.DEV_MODULES_REGISTRY_PASSWORD }}

      - name: Verify image digests in pods after upgrade
        run: |
          MODULE_IMAGE="${{ vars.DEV_MODULE_SOURCE }}/virtualization:${{ env.NEW_RELEASE }}"
          echo "[INFO] Extracting images_digests.json from virtualization:${{ env.NEW_RELEASE }}"
          images_hash=$(crane export "${MODULE_IMAGE}" - | tar -Oxf - images_digests.json)
          echo "[INFO] Expected image digests:"
          echo "::group::images_digests.json"
          echo "$images_hash" | jq .
          echo "::endgroup::"

          audit_status=$(kubectl get mc virtualization -o=jsonpath='{.spec.settings.audit.enabled}' 2>/dev/null || true)
          audit_image_skip="true"
          if [ -n "$audit_status" ] && [ "$audit_status" == "true" ]; then
            audit_image_skip="false"
          fi

          SKIP_IMAGES=()
          if [ "$audit_image_skip" == "true" ]; then
            SKIP_IMAGES+=("virtualizationAudit")
          fi
          SKIP_IMAGES+=("virtualizationDraUsb")

          is_skipped_image() {
            local img="$1"
            if [ ${#img} -eq 0 ]; then return 1; fi
            for skip in "${SKIP_IMAGES[@]}"; do
              if [[ "$img" == "$skip" ]]; then
                return 0
              fi
            done
            return 1
          }

          retry_count=0
          max_retries=120
          sleep_interval=5

          while true; do
            all_hashes_found=true

            v12n_pods=$(kubectl -n d8-virtualization get pods -o json | jq -c)

            while IFS= read -r image_entry; do
              image=$(echo "$image_entry" | jq -r '.key')
              hash=$(echo "$image_entry" | jq -r '.value')

              if [[ "${image,,}" =~ (libguestfs|predeletehook) ]]; then
                continue
              fi

              if is_skipped_image "$image"; then
                echo "- SKIP $image"
                continue
              fi

              if echo "$v12n_pods" | grep -q "$hash"; then
                echo "- OK   $image $hash"
              else
                echo "- MISS $image $hash"
                all_hashes_found=false
              fi
            done < <(echo "$images_hash" | jq -c '. | to_entries | sort_by(.key)[]')

            if [ "$all_hashes_found" = true ]; then
              echo "[SUCCESS] All image hashes found in pods after upgrade to ${{ env.NEW_RELEASE }}"
              break
            fi

            retry_count=$((retry_count + 1))
            echo "[INFO] Some hashes are missing, rechecking... Attempt: ${retry_count}/${max_retries}"

            if [ "$retry_count" -ge "$max_retries" ]; then
              echo "[ERROR] Timeout reached after $((retry_count * sleep_interval))s. Some image hashes are still missing."
              echo "::group::pods in d8-virtualization"
              kubectl -n d8-virtualization get pods -o wide || true
              echo "::endgroup::"
              exit 1
            fi

            sleep "$sleep_interval"
          done

      - name: Show ModulePullOverride state after upgrade
        run: |
          echo "[INFO] ModulePullOverride after upgrade:"
          kubectl get mpo virtualization -o yaml
          echo "[INFO] Virtualization module status:"
          kubectl get modules virtualization

  test-new-release:
    name: "E2E test (new-release: ${{ inputs.new_release }})"
    runs-on: ubuntu-latest
    needs:
      - bootstrap
      - patch-modulepulloverride
      - test-current-release
    steps:
      - uses: actions/checkout@v6

      - name: Setup E2E toolchain
        uses: ./.github/actions/setup-e2e-toolchain
        with:
          checkout: "false"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "${{ env.GO_VERSION }}"

      - name: Install ginkgo
        working-directory: ./test/e2e/
        run: |
          echo "Install ginkgo"
          go install tool

      - name: Download dependencies
        working-directory: ./test/e2e/
        run: |
          echo "Download dependencies"
          go mod download

      - name: Setup kubeconfig
        uses: ./.github/actions/use-nested-kubeconfig
        with:
          kubeconfig: ${{ needs.bootstrap.outputs.kubeconfig }}
          check-api: "false"
      - name: "Run E2E tests on new-release"
        env:
          CSI: ${{ inputs.storage_type }}
          STORAGE_CLASS_NAME: ${{ inputs.nested_storageclass_name }}
          E2E_CONFIG: ${{ github.workspace }}/test/e2e/default_config.yaml
          RELEASE_TEST_PHASE: post-upgrade
          RELEASE_NAMESPACE: ${{ needs.test-current-release.outputs.release_namespace }}
          RELEASE_UPGRADE_STARTED_AT: ${{ needs.patch-modulepulloverride.outputs.upgrade_started_at }}
        run: |
          echo "[INFO] New release tag: ${{ env.NEW_RELEASE }}"
          echo "[INFO] Storage type: ${{ inputs.storage_type }}"
          echo ""
          echo "[INFO] Verifying virtualization module is running with new release"
          kubectl get modules virtualization || true
          kubectl get mpo virtualization || true
          echo ""
          echo "[INFO] Reusing namespace: ${RELEASE_NAMESPACE}"
          cd ./test/e2e/
          go tool ginkgo \
            -v --race --timeout=45m \
            ./release
          echo "[INFO] Cluster is intentionally left running (no cleanup)"
