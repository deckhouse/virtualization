name: E2E Pipeline (Reusable)

on:
  workflow_call:
    inputs:
      storage_type:
        required: true
        type: string
        description: 'Storage type (ceph or replicated)'
      nested_storageclass_name:
        required: true
        type: string
        description: 'Nested storage class name'
      default_cluster_storageclass:
        required: true
        type: string
        description: 'Default cluster storage class'
      branch:
        required: false
        type: string
        default: 'main'
        description: 'Branch to use'
      virtualization_tag:
        required: false
        type: string
        default: 'main'
        description: 'Virtualization tag'
      deckhouse_tag:
        required: false
        type: string
        default: 'main'
        description: 'Deckhouse tag'
      default_user:
        required: false
        type: string
        default: 'ubuntu'
        description: 'Default user'
      go_version:
        required: false
        type: string
        default: '1.24.6'
        description: 'Go version'
    secrets:
      DEV_REGISTRY_DOCKER_CFG:
        required: true
      VIRT_E2E_NIGHTLY_SA_TOKEN:
        required: true
      PROD_IO_REGISTRY_DOCKER_CFG:
        required: true
      # GITHUB_TOKEN:
      #   required: true

env:
  BRANCH: ${{ inputs.branch }}
  VIRTUALIZATION_TAG: ${{ inputs.virtualization_tag }}
  DECKHOUSE_TAG: ${{ inputs.deckhouse_tag }}
  DEFAULT_USER: ${{ inputs.default_user }}
  GO_VERSION: ${{ inputs.go_version }}

defaults:
  run:
    shell: bash

jobs:
  bootstrap:
    name: Bootstrap cluster (${{ inputs.storage_type }})
    runs-on: ubuntu-latest
    concurrency:
      group: "${{ github.workflow }}-${{ github.event.number || github.ref }}-${{ inputs.storage_type }}"
      cancel-in-progress: true
    outputs:
      kubeconfig-content: ${{ steps.generate-kubeconfig.outputs.config }}
      storage-type: ${{ steps.vars.outputs.storage_type }}
      nested-storageclass-name: ${{ steps.vars.outputs.nested_storageclass_name }}
    steps:
      - uses: actions/checkout@v4
        # with:
        #   ref: ${{ env.BRANCH }}

      - name: Set outputs
        id: vars
        run: |
          namespace="nightly-e2e-${{ inputs.storage_type }}-$(git rev-parse --short HEAD)"
          echo "namespace=$namespace" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "storage_type=${{ inputs.storage_type }}" >> $GITHUB_OUTPUT
          echo "nested_storageclass_name=${{ inputs.nested_storageclass_name }}" >> $GITHUB_OUTPUT

          REGISTRY=$(base64 -d <<< ${{secrets.DEV_REGISTRY_DOCKER_CFG}} | jq '.auths | to_entries | .[] | .key' -r)
          USERNAME=$(base64 -d <<< ${{ secrets.DEV_REGISTRY_DOCKER_CFG }} | jq '.auths | to_entries | .[] | .value.auth' -r | base64 -d | cut -d ':' -f1)
          PASSWORD=$(base64 -d <<< ${{ secrets.DEV_REGISTRY_DOCKER_CFG }} | jq '.auths | to_entries | .[] | .value.auth' -r | base64 -d | cut -d ':' -f2)

          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT

      - name: Install htpasswd utility
        run: |
          sudo apt-get update
          sudo apt-get install -y apache2-utils

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup d8
        uses: ./.github/actions/install-d8

      - name: Log in to private registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.vars.outputs.registry }}
          username: ${{ steps.vars.outputs.username }}
          password: ${{ steps.vars.outputs.password }}

      - name: Configure kubectl via azure/k8s-set-context@v4
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          context: e2e-cluster-nightly-e2e-virt-sa
          kubeconfig: ${{ secrets.VIRT_E2E_NIGHTLY_SA_TOKEN }}

      - name: Generate values.yaml
        run: |
          defaultStorageClass=$(kubectl get storageclass -o json \
            | jq -r '.items[] | select(.metadata.annotations."storageclass.kubernetes.io/is-default-class" == "true") | .metadata.name')

          cat <<EOF > test/dvp-over-dvp/values.yaml
          namespace: ${{ steps.vars.outputs.namespace }}
          storageClass: ${defaultStorageClass}
          nfsEnabled: false
          nfsSC: nested-nfs-${{ inputs.storage_type }}-${{ steps.vars.outputs.sha_short }}
          defaultClusterStorageClass: ${{ inputs.default_cluster_storageclass }}
          clusterConfigurationPrefix: ${{ inputs.storage_type }}
          sa: dkp-sa
          deckhouse:
            tag: ${{ env.DECKHOUSE_TAG }}
            kubernetesVersion: Automatic
            registryDockerCfg: ${{ secrets.DEV_REGISTRY_DOCKER_CFG }}
          image:
            url: https://89d64382-20df-4581-8cc7-80df331f67fa.selstorage.ru/ubuntu/noble-server-cloudimg-amd64.img
            defaultUser: ${{ env.DEFAULT_USER }}
            bootloader: BIOS
          ingressHosts:
            - api
            - grafana
            - dex
            - prometheus
            - console
            - virtualization
          instances:
            masterNodes:
              count: 1
              cores: 8
              coreFraction: 50%
              memory: 14Gi
            additionalNodes:
              - name: worker
                count: 3
                cores: 10
                coreFraction: 25%
                memory: 8Gi
                nodeType: CloudEphemeral
                bootloader: BIOS
          EOF

      - name: Bootstrap cluster [infra-deploy]
        run: |
          cd test/dvp-over-dvp
          task infra-deploy
      - name: Bootstrap cluster [dhctl-bootstrap]
        run: |
          cd test/dvp-over-dvp
          DECKHOUSE_TAG=${{ env.DECKHOUSE_TAG }} task dhctl-bootstrap
      - name: Bootstrap cluster [show-connection-info]
        run: |
          cd test/dvp-over-dvp
          task show-connection-info

      - name: Get info about nested master VM
        run: |
          cd test/dvp-over-dvp

          nested_master=$(kubectl -n ${{ steps.vars.outputs.namespace }} get vm -l dvp.deckhouse.io/node-group=master -o jsonpath="{.items[0].metadata.name}")

          echo "Pods"
          kubectl get pods -n "${{ steps.vars.outputs.namespace }}"
          echo ""

          echo "VMs"
          kubectl get vm -n "${{ steps.vars.outputs.namespace }}"
          echo ""

          echo "VDs"
          kubectl get vd -n "${{ steps.vars.outputs.namespace }}"
          echo ""

          echo "login to master"
          echo "os-release master"
          d8 v ssh -i ./tmp/ssh/cloud \
            --local-ssh=true \
            --local-ssh-opts="-o StrictHostKeyChecking=no" \
            --local-ssh-opts="-o UserKnownHostsFile=/dev/null" \
            ${{ env.DEFAULT_USER }}@${nested_master}.${{ steps.vars.outputs.namespace }} \
            -c 'cat /etc/os-release'
          echo ""

          echo "hostname master"
          d8 v ssh -i ./tmp/ssh/cloud  \
            --local-ssh=true \
            --local-ssh-opts="-o StrictHostKeyChecking=no" \
            --local-ssh-opts="-o UserKnownHostsFile=/dev/null" \
            ${{ env.DEFAULT_USER }}@${nested_master}.${{ steps.vars.outputs.namespace }} \
            -c 'hostname'

      - name: Generate nested kubeconfig
        id: generate-kubeconfig
        env:
          kubeConfigPath: tmp/kube.config
        run: |
          NAMESPACE=${{ steps.vars.outputs.namespace }}
          nested_master=$(kubectl -n $NAMESPACE get vm -l dvp.deckhouse.io/node-group=master -o jsonpath="{.items[0].metadata.name}")

          d8vscp() {
            local source=$1
            local dest=$2
            d8 v scp -i ./tmp/ssh/cloud  \
              --local-ssh=true \
              --local-ssh-opts="-o StrictHostKeyChecking=no" \
              --local-ssh-opts="-o UserKnownHostsFile=/dev/null" \
              $source $dest
            echo "d8vscp: $source -> $dest - done"
          }

          d8vssh() {
            local cmd=$1
            d8 v ssh -i ./tmp/ssh/cloud \
            --local-ssh=true \
            --local-ssh-opts="-o StrictHostKeyChecking=no" \
            --local-ssh-opts="-o UserKnownHostsFile=/dev/null" \
            ${{ env.DEFAULT_USER }}@${nested_master}.${NAMESPACE} \
            -c "$cmd"
          }

          cd test/dvp-over-dvp

          echo "Copy script for generating kubeconfig in nested cluster"
          echo "copy nested-sa-config/gen-sa.sh to master"
          d8vscp "./nested-sa-config/gen-sa.sh" "${{ env.DEFAULT_USER }}@${nested_master}.${NAMESPACE}:/tmp/gen-sa.sh"
          echo ""
          d8vscp "./tools/deckhouse-queue.sh" "${{ env.DEFAULT_USER }}@${nested_master}.${NAMESPACE}:/tmp/deckhouse-queue.sh"
          echo ""

          echo "chmod +x /tmp/gen-sa.sh"
          d8 v ssh -i ./tmp/ssh/cloud \
            --local-ssh=true \
            --local-ssh-opts="-o StrictHostKeyChecking=no" \
            --local-ssh-opts="-o UserKnownHostsFile=/dev/null" \
            ${{ env.DEFAULT_USER }}@${nested_master}.${NAMESPACE} \
            -c 'chmod +x /tmp/gen-sa.sh; chmod +x /tmp/deckhouse-queue.sh'
          # echo "'chmod +x /tmp/gen-sa.sh; chmod +x /tmp/deckhouse-queue.sh' - done"
          echo ""

          echo "==="
          d8 v ssh -i ./tmp/ssh/cloud  \
            --local-ssh=true \
            --local-ssh-opts="-o StrictHostKeyChecking=no" \
            --local-ssh-opts="-o UserKnownHostsFile=/dev/null" \
            ${{ env.DEFAULT_USER }}@${nested_master}.${NAMESPACE} \
            -c 'ls -la /tmp/'
          echo "==="

          echo "check d8 queue"
          d8 v ssh -i ./tmp/ssh/cloud  \
            --local-ssh=true \
            --local-ssh-opts="-o StrictHostKeyChecking=no" \
            --local-ssh-opts="-o UserKnownHostsFile=/dev/null" \
            ${{ env.DEFAULT_USER }}@${nested_master}.${NAMESPACE} \
            -c '/tmp/deckhouse-queue.sh'

          echo "Generate kube conf in nested cluster"
          echo "run nested-sa-config/gen-sa.sh"

          # "Usage: gen-sa.sh <SA_NAME> <CLUSTER_PREFIX> <CLUSTER_NAME> [FILE_NAME]"
          echo "==="
          d8 v ssh -i ./tmp/ssh/cloud \
            --local-ssh=true \
            --local-ssh-opts="-o StrictHostKeyChecking=no" \
            --local-ssh-opts="-o UserKnownHostsFile=/dev/null" \
            ${{ env.DEFAULT_USER }}@${nested_master}.$NAMESPACE \
            -c 'sudo /tmp/gen-sa.sh nested-sa nested nested-e2e /${{ env.kubeConfigPath }}'

          echo "'sudo /tmp/gen-sa.sh nested-sa nested nested-e2e /${{ env.kubeConfigPath }}' - done"
          echo ""

          echo "copy kubeconfig to runner"
          d8vscp "${{ env.DEFAULT_USER }}@${nested_master}.$NAMESPACE:/${{ env.kubeConfigPath }}" "${{ env.kubeConfigPath }}"

          echo "=== Set rights for kubeconfig ==="
          echo "sudo chown 1001:1001 ${{ env.kubeConfigPath }}"
          sudo chown 1001:1001 ${{ env.kubeConfigPath }}
          echo "rights - done"

          echo "Kubeconf to github output"
          CONFIG=$(cat ${{ env.kubeConfigPath }} | base64 -w 0)
          CONFIG=$(echo $CONFIG | base64 -w 0)
          echo "config=$CONFIG" >> $GITHUB_OUTPUT
      
      - name: Prepare artifact
        if: always()
        run: |
          sudo chown -fR 1001:1001 test/dvp-over-dvp
          yq e '.deckhouse.registryDockerCfg = "None"' -i ./test/dvp-over-dvp/values.yaml
          yq e 'select(.kind == "InitConfiguration") .deckhouse.registryDockerCfg = "None"' -i ./test/dvp-over-dvp/tmp/config.yaml
      - name: Upload generated files
        uses: actions/upload-artifact@v4
        id: artifact-upload
        if: always()
        with:
          name: generated-files-${{ inputs.storage_type }}
          path: |
            test/dvp-over-dvp/tmp
            test/dvp-over-dvp/values.yaml
          overwrite: true
          include-hidden-files: true
          retention-days: 1
      - name: Upload ssh config
        uses: actions/upload-artifact@v4
        id: artifact-upload-ssh
        if: always()
        with:
          name: generated-files-ssh-${{ inputs.storage_type }}
          path: test/dvp-over-dvp/tmp/ssh
          overwrite: true
          include-hidden-files: true
          retention-days: 1

  configure-storage:
    name: Configure storage (${{ inputs.storage_type }})
    runs-on: ubuntu-latest
    needs: bootstrap
    steps:
      - uses: actions/checkout@v4

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup d8
        uses: ./.github/actions/install-d8
      - name: Install kubectl CLI
        uses: azure/setup-kubectl@v4

      - name: Check kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "Configure kube config"
          echo "${{ needs.bootstrap.outputs.kubeconfig-content }}" | base64 -d | base64 -d > ~/.kube/config

          echo "Show paths and files content"
          ls -la ~/.kube
          chmod 600 ~/.kube/config

          echo "kubectl get nodes"
          kubectl config use-context nested-e2e-nested-sa
          kubectl get nodes

      - name: Configure replicated storage
        if: ${{ inputs.storage_type == 'replicated' }}
        run: |
          cd test/dvp-over-dvp/storage/sds-replicated
          kubectl apply -f mc.yaml
          kubectl wait --for=jsonpath='{.status.phase}'=Ready modules sds-node-configurator --timeout=300s

          echo "Wait bd"
          workers=$(kubectl get nodes -o name | grep -v master | wc -l)
          bdexists=false
          for i in {1..60}; do 
            blockdevices=$(kubectl get blockdevice -o name | wc -l)
            if [ $blockdevices -ge $workers ]; then
              bdexists=true
              break
            fi
            echo "Wait 20 sec until blockdevices is greater or equal to $workers"
            d8 p queue list | head -n25
            sleep 20
          done

          if [ $bdexists = false ]; then
            echo "Blockdevices is not 3"
            echo "kubectl blockdevice"
            kubectl get blockdevice
            echo "kubectl ns"
            kubectl get ns
            echo "kubectl nodes"
            kubectl get nodes
            exit 1
          fi

          chmod +x lvg-gen.sh
          ./lvg-gen.sh

          chmod +x rsc-gen.sh
          ./rsc-gen.sh

          echo "Done"

          echo "Show bd and "
          kubectl get blockdevice
          kubectl get sc
          kubectl get rsc
          kubectl get nodes

          echo "show global config"
          kubectl get mc global -o yaml
      - name: Configure ceph storage
        if: ${{ inputs.storage_type == 'ceph' }}
        run: |
          d8_queue_main() {
            d8 p queue main | grep -Po '(?<=length )([0-9]+)' || echo "Failed to retrieve main queue"
          }

          d8_queue_list() {
            d8 p queue list | grep -Po '([0-9]+)(?= active)' || echo "Failed to retrieve list queue"
          }

          d8_queue() {
            local count=90
            local main_queue_ready=false
            local list_queue_ready=false

            for i in $(seq 1 $count) ; do
              if [ $(d8_queue_main) == "0" ]; then
                echo "Main queue is clear"
                main_queue_ready=true
              else
                echo "Show main queue"
                d8 p queue main | head -n25 || echo "Failed to retrieve main queue" 
              fi

              if [ $(d8_queue_list) == "0" ]; then
                echo "Queue list is clear"
                list_queue_ready=true
              else
                echo "Show queue list"
                d8 p queue list | head -n25 || echo "Failed to retrieve list queue"
              fi

              if [ "$main_queue_ready" = true ] && [ "$list_queue_ready" = true ]; then
                break
              fi
              echo "===="
              echo "Wait until queues are empty ${i}/${count}"
              echo "===="
              kubectl get ns
              echo "   "
              sleep 10
            done
          }

          cd test/dvp-over-dvp/storage/ceph
          export registry=${{ secrets.PROD_IO_REGISTRY_DOCKER_CFG }}
          yq e '.spec.registry.dockerCfg = env(registry)' -i 00-ms.yaml
          unset registry

          kubectl apply -f 00-ms.yaml
          d8 p queue list | head -n25 || echo "Failed to retrieve queue"

          kubectl get ms
          kubectl get mc

          kubectl apply -f 01-mc.yaml

          d8_queue

          echo "Wait for ceph operator and csi"
          for i in {1..60}; do
            ceph_operator_status=$(kubectl get ns d8-operator-ceph -o jsonpath='{.status.phase}' || echo "False")
            csi_ceph_status=$(kubectl get module csi-ceph -o jsonpath='{.status.phase}' || echo "False")
            if [ "${ceph_operator_status}" = "Active" ] && [ "${csi_ceph_status}" = "Ready" ]; then
              break
            fi
            echo "Waiting 10s for ceph operator and csi namespaces to be ready"
            echo "get ns"
            kubectl get ns | grep ceph
            
            if (( i % 5 == 0 )); then
              echo "= get ns ="
              kubectl get ns
              echo "====="
            fi
          done

          kubectl apply -f 02-sa.yaml
          kubectl apply -f 03-cm.yaml
          kubectl apply -f 04-cluster.yaml
          kubectl -n d8-operator-ceph get po
          
          echo "Wait for ceph operator"
          for i in {1..60}; do
            ceph_mgr=$(kubectl -n d8-operator-ceph get po | grep ceph-mgr | grep Running | wc -l)
            ceph_mon=$(kubectl -n d8-operator-ceph get po | grep ceph-mon | grep Running | wc -l)
            ceph_osd=$(kubectl -n d8-operator-ceph get po | grep ceph-osd | grep Running | wc -l)
            if [ "${ceph_mgr}" -ge "2"] && [ "${ceph_mon}" -ge "3" ] && [ "${ceph_osd}" -ge "3" ]; then
              break
            fi

            echo "Waiting 10s for ceph operator to be ready"
            kubectl -n d8-operator-ceph get po || echo "Failed to retrieve pods"
            if (( i % 5 == 0 )); then
              echo "= Get ceph ns ="
              kubectl get ns | grep ceph
              echo "= Get mc ="
              kubectl get mc | grep ceph
              echo "= Get modules ="
              kubectl get modules  -o wide | grep ceph
              echo "====="
              echo "Show queue"
              d8 p queue list | head -n25 || echo "Failed to retrieve list queue"
              echo "====="
            fi
          done
          
          
          # kubectl wait --for=condition=Ready pod -n d8-operator-ceph --timeout=600s

          echo "Show pods"
          kubectl get pods -n d8-operator-ceph

          kubectl apply -f 05-blockpool.yaml
          kubectl apply -f 06-toolbox.yaml

          chmod+x ./ceph-configre.sh
          ./ceph-configre.sh

          # ===================

          # kubectl get mc
          # kubectl get ns
          # echo "=========="
          # kubectl get modules
          # echo "=========="

          # for i in {1..60}; do
          #   csi_ceph_status=$(kubectl get module csi-ceph -o jsonpath='{.status.phase}' || echo "False")
          #   operator_ceph_status=$(kubectl get module operator-ceph -o jsonpath='{.status.phase}' || echo "False")
          #   snapshot_controller_status=$(kubectl get module snapshot-controller -o jsonpath='{.status.phase}' || echo "False")
            
          #   if [ "${csi_ceph_status}" = "Ready" ] && [ "${operator_ceph_status}" = "Ready" ] && [ "${snapshot_controller_status}" = "Ready" ]; then
          #     break
          #   fi
            
          #   echo "Waiting 10s for csi-ceph, operator-ceph, snapshot-controller modules to be ready"
          #   kubectl get modules
          #   if (( i % 5 == 0 )); then
          #     echo "= get ns ="
          #     kubectl get ns
          #     echo "= get mc ="
          #     kubectl get mc
          #     echo "= get modules ="
          #     kubectl get mc csi-ceph -o yaml
          #     kubectl get mc operator-ceph -o yaml
          #     echo "====="
          #   fi
            
          #   sleep 10
          # done



          # echo "Wait for csi-ceph"
          # kubectl wait --for=jsonpath='{.status.phase}'=Ready modules csi-ceph --timeout=600s || echo "csi-ceph is not ready"
          
          # echo "Wait for operator-ceph"
          # kubectl wait --for=jsonpath='{.status.phase}'=Ready modules operator-ceph --timeout=600s || echo "operator-ceph is not ready"
          
          # echo "Wait for snapshot-controller"
          # kubectl wait --for=jsonpath='{.status.phase}'=Ready modules snapshot-controller --timeout=600s || echo "snapshot-controller is not ready"
          
          # d8_queue
          # kubectl get mc
          # kubectl get ns
          # echo "=========="
          # kubectl get modules
          # echo "=========="

          # kubectl apply -f 02-sa.yaml
          # kubectl apply -f 03-cm.yaml
          # kubectl apply -f 04-cluster.yaml
          # kubectl -n d8-operator-ceph get po
          # kubectl wait --for=condition=Ready pod -n d8-operator-ceph --timeout=600s

          # echo "Show pods"
          # kubectl get pods -n d8-operator-ceph

          # kubectl apply -f 05-blockpool.yaml
          # kubectl apply -f 06-toolbox.yaml

          # chmod+x ./ceph-configre.sh
          # ./ceph-configre.sh
          
  configure-virtualization:
    name: Configure Virtualization (${{ inputs.storage_type }})
    runs-on: ubuntu-22.04
    needs:
      - bootstrap
      - configure-storage
    steps:
      - uses: actions/checkout@v4
      - name: Install kubectl CLI
        uses: azure/setup-kubectl@v4
      - name: Setup d8
        uses: ./.github/actions/install-d8

      - name: Check kubeconfig
        run: |
          echo "Configure kube config"
          mkdir -p ~/.kube
          echo "${{ needs.bootstrap.outputs.kubeconfig-content }}" | base64 -d | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config use-context nested-e2e-nested-sa

      - name: Configure Virtualization
        run: |
          echo "Apply Virtualization module config"
          kubectl apply -f -<<EOF
          apiVersion: deckhouse.io/v1alpha1
          kind: ModuleConfig
          metadata:
            name: virtualization
          spec:
            enabled: true
            settings:
              dvcr:
                storage:
                  persistentVolumeClaim:
                    size: 10Gi
                    storageClassName: ${{ inputs.nested_storageclass_name }}
                  type: PersistentVolumeClaim
              virtualMachineCIDRs:
                - 192.168.10.0/24
            source: deckhouse
            version: 1
          ---
          apiVersion: deckhouse.io/v1alpha2
          kind: ModulePullOverride
          metadata:
            name: virtualization
          spec:
            imageTag: ${{ env.VIRTUALIZATION_TAG }}
            scanInterval: 15s
          EOF
          
          echo "get mc virtualization"
          kubectl get mc virtualization

          echo "get mpo virtualization"
          kubectl get mpo virtualization
      - name: Wait for Virtualization to be ready
        run: |
          echo "Waiting for Virtualization module to be ready"
          # kubectl wait --for=jsonpath='{.status.phase}'=Ready modules virtualization --timeout=300s

          d8_queue_main() {
            d8 p queue main | grep -Po '(?<=length )([0-9]+)' || echo "Failed to retrieve main queue"
          }

          d8_queue_list() {
            d8 p queue list | grep -Po '([0-9]+)(?= active)' || echo "Failed to retrieve list queue"
          }

          d8_queue() {
            local count=90
            local main_queue_ready=false
            local list_queue_ready=false

            for i in $(seq 1 $count) ; do
              if [ $(d8_queue_main) == "0" ]; then
                echo "Main queue is clear"
                main_queue_ready=true
              else
                echo "Show main queue"
                d8 p queue main | head -n25 || echo "Failed to retrieve main queue" 
              fi

              if [ $(d8_queue_list) == "0" ]; then
                echo "Queue list is clear"
                list_queue_ready=true
              else
                echo "Show queue list"
                d8 p queue list | head -n25 || echo "Failed to retrieve list queue"
              fi

              if [ "$main_queue_ready" = true ] && [ "$list_queue_ready" = true ]; then
                break
              fi
              echo "===="
              echo "Wait until queues are empty ${i}/${count}"
              echo "===="
              kubectl get ns
              echo "   "
              sleep 10
            done
          }

          d8_queue


          for i in {1..30}; do
            virtualization_status=$(kubectl get modules virtualization -o jsonpath='{.status.phase}')
            if [ "$virtualization_status" == "Ready" ]; then
              kubectl get modules virtualization
              break
            fi
            echo "Waiting 10s for Virtualization module to be ready"
            kubectl get modules virtualization
            if (( i % 5 == 0 )); then
              kubectl get ns
              kubectl get ns virtualization || echo "ns virtualization is not ready"
            fi
            sleep 10
          done

          echo "Wait for pods to be ready"
          kubectl wait --for=condition=Ready pods --all -n d8-virtualization --timeout=600s
  e2e-test:
    name: E2E test (${{ inputs.storage_type }})
    runs-on: ubuntu-22.04
    needs:
      - bootstrap
      - configure-storage
      - configure-virtualization
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: "${{ env.GO_VERSION }}"

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install ginkgo
        working-directory: ./test/e2e/
        run: |
          echo "Install ginkgo"
          go install tool

      - name: Setup d8
        uses: ./.github/actions/install-d8

      - name: Install kubectl CLI
        uses: azure/setup-kubectl@v4

      - name: Check kubeconfig
        run: |
          echo "Configure kube config"
          mkdir -p ~/.kube
          echo "${{ needs.bootstrap.outputs.kubeconfig-content }}" | base64 -d | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config use-context nested-e2e-nested-sa

      - name: Download dependencies
        working-directory: ./test/e2e/
        run: |
          echo "Download dependencies"
          go mod download

      - name: Create vmclass for e2e tests
        run: |
          kubectl get vmclass/generic -o json | jq 'del(.status) | del(.metadata) | .metadata = {"name":"generic-for-e2e","annotations":{"virtualmachineclass.virtualization.deckhouse.io/is-default-class":"true"}} ' | kubectl create -f -

      - name: Run E2E
        id: e2e-tests
        working-directory: ./test/e2e/
        run: |
          STORAGE_CLASS_NAME=${{ inputs.nested_storageclass_name }} task run:ci -v LABELS="Slow"

  undeploy-cluster:
    name: Undeploy cluster (${{ inputs.storage_type }})
    runs-on: ubuntu-latest
    needs:
      - bootstrap
      - e2e-test
    if: ${{ cancelled() || success()}}
    steps:
      - uses: actions/checkout@v4

      - name: Install htpasswd utility
        run: |
          sudo apt-get update
          sudo apt-get install -y apache2-utils

      - name: Setup d8
        uses: ./.github/actions/install-d8

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: generated-files-${{ inputs.storage_type }}
          path: test/dvp-over-dvp/

      - name: Configure kubectl via azure/k8s-set-context@v4
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          context: e2e-cluster-nightly-e2e-virt-sa
          kubeconfig: ${{ secrets.VIRT_E2E_NIGHTLY_SA_TOKEN }}

      - name: infra-undeploy
        run: |
          cd test/dvp-over-dvp
          task infra-undeploy

