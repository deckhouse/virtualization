# DEV registry variable bundle.
#
# Carries forward the previous root .gitlab-ci.yml `.dev_vars` template.
# Anything that uses `extends: .dev_vars` gets MODULES_REGISTRY,
# MODULES_REGISTRY_LOGIN, MODULES_REGISTRY_PASSWORD, MODULES_MODULE_SOURCE
# and ENV=DEV, all sourced from the DEV_* Project Variables introduced in
# plan §11.6.
#
# The legacy EXTERNAL_MODULES_DEV_REGISTRY_* names are still accepted as
# fallback to ease the variable-rename migration; they are documented in
# .gitlab/README.md (TODO) as deprecated.

.dev_vars:
  variables:
    MODULES_REGISTRY: "${DEV_REGISTRY}"
    MODULES_REGISTRY_LOGIN: "${DEV_MODULES_REGISTRY_LOGIN}"
    MODULES_REGISTRY_PASSWORD: "${DEV_MODULES_REGISTRY_PASSWORD}"
    MODULES_MODULE_SOURCE: "${DEV_MODULE_SOURCE}"
    ENV: DEV
    # Backwards-compat fallback for the previous CI/CD variable names. Safe
    # to remove once Settings -> CI/CD -> Variables no longer carries the
    # EXTERNAL_MODULES_DEV_* entries (see .gitlab/README.md migration step).
    DEV_REGISTRY_FALLBACK_LOGIN: "${DEV_MODULES_REGISTRY_LOGIN}"
    DEV_REGISTRY_FALLBACK_PASSWORD: "${DEV_MODULES_REGISTRY_PASSWORD}"
