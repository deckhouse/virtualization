# Base deploy template (.base_deploy).
#
# Naming: this is the BASE crane-copy deploy job body extended by the prod
# release-channel deploy jobs (deploy_to_prod_* and prod:deploy:*). Previously
# named `.local_deploy`; renamed to `.base_deploy` for the same reason as
# `.base_build` ("local" was uninformative and clashed with `include: local:`).
# Note: there is no DEV deploy — the DEV registry has no release channels, so
# dev tags are build-only (see build_dev_tags).
#
# Mirrors upstream modules-gitlab-ci Deploy.gitlab-ci.yml `.deploy` body
# (verified in deckhouse/3p/deckhouse/modules-gitlab-ci
# templates/Deploy.gitlab-ci.yml, branch v13.0, HEAD 006d51c).
#
# Why a local copy (same reasoning as .base_build in build.yml):
#
#   Upstream `.deploy` has `rules: [{if: $CI_COMMIT_TAG}]` + `when: manual`
#   baked in. Because GitLab CI merges parent rules with parent-first
#   precedence, those rules would override our own gating.
#   The prod-channel chain (deploy_to_prod_*) wants `when: manual` from
#   .prod_manual, so the upstream `when: manual` happens to match — but we
#   still want explicit control. Keeping the upstream body in `.base_deploy`
#   means the same script is shared by all jobs but gating is fully driven
#   by our own templates.

.base_deploy:
  stage: deploy
  script:
    - bash .gitlab/ci/scripts/bash/check-runner-tools.sh crane
    - |
      REPO="${MODULES_MODULE_SOURCE}/${MODULES_MODULE_NAME}/release"

      IMAGE_SRC="${REPO}:${MODULES_MODULE_TAG}"
      IMAGE_DST="${REPO}:${RELEASE_CHANNEL}"

      echo "✨ Pushing ${IMAGE_SRC} to ${IMAGE_DST}"
      crane copy "${IMAGE_SRC}" "${IMAGE_DST}"
