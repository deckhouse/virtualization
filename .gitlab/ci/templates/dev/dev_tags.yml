# DEV pipeline context: dev-tag builds.
#
# Carries forward the previous root .gitlab-ci.yml `.dev_tags` template.
# Triggers on tags matching vX.Y.Z-dev* (regex kept identical to the
# previous regex101 link in the original .gitlab-ci.yml).
#
# Use case: a developer pushes v1.21.0-dev-build42 -> build_dev_tags runs,
# pushes images into DEV_REGISTRY tagged with the raw tag name, then
# deploy_for_dev_tag fans out across all release channels.

.dev_tags:
  variables:
    MODULES_MODULE_TAG: ${CI_COMMIT_REF_NAME}
  extends:
    - .dev_vars
  rules:
    # https://regex101.com/r/0VtnPP/1
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+-dev.*$/'
      when: always
    - when: never
