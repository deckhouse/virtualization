# DEV registry variable bundle.
#
# Anything that uses `extends: .dev_vars` authenticates against the DEV
# registry (via .login_dev_registry) and gets MODULES_MODULE_SOURCE and
# ENV=DEV, all sourced from the DEV_* Project Variables.

.dev_vars:
  extends:
    - .login_dev_registry
  variables:
    MODULES_MODULE_SOURCE: "${DEV_MODULE_SOURCE}"
    ENV: DEV
