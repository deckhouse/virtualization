# PROD pipeline context: manual prod release deploy.
#
# Carries forward the previous root .gitlab-ci.yml `.prod_manual` template.
# Runs on tags matching vX.Y.Z (no -dev suffix), with `when: manual` so
# each release channel deploy requires a human click.
#
# TODO: per plan §11.4.1, the GH release_module_release-channels.yml
# workflow exposes inputs (channel, ce/ee, tag, enableBuild,
# release_to_github, check_only, ...) that we currently collapse into
# hardcoded matrix (RELEASE_CHANNEL x EDITION) in deploy-prod.yml. Once we
# decide whether to expose that flexibility (likely via "Run pipeline"
# variables), this template will gain extra variables.
#
# The single-channel dispatch with Run-pipeline inputs (channel, editions,
# tag, enableBuild, check_only, release_to_gitlab, send_results_to_loop,
# requirements/version checks) is now implemented in
# .gitlab/ci/jobs/release-channels.yml (prod:* jobs). This template stays
# as the tag-push deploy context: each channel deploy is an independent
# `when: manual` job in the single `deploy_prod` stage (no forced
# alpha->...->rock-solid promotion chain; see virtualization-m9e.5.21).

.prod_manual:
  variables:
    MODULES_MODULE_TAG: ${CI_COMMIT_REF_NAME}
  extends:
    - .prod_vars
  rules:
    # https://regex101.com/r/lToOvi/1
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: manual
    - when: never
