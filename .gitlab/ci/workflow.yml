# Pipeline-level workflow rules.
#
# Intentionally minimal: we do NOT use `workflow:rules:` to gate individual
# jobs — gating is handled per-job via `rules:` against
# $CI_PIPELINE_SOURCE, $CI_COMMIT_BRANCH, $CI_COMMIT_TAG. The global
# workflow rules here only decide whether a pipeline is created at all.
#
# Behaviors preserved from the previous root .gitlab-ci.yml:
#   - MR pipelines (push + MR events) are always created.
#   - Pushes to main create a pipeline.
#   - Pushes of tags vX.Y.Z-dev* / vX.Y.Z create pipelines.
#   - Manual/scheduled/web pipelines always run.
#
# TODO: once auto-cancel-redundant-pipelines is verified at the project
# level, add `interruptible: true` here as a project default.
# Per-job overrides will set `interruptible: false` for build_prod and the
# prod-deploy chain.

workflow:
  rules:
    # MR pipelines always run.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Default-branch (main) pushes always create a pipeline. Listed before the
    # `when: never` dedup rule below so a main push is never skipped.
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    # Tag pushes (vX.Y.Z / vX.Y.Z-dev*) always create a pipeline (also matched
    # before the dedup rule).
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-dev.*)?$/
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
    # Avoid duplicate pipelines: a push to a non-default, non-tag branch that
    # already has an open MR would otherwise create BOTH a branch pipeline and
    # an MR pipeline. The predefined $CI_OPEN_MERGE_REQUESTS is non-empty only
    # when the pushed branch is the source of an open MR, so THIS rule is what
    # skips the redundant branch pipeline (keeping only the MR one). main / tags
    # / schedule / web are matched by the earlier rules and never reach here
    # (rules are first-match).
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_OPEN_MERGE_REQUESTS
      when: never
    # Plain branch push with no open MR: create the branch pipeline.
    - if: $CI_PIPELINE_SOURCE == "push"
