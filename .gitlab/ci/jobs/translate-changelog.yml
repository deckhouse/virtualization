# Translate Russian CHANGELOG/*.ru.yml to English and open an MR.
#
# Migration of .github/workflows/translate-changelog.yml which called
# deckhouse/modules-actions/translate-changelog@v10 (composite action).
#
# Per migration plan §0(2) we delegate to the upstream GitLab CI template at
# https://fox.flant.com/deckhouse/3p/deckhouse/modules-gitlab-ci (local checkout
# at /Users/korolevn/repos/Virtualization-tasks/github/3p-deckhouse/modules-gitlab-ci,
# branch v13.0, HEAD 006d51c35904b434eca2045a449aafb5e37a8827).
#
# The upstream template name is `.translate_and_create_mr` (see
# modules-gitlab-ci/templates/Translate_Changelog.gitlab-ci.yml).
#
# Required CI/CD variable: RELEASE_TOKEN (or GITLAB_API_TOKEN, alias).
# The upstream template prefers RELEASE_TOKEN; if unset it falls back to CI_JOB_TOKEN
# (works in GitLab 15.9+ for push and MR create).

include:
  - project: "deckhouse/3p/deckhouse/modules-gitlab-ci"
    ref: "v13.0"
    file: "/templates/Translate_Changelog.gitlab-ci.yml"

# Local job definition that extends the upstream hidden job.
# Tag override is intentional: we want our project's runner tag, not the
# upstream default.
translate:changelog:
  extends: .translate_and_create_mr
  stage: notify
  tags:
    - deckhouse
  before_script:
    - bash .gitlab/ci/scripts/bash/check-runner-tools.sh git curl jq python3
    - python3 -m venv /tmp/venv
    - /tmp/venv/bin/pip install --no-cache-dir deep-translator packaging
    - git -C "${CI_PROJECT_DIR}" config user.email "gitlab-ci@gitlab.com"
    - git -C "${CI_PROJECT_DIR}" config user.name "GitLab CI"
  variables:
    # Path to CHANGELOG dir (upstream default; explicit for clarity).
    TRANSLATE_CHANGELOG_PATH: "CHANGELOG"
    # Target branch the resulting MR should target.
    TRANSLATE_BASE_BRANCH: "main"
    # Upstream expects RELEASE_TOKEN or falls back to CI_JOB_TOKEN in its shell
    # script. GitLab does not evaluate shell parameter expansion in `variables:`;
    # set RELEASE_TOKEN explicitly in project CI/CD variables if CI_JOB_TOKEN
    # does not have enough permissions to push and create merge requests.
    # The local before_script intentionally replaces the upstream template's
    # container/package-manager setup so the job works on shell executors.
