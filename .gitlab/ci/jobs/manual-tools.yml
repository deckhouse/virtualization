# Manual / scheduled helper jobs that don't fit elsewhere.
#
# Currently:
#   - mrs:summary  : post a Loop summary of open MRs (GitLab counterpart of
#                    .github/workflows/dev_prs-summary.yml / .github/scripts/prs_notifier.mjs).
#
# Migration plan §0(1) explicitly removes GitHub slash-command dispatch
# (/.github/workflows/dispatch-slash-command.yml) and replaces it with
# manual pipelines. The two manual jobs in this file are the closest
# equivalents. There is no automated webhook listener yet (TODO in README).

# Variables for "Run pipeline" UI:
#   LOOP_WEBHOOK_URL     (required)  Loop incoming webhook URL.
#   DOC_REVIEWER         (optional)  GitLab username of doc reviewer.
#   MANAGER_LOOP_NAME    (optional)  @firstname.lastname of the manager.

mrs:summary:
  stage: notify
  # TODO_RUNNER_TAG: confirm registered runner tag at
  # https://fox.flant.com/deckhouse/virtualization/-/runners after registration.
  tags:
    - deckhouse
  before_script:
    - bash .gitlab/ci/scripts/bash/check-runner-tools.sh node npm
    - corepack enable || true
    - cd .gitlab/scripts/js
    - npm ci --omit=dev || npm install --omit=dev
  script:
    - node mrs_notifier.mjs
  rules:
    # Manual trigger from "Run pipeline" UI.
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
    # Scheduled daily run (e.g. 10:00 Moscow time — configure in
    # Settings -> CI/CD -> Schedules).
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: manual
      allow_failure: true
