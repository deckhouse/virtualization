# Manual / scheduled helper jobs that don't fit elsewhere.
#
# Currently:
#   - mrs:summary  : post a Loop summary of open MRs (GitLab counterpart of
#                    .github/workflows/dev_prs-summary.yml / .github/scripts/prs_notifier.mjs).
#
# GitHub slash-command dispatch
# (/.github/workflows/dispatch-slash-command.yml) is removed and replaced
# with manual pipelines. The two manual jobs in this file are the closest
# equivalents. There is no automated webhook listener, and this is an
# accepted permanent gap (no webhook-listener will be built).

# Variables for "Run pipeline" UI:
#   LOOP_WEBHOOK_URL     (required)  Loop incoming webhook URL.
#   DOC_REVIEWER         (optional)  GitLab username of doc reviewer.
#   MANAGER_LOOP_NAME    (optional)  @firstname.lastname of the manager.

mrs:summary:
  stage: notify
  tags:
    - deckhouse
  before_script:
    - bash .gitlab/ci/scripts/bash/check-runner-tools.sh docker
  script:
    - |
      set -e
      # The shell runner host has no Node.js (see test:scripts:js and
      # variables.yml NODE_VERSION), so run the notifier inside
      # node:${NODE_VERSION}. The repo is mounted read-only and copied to an
      # ephemeral tmpdir so npm's node_modules never lands in the shared
      # shell-executor workspace (root-owned files there break git clean).
      # Runtime env is forwarded with -e; the container has outbound network
      # for the GitLab API and the Loop webhook.
      docker run --rm --platform linux/amd64 \
        -v "${PWD}:/src:ro" \
        -u "$(id -u):$(id -g)" \
        -e HOME=/tmp \
        -e CI_API_V4_URL -e CI_PROJECT_ID -e GITLAB_API_TOKEN \
        -e LOOP_WEBHOOK_URL -e DOC_REVIEWER -e MANAGER_LOOP_NAME \
        node:${NODE_VERSION} \
        sh -c '
          set -e
          work="$(mktemp -d)"
          cp -a /src/.gitlab/scripts/js/. "$work"/
          cd "$work"
          npm ci --omit=dev --no-audit --no-fund --cache /tmp/.npm
          node mrs_notifier.mjs
        '
  rules:
    # Manual trigger from "Run pipeline" UI.
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
    # Scheduled daily run (e.g. 10:00 Moscow time — configure in
    # Settings -> CI/CD -> Schedules), under the dedicated mrs-summary
    # pipeline schedule ($SCHEDULE_TYPE == "mrs-summary").
    - if: $CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_TYPE == "mrs-summary"
      when: manual
      allow_failure: true
