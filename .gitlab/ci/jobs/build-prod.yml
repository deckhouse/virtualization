# PROD build job.
#
# Builds the module images for every edition on tag push (vX.Y.Z), then
# leaves the deploy step to .gitlab/ci/jobs/deploy-prod.yml.
#
# Parity with .github/workflows/release_module_build-and-registration.yml:
# four editions ce / ee / se-plus / fe, each with its own
# MODULES_MODULE_SOURCE subpath and the correct MODULE_EDITION (CE only for
# ce, EE for ee/se-plus/fe). MODULE_EDITION is consumed by
# .werf/consts.yaml (defaults to EE) and used as a Go build tag plus an
# EE-only image gate, so it MUST be set per edition — otherwise the ce prod
# image is built as EE.
#
# Note vs GitHub: GH runs ce and ee in parallel, then se-plus and fe after
# ee (needs: prod_ee_setup_build). The GitLab matrix runs all four in
# parallel. Each edition builds into its own registry subpath with no shared
# artifact, so the GH `needs: ee` ordering is a sequencing/resource guard,
# not a data dependency; the parallel matrix is acceptable.
#
# Resource group: prod — prevents two prod builds from racing.
#
# Upstream .build expects MODULES_MODULE_SOURCE and WERF_REPO; .prod_vars
# sets MODULES_MODULE_SOURCE per-edition (PROD_REGISTRY/PROD_MODULE_SOURCE_NAME/
# EDITION/modules), and WERF_REPO defaults to MODULES_MODULE_SOURCE/
# MODULES_MODULE_NAME in upstream Setup — correct for prod.
#
# `.also_login_dev_registry` is included so the second `werf cr login` from
# upstream Setup.gitlab-ci.yml also fires against DEV_REGISTRY; the
# previous GH workflow did both logins via two consecutive
# modules-actions/setup steps; we keep that behavior.
# `.werf_secondary_repo` sets WERF_SECONDARY_REPO_1 so `werf build` reuses already-
# built layers from the DEV registry — the GH `secondary_repo` input to build@v4.
# It lives on build jobs only (deploy jobs crane-copy, never build).

build_prod:
  stage: build
  resource_group: prod
  # interruptible: false is inherited from .prod_vars (via .prod_always).
  extends:
    - .base_build
    - .prod_always
    - .also_login_dev_registry
    - .werf_secondary_repo
  parallel:
    matrix:
      - EDITION: ce
        MODULE_EDITION: CE
      - EDITION: ee
        MODULE_EDITION: EE
      - EDITION: se-plus
        MODULE_EDITION: EE
      - EDITION: fe
        MODULE_EDITION: EE
