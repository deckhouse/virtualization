# Validate ```changes fenced blocks in MR description.
#
# Migration of .github/workflows/check-changelog-entry.yml which used
# deckhouse/changelog-action@v2.6.0 with validate_only=true.
# Per migration plan §11.11 the validation is implemented in Python and
# uses .gitlab/ci/changelog-sections.txt as the source of truth.
# Required CI/CD variable: GITLAB_API_TOKEN (Project Access Token, scope api).

check:changelog:
  stage: lint
  # TODO_RUNNER_TAG: confirm registered runner tag at
  # https://fox.flant.com/deckhouse/virtualization/-/runners after registration.
  tags:
    - deckhouse
  before_script:
    - bash .gitlab/ci/scripts/bash/check-runner-tools.sh bash curl jq python3
  script:
    - bash .gitlab/ci/scripts/bash/check-changelog-entry.sh
  rules:
    # Skip-label must be first because GitLab rules are evaluated first-match.
    - if: $CI_MERGE_REQUEST_LABELS =~ /validation\/skip\/check_changelog/
      when: never
    # Run on MR pipelines only.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
