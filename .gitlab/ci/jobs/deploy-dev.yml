# DEV deploy job.
#
# Carries forward deploy_for_dev_tag from the previous root .gitlab-ci.yml.
# Fans out across the five release channels (alpha / beta / early-access /
# stable / rock-solid) once build_dev_tags has finished.
#
# Extends:
#   - .deploy         (upstream modules-gitlab-ci Deploy.gitlab-ci.yml — release-channel crane copy)
#   - .dev_tags       (this repo — DEV registry vars + tag-match rule)
#
# The upstream .deploy template only runs on $CI_COMMIT_TAG (rule from
# Deploy.gitlab-ci.yml), which matches .dev_tags's tag regex
# vX.Y.Z-dev.* — behavior preserved.
#
# Need: build_dev_tags -> deploy_for_dev_tag. (Kept as a `needs:` line —
# same as the previous root .gitlab-ci.yml.)

deploy_for_dev_tag:
  stage: deploy_dev
  needs: ['build_dev_tags']
  extends:
    - .local_deploy
    - .dev_tags
    - .dual_registry_login
  parallel:
    matrix:
      - RELEASE_CHANNEL:
          - alpha
          - beta
          - early-access
          - stable
          - rock-solid
