# DMT (Deckhouse Module Tester) linter.
#
# Ports the GitHub Actions `lint_dmt` job from
# .github/workflows/dev_module_build.yml, which ran
# deckhouse/modules-actions/lint@v2 with continue-on-error: true.
#
# The upstream modules-gitlab-ci Build.gitlab-ci.yml ships a hidden `.lint`
# template that runs `dmt lint ./` with allow_failure: true. We do NOT
# include Build.gitlab-ci.yml directly: its `.build`/`.deploy` hidden jobs
# carry baked-in `rules:` that would bypass our strict .dev/.main/.prod
# gating (see .gitlab/ci/includes.yml). Instead this job mirrors the `.lint`
# script body and relies on the global `before_script` from
# Setup.gitlab-ci.yml (already included) to install dmt via trdl.
#
# dmt is NOT a host tool (it is installed per-job via trdl), so this job
# intentionally does NOT override `before_script` with check-runner-tools.sh;
# it inherits Setup's before_script, which performs the trdl+dmt bootstrap.
#
# DMT_METRICS_URL / DMT_METRICS_TOKEN are optional CI/CD variables consumed
# by dmt for metrics reporting.

lint:dmt:
  stage: lint
  allow_failure: true
  script:
    - dmt lint ./
  extends:
    - .dev
