# Verify MR has a milestone assigned (GitLab API check).
#
# Migration of .github/workflows/check-pr-milestone.yml.
# Required CI/CD variable: GITLAB_API_TOKEN (Project Access Token, scope api).

check:milestone:
  stage: lint
  # TODO_RUNNER_TAG: confirm registered runner tag at
  # https://fox.flant.com/deckhouse/virtualization/-/runners after registration.
  tags:
    - deckhouse
  before_script:
    - bash .gitlab/ci/scripts/bash/check-runner-tools.sh bash curl jq
  script:
    - bash .gitlab/ci/scripts/bash/check-milestone.sh
  rules:
    # Skip-label must be first because GitLab rules are evaluated first-match.
    - if: $CI_MERGE_REQUEST_LABELS =~ /validation\/skip\/check_milestone/
      when: never
    # MR open/synchronize/reopen/milestone changes.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
