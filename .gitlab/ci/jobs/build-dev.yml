# DEV build jobs.
#
# Four jobs build the module into the DEV registry, one per pipeline context:
#   build_dev          MR pipelines        (.dev,      tag mr<iid>)
#   build_dev_tags     vX.Y.Z / -rc.N tag  (.dev_tags, tag = the tag name)
#   build_main         push to main        (.main,     tag main)
#   build_release      push to release-X.Y (.release,  tag = branch name)
#
# They are IDENTICAL except for that context template (which supplies
# MODULES_MODULE_TAG + the trigger rule), so the common body lives once in the
# hidden `.dev_build` base below and each job is just `extends: [.dev_build,
# <context>]`. The four jobs are kept distinct (not collapsed into one job with
# rule-variables) so each context shows up as its own named, independently
# retriable job in the pipeline UI.
#
# .dev / .main are intentionally NOT folded into .dev_build: they are reused as
# context mixins by other jobs (tests, lint:dmt, show_*_manifest, precache), so
# they must stay standalone. .dev_tags / .release are build-only today.

# Shared base for the DEV-registry build jobs.
#
# - .base_build (this repo): consumes the upstream modules-gitlab-ci
#   Build.gitlab-ci.yml `.build_base` (werf build --save-build-report + bundle/
#   attestation crane copy + release-channel crane copy + crane append to
#   register the module), which is rules-free so it does not override our strict
#   gating. Upstream uses WERF_REPO env instead of an explicit --repo flag,
#   equivalent here because MODULES_MODULE_SOURCE is the same.
#
# - `needs: [set_vars]` (with artifacts) opts these jobs into DAG mode and pulls
#   ONLY the set_vars dotenv (MODULE_EDITION, DEBUG_COMPONENT, RELEASE_IN_DEV).
#   It replaces a bare `needs: []` whose purpose was to stop GitLab's legacy
#   behavior of downloading ALL prior-stage artifacts and leaking unrelated
#   dotenv (e.g. svace:set-vars writes MODULES_MODULE_TAG=<branch>-svace, which
#   would override the per-context MODULES_MODULE_TAG). Listing set_vars
#   explicitly keeps that protection; set_vars does NOT emit MODULES_MODULE_TAG,
#   so the per-context tag from .dev / .dev_tags / .main / .release is preserved.
#
# - WERF_VIRTUAL_MERGE=0 mirrors the GitHub dev_setup_build job env.
#
# - interruptible: true is inherited from the global default
#   (.gitlab/ci/defaults.yml), so a new push to the same MR/branch cancels the
#   older in-flight build.
.dev_build:
  stage: build
  needs:
    - job: set_vars
      artifacts: true
  variables:
    WERF_VIRTUAL_MERGE: "0"
  extends:
    - .base_build

build_dev:
  extends:
    - .dev_build
    - .dev

build_dev_tags:
  extends:
    - .dev_build
    - .dev_tags

build_main:
  extends:
    - .dev_build
    - .main

# build_dev_manual: build ANY existing tag into the DEV registry from a web
# (Run pipeline) dispatch — including tags too old to rebuild any other way.
#
# Why it can't be a tag pipeline: a GitLab tag pipeline loads its .gitlab-ci.yml
# from the tagged commit, so an old tag whose commit predates this CI layout
# yields an empty (or wrong) pipeline; "run pipeline on the tag" cannot fix that.
# GitHub avoids this because workflow_dispatch always runs the workflow file from
# the branch and the job checks out the requested tag itself. This job mirrors
# that flow: run it for a BRANCH (Run pipeline for = main) with BUILD_TAG set;
# the job checks out tags/$BUILD_TAG and builds it, so the CI on main is what
# runs while any tag is a valid build input.
#
# Decoupled from set_vars (needs: []): MODULE_EDITION is hardcoded EE like the
# GitHub dev flow, so there is no needs: edge to satisfy and set_vars' rules
# (which don't cover this web+BUILD_TAG case) are irrelevant. DEBUG_COMPONENT
# defaults to "" (werf.yaml) and MODULE_EDITION to "EE" (.werf/consts.yaml), so
# no other set_vars output is needed. RELEASE_IN_DEV is not read by the build.
#
# GIT_STRATEGY=clone + GIT_DEPTH=0 give a full clone so even an ancient tag is
# fetchable; `git fetch --tags` then guarantees the ref is present. The checkout
# runs at the START of script:, AFTER the upstream Setup before_script (werf
# setup + registry login — neither depends on git HEAD) and BEFORE `werf build`,
# so werf builds the tag's committed tree under giterminism.
build_dev_manual:
  stage: build
  needs: []
  variables:
    WERF_VIRTUAL_MERGE: "0"
    GIT_STRATEGY: clone
    GIT_DEPTH: "0"
    MODULES_MODULE_TAG: "${BUILD_TAG}"
    MODULE_EDITION: "EE"
  extends:
    - .dev_vars
    - .base_build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $BUILD_TAG =~ /^v\d+\.\d+\.\d+(-rc\.\d+)?$/'
      when: always
    - when: never
  script:
    - git fetch --tags --force
    - git checkout "tags/${BUILD_TAG}"
    - !reference [.base_build, script]

# build_release mirrors GitHub dev_module_build.yml `push: [release-*]`: a
# squash-merge into a release-X.Y branch rebuilds the dev image tagged with the
# branch name. Without this job GitLab created a pipeline on the merge push but
# built nothing for release branches.
build_release:
  extends:
    - .dev_build
    - .release
