# ---------------------------------------------------------------------------
# yaml (prettier)
# ---------------------------------------------------------------------------

lint:yaml:
  stage: lint
  # TODO_RUNNER_TAG: confirm real runner tag on fox.flant.com runner pool.
  interruptible: true
  image:
    name: golang:1.25.11
    entrypoint: ['']
  before_script:
    - go install github.com/go-task/task/v3/cmd/task@latest
  script:
    - task lint:prettier:yaml
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        paths:
          - '**/*.yaml'
          - '**/*.yml'
          - '.gitlab-ci.yml'
          - '.gitlab/**/*'
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        paths:
          - '**/*.yaml'
          - '**/*.yml'
          - '.gitlab-ci.yml'
          - '.gitlab/**/*'

# ---------------------------------------------------------------------------
# helm_templates
#
# GH used dorny/paths-filter to gate this on changes to helm-related
# files. GitLab equivalent: rules.changes.
# ---------------------------------------------------------------------------

lint:helm-templates:
  stage: lint
  # TODO_RUNNER_TAG: confirm real runner tag on fox.flant.com runner pool.
  interruptible: true
  image:
    name: golang:1.25.11
    entrypoint: ['']
  before_script:
    - go install github.com/go-task/task/v3/cmd/task@latest
  script:
    - task validation:helm-templates
  rules:
    - *skip_helm_templates
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        paths: *changes_helm_templates
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        paths: *changes_helm_templates

# ---------------------------------------------------------------------------
# check_gens_files
#
# Matrix over components. Each component regenerates files via
# `task controller:dev:gogenerate` / `task generate` / `task
# vm-route-forge:gen` and fails if `git diff --exit-code` reports
# any drift against origin/main (or the current branch base).
# ---------------------------------------------------------------------------

check:gens-files:
  stage: lint
  # TODO_RUNNER_TAG: heavy jobs may need [deckhouse, large] once runners
  # are registered.
  interruptible: true
  image:
    name: golang:1.25.11
    entrypoint: ['']
  before_script:
    - go install github.com/go-task/task/v3/cmd/task@latest
    - apt-get update && apt-get install -y -qq git
  script:
    - |
      set -e
      function check_diffs() {
        local folder="$1"
        if ! git diff --exit-code -- "$folder"; then
          echo "::error title=Generated files out of date::Run 'go generate' / 'task generate' for $folder and commit the diff."
          echo "--- git diff ---"
          git diff origin/main -- "$folder" || true
          echo "--- end ---"
          exit 1
        fi
        echo "OK: $folder"
      }
      case "$COMPONENT" in
        virtualization-artifact)
          (cd images/virtualization-artifact && go install tool)
          task controller:dev:gogenerate
          check_diffs images/virtualization-artifact
          ;;
        vm-route-forge)
          task vm-route-forge:gen
          check_diffs images/vm-route-forge
          ;;
        api)
          (cd api && go install tool)
          task generate
          check_diffs api
          ;;
        *)
          echo "Unknown COMPONENT: $COMPONENT"; exit 1 ;;
      esac
  parallel:
    matrix:
      - COMPONENT: [virtualization-artifact, api]
      - COMPONENT: vm-route-forge
        RUN_ON_CHANGE: "true"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        paths: *changes_go_generated
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        paths: *changes_vm_route_forge
    - if: '$CI_COMMIT_BRANCH == "main"'

# ---------------------------------------------------------------------------
# gitlab-ci-lint
#
# Replaces the legacy actionlint job (decision #5). Runs only when the
# GitLab CI configuration itself changes. Uses the GitLab CI Lint API
# at ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/ci/lint.
#
# Authentication: PRIVATE-TOKEN via GITLAB_API_TOKEN (project access
# token, scope api). The script lives in
# .gitlab/ci/scripts/gitlab-ci-lint.sh (owned by this issue).
# ---------------------------------------------------------------------------

lint:gitlab-ci:
  stage: lint
  # TODO_RUNNER_TAG: confirm real runner tag on fox.flant.com runner pool.
  interruptible: true
  image:
    name: alpine:3.20
    entrypoint: ['']
  before_script:
    - apk add --no-cache bash curl jq
  script:
    - bash .gitlab/ci/scripts/gitlab-ci-lint.sh
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        paths:
          - '.gitlab-ci.yml'
          - '.gitlab/**/*'
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        paths:
          - '.gitlab-ci.yml'
          - '.gitlab/**/*'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
