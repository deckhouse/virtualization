# Validation, lint, scan, and gitlab-ci lint jobs.
#
# This file is the direct migration of the GitHub Actions workflow
# .github/workflows/dev_validation.yaml (paths_filter + no_cyrillic +
# doc_changes + shellcheck + helm_templates + check_gens_files).
#
# Per the migration plan (decision #5), the `actionlint` job from the GH
# workflow is intentionally NOT migrated. In its place we run the new
# `lint:gitlab-ci` job that validates the GitLab CI configuration itself
# via the GitLab CI Lint API. The legacy skip-label
# `validation/skip/actionlint` is therefore obsolete and not honored.
#
# Each job:
# - inherits `tags: [deckhouse]` from .gitlab/ci/defaults.yml;
# - emits a `# TODO_RUNNER_TAG:` comment where the real runner tag (e.g.
#   large / regular) might need to replace `deckhouse` once runners are
#   registered on fox.flant.com/deckhouse/virtualization;
# - has `interruptible: true` where short-lived (safe to cancel on a new
#   push) and `interruptible: false` where a long run is expected;
# - honors `validation/skip/<name>` labels via `when: never` rules.
#
# The job file assumes the upstream template include for
# `/templates/Setup.gitlab-ci.yml` from deckhouse/3p/deckhouse/modules-gitlab-ci@v13.0
# is in scope so that the shared `default:` and `stages:` are merged.
# It also assumes the `lint` stage is declared in .gitlab/ci/stages.yml.
#
# Coordination note: the parent .gitlab/ci/includes.yml (owned by the
# epic owner) is responsible for adding `local:` entries for this file.

# ---------------------------------------------------------------------------
# Shared change-path anchors
# ---------------------------------------------------------------------------

# Paths that should re-run helm_templates validation. Mirrors the GH
# paths_filter `helm_templates` block from dev_validation.yaml.
.changes_helm_templates: &changes_helm_templates
  - 'crds/**/*'
  - 'charts/**/*'
  - 'tools/kubeconform/**/*'
  - 'templates/**/*'
  - '.helmignore'
  - 'Chart.yaml'
  - 'Taskfile.yaml'

# Paths that should re-run the vm-route-forge generated-files check.
.changes_vm_route_forge: &changes_vm_route_forge
  - 'images/vm-route-forge/bpf/route_watcher.c'
  - 'images/vm-route-forge/**/*'

# Paths that should re-run the api/controller generated-files checks.
.changes_go_generated: &changes_go_generated
  - 'api/**/*'
  - 'images/virtualization-artifact/**/*'
  - 'go.mod'
  - 'go.sum'

# Skip labels - exact match against validation/skip/* labels from the GH
# workflow. The `actionlint` skip is intentionally omitted (decision #5).
.skip_no_cyrillic: &skip_no_cyrillic
  - if: '$CI_MERGE_REQUEST_LABELS =~ /validation\/skip\/no_cyrillic/'
    when: never
.skip_doc_changes: &skip_doc_changes
  - if: '$CI_MERGE_REQUEST_LABELS =~ /validation\/skip\/doc_changes/'
    when: never
.skip_shellcheck: &skip_shellcheck
  - if: '$CI_MERGE_REQUEST_LABELS =~ /validation\/skip\/shellcheck/'
    when: never
.skip_helm_templates: &skip_helm_templates
  - if: '$CI_MERGE_REQUEST_LABELS =~ /validation\/skip\/helm_templates/'
    when: never

# ---------------------------------------------------------------------------
# no_cyrillic
# ---------------------------------------------------------------------------

lint:no-cyrillic:
  stage: lint
  # TODO_RUNNER_TAG: confirm real runner tag on fox.flant.com runner pool.
  interruptible: true
  image:
    name: golang:1.25.11
    entrypoint: ['']
  before_script:
    - go install github.com/go-task/task/v3/cmd/task@latest
  script:
    - task validation:no-cyrillic
  rules:
    - *skip_no_cyrillic
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^release-/'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

# ---------------------------------------------------------------------------
# doc_changes
# ---------------------------------------------------------------------------

lint:doc-changes:
  stage: lint
  # TODO_RUNNER_TAG: confirm real runner tag on fox.flant.com runner pool.
  interruptible: true
  image:
    name: golang:1.25.11
    entrypoint: ['']
  before_script:
