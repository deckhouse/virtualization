# Gitleaks secrets scanning.
#
# Migration of:
#   - .github/workflows/gitleaks-scan-on-pr.yml        (PR diff scan)
#   - .github/workflows/gitleaks-scan-on-schedule.yml  (daily full scan)
#
# Both GH workflows invoked `deckhouse/modules-actions/gitleaks@v6`. The
# upstream modules-gitlab-ci@v13.0 `.gitleaks_scan` template provides
# the same functionality via the GitLab-native gitleaks release binary.
# The upstream template already exposes three reusable jobs:
#
#   gitleaks_diff            -> SCAN_MODE=diff, runs on MR
#   gitleaks_full_manual     -> SCAN_MODE=full, manual
#   gitleaks_full_scheduled  -> SCAN_MODE=full, schedule
#
# We re-declare each of them here with project-specific names and stage/rules
# so the owner of this file can adjust rules:changes / labels without touching
# the upstream file. The upstream file also defines visible jobs; because this
# local file is included after the upstream template, these same-name overrides
# disable those generic jobs and leave only the project-specific jobs below.

# Disable generic visible jobs from the upstream include. Keep the hidden
# `.gitleaks_scan` template active for project-specific jobs below.
#
# These overrides MUST set `stage: scan`: the upstream `.gitleaks_scan`
# template declares `stage: gitleaks`, but that stage was removed from
# stages.yml (it was dead — every active gitleaks job runs in `scan`). Even
# with `when: never`, GitLab validates the stage exists at config-parse
# time, so leaving the inherited `gitleaks` stage here would break the
# pipeline.
gitleaks_diff:
  extends: .gitleaks_scan
  stage: scan
  rules:
    - when: never

gitleaks_full_manual:
  extends: .gitleaks_scan
  stage: scan
  rules:
    - when: never

gitleaks_full_scheduled:
  extends: .gitleaks_scan
  stage: scan
  rules:
    - when: never

gitleaks:diff:
  extends: .gitleaks_scan
  stage: scan
  interruptible: true
  variables:
    SCAN_MODE: "diff"
    GIT_DEPTH: "0"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

gitleaks:full:scheduled:
  extends: .gitleaks_scan
  stage: scan
  interruptible: false
  variables:
    SCAN_MODE: "full"
    GIT_DEPTH: "0"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_TYPE == "gitleaks-full"'

gitleaks:full:manual:
  extends: .gitleaks_scan
  stage: scan
  interruptible: false
  variables:
    SCAN_MODE: "full"
    GIT_DEPTH: "0"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
    - when: never
