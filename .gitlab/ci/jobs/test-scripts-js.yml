# JS smoke tests for .gitlab/scripts/js.
#
# Ports the GitHub Actions `test_scripts_js` job from
# .github/workflows/dev_module_build.yml, which ran `npm test` in
# .github/scripts/js with Node.js 24. The GitLab counterpart lives in
# .gitlab/scripts/js (mrs_notifier.mjs); its `npm test` runs node:test over
# mrs_notifier.test.mjs, a minimal smoke test (syntax check + structural
# assertions) because mrs_notifier.mjs auto-runs at import time and cannot
# yet be imported by a unit test. See mrs_notifier.test.mjs for the TODO
# on adding real unit tests.
#
# The shell runner host does not ship Node.js, so the job runs inside the
# official `node:${NODE_VERSION}` image via `docker run`, mirroring how
# check:gens-files runs the vm-route-forge leg in cilium/ebpf-builder. The
# repo is bind-mounted READ-ONLY at /src and copied to an ephemeral tmpdir
# inside the container, so node_modules/package-lock.json never pollute the
# shared shell-executor workspace (root-owned files there break `git clean`
# on subsequent checkouts of unrelated jobs).
# TODO: commit a package-lock.json and switch to `npm ci`.

test:scripts:js:
  stage: test
  interruptible: true
  before_script:
    - bash .gitlab/ci/scripts/bash/check-runner-tools.sh docker
  script:
    - |
      set -e
      # Run npm in a throwaway tmpdir INSIDE the container so node_modules
      # and package-lock.json never land in the shared shell-executor
      # workspace. Previously npm ran directly against a read-write
      # bind-mount of the repo: under the default container uid (root) it
      # created root-owned node_modules/ that the runner-user could not
      # remove, which broke `git clean` on the next job's checkout and
      # failed unrelated jobs (show_dev_manifest, gitleaks:diff, ...) with
      # "warning: failed to remove ...: Permission denied".
      #
      # The repo is mounted read-only at /src; the test sources are copied
      # to an ephemeral tmpdir where npm install/npm test execute.
      docker run --rm --platform linux/amd64 \
        -v "${PWD}:/src:ro" \
        -u "$(id -u):$(id -g)" \
        -e HOME=/tmp \
        node:${NODE_VERSION} \
        sh -c '
          set -e
          work="$(mktemp -d)"
          cp -a /src/.gitlab/scripts/js/. "$work"/
          cd "$work"
          npm install --no-audit --no-fund --cache /tmp/.npm
          npm test
        '
  extends:
    - .dev
