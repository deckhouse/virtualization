# Unit-test jobs.
#
# Carries forward the test jobs from the previous root .gitlab-ci.yml:
#   test:virtualization-controller  -> task virtualization-controller:init + test:unit
#   test:hooks                      -> task gohooks:test
#
# Go linting of every module (.golangci.yaml dirs) lives in
# .gitlab/ci/jobs/lint-validate.yml -> lint:go (migration of the GH lint_go job);
# the old single-dir lint:virtualization-controller job was removed as redundant.
#
# All test jobs extend .dev so they only run on MR pipelines with the right
# MODULES_MODULE_TAG/registry context.

# `needs: []` mirrors the GitHub dev_module_build.yml `test` job, which has no
# `needs` and runs on every PR push (pull_request: synchronize) independently of
# lint/build. Without it the test jobs sit in the `test` stage waiting for the
# whole `lint` stage to succeed, which a still-unplayed blocking manual job
# (e.g. changelog:milestone) can stall indefinitely. DAG mode lets unit tests
# start immediately on every MR pipeline.
test:virtualization-controller:
  stage: test
  needs: []
  script:
    - bash .gitlab/ci/scripts/bash/check-runner-tools.sh task
    - task virtualization-controller:init
    - task virtualization-controller:test:unit
  extends:
    - .dev

test:hooks:
  stage: test
  needs: []
  script:
    - bash .gitlab/ci/scripts/bash/check-runner-tools.sh task
    - task gohooks:test
  extends:
    - .dev
