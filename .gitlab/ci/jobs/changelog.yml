# Re-generate CHANGELOG files for a milestone and (optionally) open a MR.
#
# Migration of:
#   - .github/workflows/changelog-by-milestone.yml  (issues.milestoned)
#   - .github/workflows/changelog-by-pull.yml       (pull_request_target)
#   - .github/workflows/changelog-command.yml       (repository_dispatch /changelog)
# All three used ./.github/actions/milestone-changelog (composite action).
#
# The GitLab jobs are manual + scheduled, NOT reactive. Reactive webhook automation (slash-command-equivalents,
# label/milestone events) is an accepted permanent gap — no webhook-listener
# will be built.
#
# Required CI/CD variable: GITLAB_API_TOKEN (Project Access Token, scope api).

# Variables exposed at "Run pipeline" UI:
#   MILESTONE_TITLE    - if set, generate only this milestone (e.g. "v1.21.3").
#                        Leave empty to iterate over all active milestones.
#   OPEN_CHANGELOG_MR  - "true" to push a branch and open a changelog MR.
#                        Defaults to "false" (files only, no MR).
#   CHANGELOG_BASE_BRANCH - target branch (default "main").

changelog:milestone:
  stage: lint
  # Mutates state (commits + opens an MR); never auto-cancel mid-run.
  interruptible: false
  tags:
    - deckhouse
  before_script:
    - bash .gitlab/ci/scripts/bash/check-runner-tools.sh bash git curl jq ssh-agent ssh-add python3
  script:
    - bash .gitlab/ci/scripts/bash/changelog-milestone.sh
  variables:
    MILESTONE_TITLE: ""
    OPEN_CHANGELOG_MR: "false"
    CHANGELOG_BASE_BRANCH: "main"
  rules:
    # Mode 1: manual with optional MILESTONE_TITLE / OPEN_CHANGELOG_MR vars.
    # allow_failure: true is REQUIRED here: `when: manual` inside `rules:`
    # defaults to allow_failure: false, which makes the (unplayed) manual job
    # block every later stage of the MR pipeline (test/build/...). GitHub ran
    # changelog generation in a separate workflow, fully decoupled from the
    # build/test pipeline, so this manual job must be non-blocking/optional.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
      allow_failure: true
    # Mode 2: scheduled daily run. We intentionally do NOT auto-open the MR on
    # schedule; set OPEN_CHANGELOG_MR=true in the schedule definition if you
    # want MRs created. Runs automatically under the dedicated
    # changelog-milestone pipeline schedule
    # ($SCHEDULE_TYPE == "changelog-milestone").
    - if: $CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_TYPE == "changelog-milestone"

# Optional: process all active milestones (one MR per milestone).
# Run on a schedule (e.g. nightly). Iterates over all open milestones and
# generates CHANGELOG files locally; OPEN_CHANGELOG_MR controls whether
# MRs are opened.
changelog:all-active-milestones:
  stage: lint
  # Mutates state (commits + opens an MR); never auto-cancel mid-run.
  interruptible: false
  tags:
    - deckhouse
  before_script:
    - bash .gitlab/ci/scripts/bash/check-runner-tools.sh bash git curl jq ssh-agent ssh-add python3
  script:
    - bash .gitlab/ci/scripts/bash/changelog-milestone.sh
  variables:
    MILESTONE_TITLE: ""
    OPEN_CHANGELOG_MR: "false"
    CHANGELOG_BASE_BRANCH: "main"
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_TYPE == "changelog-all-active-milestones"
