# d8v CLI build + workability check.
#
# Ports the GitHub Actions `test_build_d8v_cli` job from
# .github/workflows/dev_module_build.yml, which ran `task d8v-cli:build`,
# installed the binary, and ran `d8v --help` as a smoke check (PR only).
#
# The root Taskfile.yaml `d8v-cli` include sets `dir: ./src/cli`, so
# `task d8v-cli:build` emits ./src/cli/d8v. The workability check invokes
# that binary with `--help` (cobra exits 0 on help).
#
# MR-gated via .dev (mirrors the GH PR-only trigger).

test:build:d8v-cli:
  stage: test
  before_script:
    - bash .gitlab/ci/scripts/bash/check-runner-tools.sh go task
  script:
    - task d8v-cli:build
    - ./src/cli/d8v --help
  extends:
    - .dev
