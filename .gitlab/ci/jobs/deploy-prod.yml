# PROD deploy jobs.
#
# Parity with .github/workflows/release_module_release-channels.yml release
# channels: alpha -> beta -> early-access -> stable -> rock-solid. Each job
# waits for the previous one (and build_prod for alpha), then copies the
# built release image to the named release channel. All five are manual
# (when: manual from .prod_manual) on a vX.Y.Z tag.
#
# The EDITION matrix mirrors build_prod (ce/ee/se-plus/fe) with the correct
# MODULE_EDITION per edition, so deploy runs against the same per-edition
# source path the build pushed to. MODULE_EDITION is forwarded to the
# deploy step for consistency with the build (werf deploy reads it from the
# environment).
#
# Extends:
#   - .local_deploy    (this repo — mirrors upstream modules-gitlab-ci
#                       Deploy.gitlab-ci.yml `.deploy` script body without
#                       the upstream `rules:` that would override our
#                       gating).
#   - .prod_manual     (this repo — PROD registry vars + tag-match rule
#                       with `when: manual`).
#   - .dual_registry_login (this repo — also login against DEV_REGISTRY).
#
# TODO: per migration plan §11.4.1 and sub-epic virtualization-m9e.6.3, the
# GH release_module_release-channels workflow exposes inputs (channel,
# ce/ee, tag, enableBuild, release_to_github, check_only,
# send_results_to_loop, requirements/version checks, github release
# creation, Loop notification) that are not yet ported. Track in m9e.6.3.
#
# This file is the tag-push chained-deploy flow. The GitHub
# release_module_release-channels parity flow (single-channel dispatch with
# requirements/version checks, release creation, Loop notify) now lives in
# .gitlab/ci/jobs/release-channels.yml (prod:* jobs, manual Run pipeline).
# This tag-push chain and that flow coexist because the parity flow is gated
# to CI_PIPELINE_SOURCE == "web".

deploy_to_prod_alpha:
  stage: deploy_prod_alpha
  variables:
    RELEASE_CHANNEL: alpha
  needs: ["build_prod"]
  extends:
    - .local_deploy
    - .prod_manual
    - .dual_registry_login
  parallel:
    matrix:
      - EDITION: ce
        MODULE_EDITION: CE
      - EDITION: ee
        MODULE_EDITION: EE
      - EDITION: se-plus
        MODULE_EDITION: EE
      - EDITION: fe
        MODULE_EDITION: EE

deploy_to_prod_beta:
  stage: deploy_prod_beta
  variables:
    RELEASE_CHANNEL: beta
  needs: ["deploy_to_prod_alpha"]
  extends:
    - .local_deploy
    - .prod_manual
    - .dual_registry_login
  parallel:
    matrix:
      - EDITION: ce
        MODULE_EDITION: CE
      - EDITION: ee
        MODULE_EDITION: EE
      - EDITION: se-plus
        MODULE_EDITION: EE
      - EDITION: fe
        MODULE_EDITION: EE

deploy_to_prod_ea:
  stage: deploy_prod_ea
  variables:
    RELEASE_CHANNEL: early-access
  needs: ["deploy_to_prod_beta"]
  extends:
    - .local_deploy
    - .prod_manual
    - .dual_registry_login
  parallel:
    matrix:
      - EDITION: ce
        MODULE_EDITION: CE
      - EDITION: ee
        MODULE_EDITION: EE
      - EDITION: se-plus
        MODULE_EDITION: EE
      - EDITION: fe
        MODULE_EDITION: EE

deploy_to_prod_stable:
  stage: deploy_prod_stable
  variables:
    RELEASE_CHANNEL: stable
  needs: ["deploy_to_prod_ea"]
  extends:
    - .local_deploy
    - .prod_manual
    - .dual_registry_login
  parallel:
    matrix:
      - EDITION: ce
        MODULE_EDITION: CE
      - EDITION: ee
        MODULE_EDITION: EE
      - EDITION: se-plus
        MODULE_EDITION: EE
      - EDITION: fe
        MODULE_EDITION: EE

deploy_to_prod_rock_solid:
  stage: deploy_prod_rock_solid
  variables:
    RELEASE_CHANNEL: rock-solid
  needs: ["deploy_to_prod_stable"]
  extends:
    - .local_deploy
    - .prod_manual
    - .dual_registry_login
  parallel:
    matrix:
      - EDITION: ce
        MODULE_EDITION: CE
      - EDITION: ee
        MODULE_EDITION: EE
      - EDITION: se-plus
        MODULE_EDITION: EE
      - EDITION: fe
        MODULE_EDITION: EE
