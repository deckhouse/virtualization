# PROD deploy jobs.
#
# Carries forward deploy_to_prod_{alpha,beta,ea,stable,rock_solid} from
# the previous root .gitlab-ci.yml. Each job runs after the previous one
# (alpha -> beta -> ea -> stable -> rock_solid), waits for the matching
# matrix entry of build_prod, and copies the built release image to the
# named release channel.
#
# Extends:
#   - .local_deploy    (this repo — mirrors upstream modules-gitlab-ci
#                       Deploy.gitlab-ci.yml `.deploy` script body without
#                       the upstream `rules:` that would override our
#                       gating).
#   - .prod_manual     (this repo — PROD registry vars + tag-match rule
#                       with `when: manual`).
#   - .dual_registry_login (this repo — also login against DEV_REGISTRY).
#
# All five are manual (`when: manual` from .prod_manual) and depend on
# each other via `needs:` to preserve the gate-by-gate prod release flow.
#
# TODO: per migration plan §11.4.1, the GH release_module_release-channels
# workflow exposes inputs (channel, ce/ee, tag, enableBuild,
# release_to_github, check_only, send_results_to_loop, ...) that we
# currently collapse into the hardcoded RELEASE_CHANNEL x EDITION matrix.
# Decide whether to expose that flexibility via "Run pipeline" UI variables
# before locking the release flow down.

deploy_to_prod_alpha:
  stage: deploy_prod_alpha
  variables:
    RELEASE_CHANNEL: alpha
  needs: ['build_prod']
  extends:
    - .local_deploy
    - .prod_manual
    - .dual_registry_login
  parallel:
    matrix:
      - EDITION:
          - ce
          - ee
          - fe

deploy_to_prod_beta:
  stage: deploy_prod_beta
  variables:
    RELEASE_CHANNEL: beta
  needs: ['deploy_to_prod_alpha']
  extends:
    - .local_deploy
    - .prod_manual
    - .dual_registry_login
  parallel:
    matrix:
      - EDITION:
          - ce
          - ee
          - fe

deploy_to_prod_ea:
  stage: deploy_prod_ea
  variables:
    RELEASE_CHANNEL: early-access
  needs: ['deploy_to_prod_beta']
  extends:
    - .local_deploy
    - .prod_manual
    - .dual_registry_login
  parallel:
    matrix:
      - EDITION:
          - ce
          - ee
          - fe

deploy_to_prod_stable:
  stage: deploy_prod_stable
  variables:
    RELEASE_CHANNEL: stable
  needs: ['deploy_to_prod_ea']
  extends:
    - .local_deploy
    - .prod_manual
    - .dual_registry_login
  parallel:
    matrix:
      - EDITION:
          - ce
          - ee
          - fe

deploy_to_prod_rock_solid:
  stage: deploy_prod_rock_solid
  variables:
    RELEASE_CHANNEL: rock-solid
  needs: ['deploy_to_prod_stable']
  extends:
    - .local_deploy
    - .prod_manual
    - .dual_registry_login
  parallel:
    matrix:
      - EDITION:
          - ce
          - ee
          - fe
