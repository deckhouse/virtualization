# Pipeline-wide variables.
#
# These values are project defaults. Anything secret (passwords, SSH keys,
# docker configs) lives in GitLab Settings -> CI/CD -> Variables (masked
# where appropriate) and is referenced via ${VAR} expansion below.
#
# Legacy variable migration:
#   EXTERNAL_MODULES_DEV_REGISTRY_LOGIN    -> DEV_MODULES_REGISTRY_LOGIN
#   EXTERNAL_MODULES_DEV_REGISTRY_PASSWORD -> DEV_MODULES_REGISTRY_PASSWORD
#   EXTERNAL_MODULES_PROD_REGISTRY_LOGIN   -> PROD_MODULES_REGISTRY_LOGIN
#   EXTERNAL_MODULES_PROD_REGISTRY_PASSWORD-> PROD_MODULES_REGISTRY_PASSWORD
# Hardcoded registry hosts (`dev-registry.deckhouse.io`,
# `registry-write.deckhouse.io`, `sys/deckhouse-oss/modules`,
# `deckhouse/${EDITION}/modules`) move to DEV_REGISTRY / DEV_MODULE_SOURCE /
# PROD_REGISTRY / PROD_MODULE_SOURCE_NAME vars.
#

variables:
  # --- Module identity ---
  MODULE_NAME: virtualization
  # Kept for backwards compatibility with the previous root .gitlab-ci.yml;
  # upstream templates expect MODULES_MODULE_NAME.
  MODULES_MODULE_NAME: virtualization

  # --- Werf / base images / lib-helm ---
  # These match upstream modules-gitlab-ci Setup.gitlab-ci.yml defaults.
  # Override at the project level once the base-images + lib-helm versions
  # are validated against this module's werf config.
  BASE_IMAGES_VERSION: v0.5.7
  WERF_VERSION: "2 stable"
  # DECKHOUSE_LIB_HELM_VERSION: leave empty here; populate when the lib-helm
  # version is pinned in Taskfile.yaml. Upstream Setup.gitlab-ci.yml
  # only downloads if this var is non-empty.
  DECKHOUSE_LIB_HELM_VERSION: ""
  # Disable VEX notice noise from trivy (matches previous GH env).
  TRIVY_DISABLE_VEX_NOTICE: "true"

  # --- DEV registry (vars-only, populated via GitLab CI/CD variables) ---
  # Required Project Variables (vars, not masked):
  #   DEV_REGISTRY                  e.g. dev-registry.deckhouse.io
  #   DEV_MODULE_SOURCE             e.g. dev-registry.deckhouse.io/sys/deckhouse-oss/modules
  #   DEV_MODULES_REGISTRY_LOGIN
  # Required Project Variables (masked):
  #   DEV_MODULES_REGISTRY_PASSWORD
  #
  # --- PROD registry (vars-only) ---
  # Required Project Variables (vars):
  #   PROD_REGISTRY                 e.g. registry-write.deckhouse.io
  #   PROD_MODULE_SOURCE_NAME       e.g. deckhouse
  #   PROD_MODULES_REGISTRY_LOGIN
  # Required Project Variables (masked):
  #   PROD_MODULES_REGISTRY_PASSWORD
  # Optional read-only license registry (used by cve-scan + check:requirements):
  #   PROD_READ_REGISTRY, PROD_READ_REGISTRY_USER, PROD_READ_REGISTRY_PASSWORD

  # --- CVE scan (Trivy) ---
  # Required Project Variable (vars, not masked):
  #   VAULT_ROLE        - role name to authenticate against seguro.flant.com
  #                       via GitLab id_tokens (aud: gitlab-access-aud) +
  #                       d8-cli `stronghold write auth/fox/login`.
  #                       The upstream `.cve_scan` template declares
  #                       VAULT_ROLE with no default; the operator MUST set
  #                       it here or as a Project CI/CD variable, otherwise
  #                       cve:scan:daily / cve:scan:manual / cve:scan:mr
  #                       fail at the Vault login step.
  #                       Value: the same role the GH workflow used, i.e.
  #                       the repository name ("virtualization").
  #   VAULT_ADDR        - defaults to https://seguro.flant.com upstream;
  #                       override only if the Vault endpoint differs.

  # --- Build/dev tooling (kept from previous root) ---
  GO_VERSION: "1.25.11"
  GOLANGCI_LINT_VERSION: "2.11.1"
  # Helm v3 + jq are needed by `task validation:helm-templates` (tools/kubeconform).
  # They are not assumed to be on the runner host; lint:helm-templates installs
  # portable binaries from these versions in its before_script.
  HELM_VERSION: "3.16.3"
  JQ_VERSION: "1.7.1"
  # Node.js for test:scripts:js (.gitlab/scripts/js). The runner host has no
  # Node.js, so the job runs inside the official node:${NODE_VERSION} image via
  # `docker run`. Matches the Node version pinned in the GH workflow
  # (.github/workflows/dev_module_build.yml test_scripts_js env NODE_VERSION).
  NODE_VERSION: "24"
  # Let the host Go toolchain auto-download the version required by go.mod
  # (currently go 1.25.11). Runner hosts may ship an older Go with
  # GOTOOLCHAIN pinned to that older version (e.g. GOTOOLCHAIN=go1.25.9),
  # which otherwise makes `go mod download` / `go install` fail with
  # "go.mod requires go >= 1.25.11". `auto` overrides the runner env var
  # (GitLab CI variables take precedence over runner environment variables)
  # and matches the behavior of GitHub's actions/setup-go@v5.
  GOTOOLCHAIN: "auto"
  WERF_EXPERIMENTAL_IMPORT_BY_SOURCE_IMAGE_TAG: "true"

  # --- Pipeline schedule discriminator ---
  # SCHEDULE_TYPE is NOT a fixed value here. It is set per pipeline schedule
  # in GitLab UI (Settings -> CI/CD -> Schedules -> <schedule> -> Variables),
  # and each scheduled job gates on its own expected value, e.g.:
  #   $CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_TYPE == "cleanup"
  # This prevents a job from running under every pipeline schedule that happens
  # to fire. Operators must set SCHEDULE_TYPE to exactly one of the values
  # below when creating a pipeline schedule:
  #
  #   Job(s)                         SCHEDULE_TYPE                    Intended cron
  #   cleanup                        cleanup                          12 0 * * 6
  #   cve:scan:daily                 cve-scan-daily                   0 2 * * *
  #   svace:*                        svace                            0 4 * * 6
  #   gitleaks:full:scheduled        gitleaks-full                    daily
  #   precache:build:main            precache                         0 */8 * * *
  #   changelog:milestone            changelog-milestone              nightly
  #   changelog:all-active-milestones changelog-all-active-milestones nightly
  #   mrs:summary                    mrs-summary                      0 7 * * *
  #   lint:no-cyrillic / lint:go / lint:gitlab-ci lint-validate       as needed
  #
  # The global workflow:rules in .gitlab/ci/workflow.yml still create a
  # pipeline for any schedule; SCHEDULE_TYPE only narrows which jobs run
  # inside it. Manual/MR/web behavior is unaffected.
