---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}-src-artifact
final: false
fromImage: builder/src
git:
{{- include "workspace go files" . }}
- add: {{ .ModuleDir }}/images/{{ .ImageName }}
  to: /src/images/pre-delete-hook
  stageDependencies:
    install:
    - go.mod
    - go.sum
    - "**/*.go"
---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}-builder
final: false
fromImage: {{ eq $.SVACE_ENABLED "false" | ternary "builder/golang-debian-1.25" "builder/golang-alt-1.25" }}
import:
- image: {{ .ModuleNamePrefix }}{{ .ImageName }}-src-artifact
  add: /src
  to: /src
  before: install
secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}
{{- include "fox module auth secret" . }}
mount:
{{- include "mount points for golang builds" . }}
shell:
  install:
  - export GOPROXY=$(cat /run/secrets/GOPROXY)
{{- include "fox module auth" . | nindent 2 }}
  - cd /src/images/pre-delete-hook
  - go mod download
{{- include "fox module auth cleanup" . | nindent 2 }}
  setup:
  - cd /src/images/pre-delete-hook
  - export GOOS=linux
  - export GOARCH=amd64
  - export CGO_ENABLED=0
  - |
    {{- $_ := set $ "ProjectName" (list .ImageName "pre-delete-hook" | join "/") }}
    {{- include "image-build.build" (set $ "BuildCommand" `go build -v -a -o pre-delete-hook main.go`) | nindent 6 }}
---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}
fromImage: builder/scratch
import:
- image: {{ .ModuleNamePrefix }}{{ .ImageName }}-builder
  add: /src/images/pre-delete-hook/pre-delete-hook
  to: /pre-delete-hook
  after: install
imageSpec:
  config:
    user: 64535
    workingDir: "/"
    entrypoint: ["/pre-delete-hook"]
