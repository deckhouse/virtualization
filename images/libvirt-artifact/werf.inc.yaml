---
{{- $versionLibvirt := "10.10.0" }}

image: {{ $.ImageName }}
# final: false
fromImage: base-alt-p11
git:
- add: /images/{{ $.ImageName }}
  to: /home/builder/RPM/SPECS
  owner: builder
  group: builder
  includePaths:
  - libvirt.spec
  stageDependencies:
    beforeSetup:
      - libvirt.spec
shell:
  beforeInstall:
  - | 
    apt-get update && apt-get install --yes su \
    gear rpm dmidecode \
    rpm-build \
    rpm-build-systemd \
    rpm-build-python3 \
    gcc-c++ \
    git \
    gettext \
    bash-completion \
    clang \
    ccache \
    make cmake \
    meson \
    ninja-build \
    libudev-devel \
    libpciaccess-devel \
    libyajl-devel \
    sanlock-devel \
    libpcap-devel \
    libnl-devel \
    libselinux-devel \
    iproute \
    iptables \
    iptables-nft \
    iptables-ipv6 \
    openvswitch \
    ebtables \
    libsasl2-devel \
    pkgconfig \
    libssh-devel \
    libssh2-devel \
    polkit kmod \
    qemu-img \
    lvm2 \
    libparted-devel \
    parted \
    libdevmapper-devel \
    ceph-devel \
    open-iscsi \
    libiscsi-devel \
    libglusterfs-devel \
    libnuma-devel \
    libcap-ng-devel \
    libcurl-devel \
    libaudit-devel \
    libfuse-devel \
    libnbd-devel \
    libblkid-devel \
    libgcrypt-devel \
    libgnutls-devel \
    libp11-kit-devel \
    libreadline-devel \
    libtasn1-devel \
    libattr-devel \
    libbsd-devel \
    libsystemd-devel \
    libuuid-devel \
    libjson-c-devel \
    systemtap-sdt-devel \
    systemd-container \
    attr \
    libacl-devel \
    glib2-devel \
    glibc-utils \
    libgio-devel \
    libxml2-devel \
    xml-utils \
    xsltproc \
    python3 python3-devel \
    python3-module-pytest \
    python3-module-docutils \
    python3-tools \
    python3-module-pip \
    polkit \
    libtirpc-devel \
    libsasl2-devel \
    wireshark-devel \
    tshark \
    zlib-devel \
    mdevctl \
    util-linux dmsetup pm-utils \
    libfuse3-devel libnuma libslirp-devel libtirpc-devel && \
    /usr/bin/pip3 install black
  - |
    apt-get clean
    rm --recursive --force /var/lib/apt/lists/ftp.altlinux.org* /var/cache/apt/*.bin
  - |
    grep -qw ^rpm /etc/group || groupadd rpm
    id -u builder &>/dev/null || useradd builder --shell /bin/bash --create-home --group rpm

  install:
  - |
    echo "rpm-src [p11] http://ftp.altlinux.org/pub/distributions/ALTLinux p11/branch/x86_64 classic" > /etc/apt/sources.list.d/src.list
    apt-get update
  - |
    mkdir -p /home/builder/RPM/{SPECS,SRPMS} && chown builder:builder -R /home/builder/RPM
    
    su - builder -s /bin/bash -c 'git clone http://git.altlinux.org/gears/l/libvirt.git'
    
    su - builder -s /bin/bash -c 'cd libvirt ; git checkout {{ $versionLibvirt }}-alt1; gear-rpm -bs --verbose'
    
    su - builder -s /bin/bash -c 'apt-get source /home/builder/RPM/SRPMS/libvirt-{{ $versionLibvirt }}-alt1.src.rpm'
  setup:
  - |
    su - builder -c 'trap "echo Build log tail: ; tail -n 1024 /tmp/build.log" EXIT ; rpm -ba /home/builder/RPM/SPECS/libvirt.spec 2>&1'
