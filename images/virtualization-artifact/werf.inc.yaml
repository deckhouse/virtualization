---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}-src-artifact
final: false
fromImage: builder/src
git:
- add: {{ .ModuleDir }}/api
  to: /src/api
  stageDependencies:
    install:
      - go.mod
      - go.sum
    setup:
      - "**/*.go"
- add: {{ .ModuleDir }}/images/{{ .ImageName }}
  to: /src/images/virtualization-artifact
  stageDependencies:
    install:
    - go.mod
    - go.sum
    setup:
    - "**/*.go"
---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}
final: false
fromImage: {{ eq $.SVACE_ENABLED "false" | ternary "builder/golang-debian-1.25" "builder/golang-alt-svace-1.25" }}
import:
- image: {{ .ModuleNamePrefix }}{{ .ImageName }}-src-artifact
  add: /src
  to: /src
  before: install
secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}
- id: CI_JOB_TOKEN
  value: "{{ env "CI_JOB_TOKEN" }}"
mount:
{{- include "mount points for golang builds" . }}
shell:
  install:
  - export GOPROXY=$(cat /run/secrets/GOPROXY)
  - export GOPRIVATE="fox.flant.com/*"
  - |
    # Authenticate to the private fox.flant.com kubevirt fork for `go mod download`.
    CI_JOB_TOKEN=$(cat /run/secrets/CI_JOB_TOKEN)
    if [ -n "$CI_JOB_TOKEN" ]; then
      echo "machine fox.flant.com login gitlab-ci-token password $CI_JOB_TOKEN" > ~/.netrc
      chmod 600 ~/.netrc
    fi
  - cd /src/images/virtualization-artifact
  - go mod download
  - rm -rf ~/.netrc
  setup:
  - cd /src/images/virtualization-artifact
  - mkdir /out
  - export GOOS=linux
  - export GOARCH=amd64
  - export CGO_ENABLED=0

  - |
    echo "Build virtualization-controller binary"
    {{- $_ := set $ "ProjectName" (list .ImageName "virtualization-controller" | join "/") }}

    {{- if eq $.DEBUG_COMPONENT "delve/virtualization-controller" }}
    go build -tags {{ .MODULE_EDITION }} -v -a -o /out/virtualization-controller ./cmd/virtualization-controller
    {{- else }}
    {{-   $buildCommand := printf "go build -ldflags=\"-s -w\" -tags %s -v -a -o /out/virtualization-controller ./cmd/virtualization-controller" .MODULE_EDITION -}}
    {{-   include "image-build.build" (set $ "BuildCommand" $buildCommand) | nindent 4 }}
    {{- end }}

  - |
    echo "Build virtualization-api binary"
    {{- $_ := set $ "ProjectName" (list .ImageName "virtualization-api" | join "/") }}

    {{- if eq $.DEBUG_COMPONENT "delve/virtualization-api" }}
    go build -v -o /out/virtualization-api ./cmd/virtualization-api
    {{- else }}
    {{-   include "image-build.build" (set $ "BuildCommand" `go build -ldflags="-s -w" -v -o /out/virtualization-api ./cmd/virtualization-api`) | nindent 4 }}
    {{- end }}

{{- if or (eq .MODULE_EDITION "EE") (eq .SVACE_ENABLED "true") }}
  - |
    echo "Build virtualization-audit binary"
    {{- $_ := set $ "ProjectName" (list .ImageName "virtualization-audit" | join "/") }}
    {{- if eq $.DEBUG_COMPONENT "delve/virtualization-audit" }}
    go build -v -o /out/virtualization-audit ./cmd/virtualization-audit
    {{- else }}
    {{-   include "image-build.build" (set $ "BuildCommand" `go build -ldflags="-s -w" -v -o /out/virtualization-audit ./cmd/virtualization-audit`) | nindent 4 }}
    {{- end }}
{{- end }}
