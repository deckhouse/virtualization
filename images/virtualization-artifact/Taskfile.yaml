version: "3"

silent: true

includes:
  init: Taskfile.init.yaml
  api:
    taskfile: ../../api/Taskfile.dist.yaml
    dir: ../../api

vars:
  BaseNamespace: d8-virtualization

tasks:
  fmt:
    desc: "Run formatters locally"
    cmds:
      - task: fmt:gci
      - task: fmt:gofumpt

  fmt:gci:
    desc: "Format code with gci, important vars: paths."
    cmds:
      - |
        gci write --skip-generated -s standard,default,prefix\(github.com/deckhouse/\) {{.CLI_ARGS}} {{.paths | default "pkg/ cmd/"}}

  fmt:gofumpt:
    desc: "Format code with gofumpt, important vars: paths"
    cmds:
      - |
        gofumpt -extra -w {{.CLI_ARGS}} {{.paths | default "cmd/ pkg/"}}

  dev:gogenerate:
    desc: |-
      Run go generate for all packages.
    cmds:
      - |
        go generate ./...

  dev:addlicense:
    desc: |-
      Add Flant CE license to files sh,go,py. Default directory is root of project, custom directory path can be passed like: "task dev:addlicense -- <somedir>"
    cmds:
      - |
        {{if .CLI_ARGS}}
          go run ../../tools/addlicense/{main,variables,msg,utils}.go -directory {{ .CLI_ARGS }}
        {{else}}
          go run ../../tools/addlicense/{main,variables,msg,utils}.go -directory ./
        {{end}}

  test:unit:
    desc: "Run go unit tests"
    cmds:
      - |
        go tool ginkgo -v -r pkg/

  lint:
    desc: "Run linters locally"
    cmds:
      - task: lint:go

  lint:go:
    desc: "Run golangci-lint"
    deps:
      - _ensure:golangci-lint
    cmds:
      - |
        golangci-lint run

  mirrord:run:controller:
    desc: "Run local virtualization-controller in cluster using a mirrord"
    deps:
      - _ensure:mirrord
    cmd: |
      TMPDIR=/tmp ./hack/mirrord.sh run --app=$PWD/cmd/virtualization-controller/main.go \
      --deployment=virtualization-controller                                 \
      --namespace={{ .BaseNamespace }}                                       \
      --container-name=virtualization-controller

  mirrord:wipe:controller:
    desc: "wipe up Mirrord's trash"
    deps:
      - _ensure:mirrord
    cmd: ./hack/mirrord.sh wipe --deployment=virtualization-controller --namespace={{ .BaseNamespace }}

  mirrord:run:apiserver:
    desc: "Run local virtualization-api in cluster using a mirrord"
    deps:
      - _ensure:mirrord
    cmd: |
      flags=()
      flags+=( "--kubevirt-cabundle=/etc/virt-api/certificates/ca.crt" )
      flags+=( "--kubevirt-endpoint=virt-api.{{ .BaseNamespace }}.svc" )
      flags+=( "--secure-port=8443" )
      flags+=( "--tls-private-key-file=/etc/virtualization-api/certificates/tls.key" )
      flags+=( "--tls-cert-file=/etc/virtualization-api/certificates/tls.crt" )
      flags+=( "--v=7" )
      flags+=( "--proxy-client-cert-file=/etc/virtualization-api-proxy/certificates/tls.crt" )
      flags+=( "--proxy-client-key-file=/etc/virtualization-api-proxy/certificates/tls.key" )
      flags+=( "--service-account-name=virtualization-api" )
      flags+=( "--service-account-namespace={{ .BaseNamespace }}" )

      TMPDIR=/tmp ./hack/mirrord.sh run --app="$PWD/cmd/virtualization-api/main.go" \
      --deployment="virtualization-api"                                 \
      --namespace="{{ .BaseNamespace }}"                                \
      --flags="\"${flags[@]}\""

  mirrord:wipe:apiserver:
    desc: "wipe up Mirrord's trash"
    deps:
      - _ensure:mirrord
    cmd: ./hack/mirrord.sh wipe --deployment=virtualization-api --namespace={{ .BaseNamespace }}

  pyroscope:local:start:pyroscope-only:
    desc: "Start pyroscope only"
    cmd: ./hack/pyroscope.sh start-pyroscope

  pyroscope:local:stop:pyroscope-only:
    desc: "Stop pyroscope only"
    cmd: ./hack/pyroscope.sh stop-pyroscope

  pyroscope:local:wipe-data:
    desc: "Wipe local pyroscope data"
    cmd: ./hack/pyroscope.sh wipe-data

  pyroscope:local:info-data:
    desc: "Show local pyroscope data info"
    cmd: ./hack/pyroscope.sh info-data

  pyroscope:local:start:controller:
    desc: "Start pyroscope locally for virtualization-controller"
    cmd: ./hack/pyroscope.sh start --namespace={{ .BaseNamespace }} --service=virtualization-controller --port=8081

  pyroscope:local:stop:controller:
    desc: "Stop local pyroscope for virtualization-controller"
    cmd: ./hack/pyroscope.sh stop --namespace={{ .BaseNamespace }}

  pyroscope:local:start:vm-route-forge:
    desc: "Start pyroscope locally for vm-route-forge"
    cmd: ./hack/pyroscope.sh start --namespace={{ .BaseNamespace }} --service=vm-route-forge --port=8119

  pyroscope:local:stop:vm-route-forge:
    desc: "Stop local pyroscope for vm-route-forge"
    cmd: ./hack/pyroscope.sh stop --namespace={{ .BaseNamespace }}

  dlv:build:controller:
    desc: "Build image virtualization-controller with dlv"
    dir: ../..
    cmds:
      - docker build -f ./images/virtualization-artifact/hack/dlv-controller.Dockerfile -t "{{ .DLV_IMAGE }}" --platform linux/amd64 .

  dlv:build-push:controller:
    desc: "Build and Push image virtualization-controller with dlv"
    cmds:
      - task: dlv:build:controller
      - docker push "{{ .DLV_IMAGE }}"
      - task: dlv:print:controller

  dlv:print:controller:
    desc: "Print commands for debug"
    env:
      IMAGE: "{{ .DLV_IMAGE }}"
    cmd: |
      cat <<EOF
      kubectl -n d8-virtualization patch deploy virtualization-controller --type='strategic' -p '{
        "spec": {
          "template": {
            "spec": {
              "containers": [
                {
                  "name": "virtualization-controller",
                  "image": "${IMAGE}",
                  "ports": [ { "containerPort": 2345, "name": "dlv" } ],
                  "readinessProbe": null,
                  "livenessProbe": null,
                  "command": null,
                  "env": [ { "name": "LEADER_ELECTION", "value": "false" } ]
                },
                {
                  "name": "proxy",
                  "readinessProbe": null,
                  "livenessProbe": null
                },
                {
                  "name": "kube-rbac-proxy",
                  "readinessProbe": null,
                  "livenessProbe": null
                }
              ]
            }
          }
        }
      }'
      kubectl -n d8-virtualization port-forward deploy/virtualization-controller 2345:2345
      EOF

  dlv:build:apiserver:
    desc: "Build image virtualization-api with dlv"
    dir: ../..
    cmds:
      - docker build -f ./images/virtualization-artifact/hack/dlv-apiserver.Dockerfile -t "{{ .DLV_IMAGE }}" --platform linux/amd64 .

  dlv:build-push:apiserver:
    desc: "Build and Push image virtualization-api with dlv"
    cmds:
      - task: dlv:build:apiserver
      - docker push "{{ .DLV_IMAGE }}"
      - task: dlv:print:apiserver

  dlv:print:apiserver:
    desc: "Print commands for debug"
    env:
      IMAGE: "{{ .DLV_IMAGE }}"
    cmd: |
      cat <<EOF
      kubectl -n d8-virtualization patch deploy virtualization-api --type='strategic' -p '{
        "spec": {
          "template": {
            "spec": {
              "containers": [
                {
                  "name": "virtualization-api",
                  "image": "${IMAGE}",
                  "ports": [ { "containerPort": 2345, "name": "dlv" } ],
                  "readinessProbe": null,
                  "livenessProbe": null,
                  "command": null
                }
              ]
            }
          }
        }
      }'
      kubectl -n d8-virtualization port-forward deploy/virtualization-api 2345:2345
      EOF

  dlv:build:audit:
    desc: "Build image virtualization-audit with dlv"
    dir: ../..
    cmds:
      - docker build -f ./images/virtualization-artifact/hack/dlv-audit.Dockerfile -t "{{ .DLV_IMAGE }}" --platform linux/amd64 .

  dlv:build-push:audit:
    desc: "Build and Push image virtualization-audit with dlv"
    cmds:
      - task: dlv:build:audit
      - docker push "{{ .DLV_IMAGE }}"
      - task: dlv:print:audit

  dlv:print:audit:
    desc: "Print commands for debug"
    env:
      IMAGE: "{{ .DLV_IMAGE }}"
    cmd: |
      cat <<EOF
      kubectl -n d8-virtualization patch deploy virtualization-audit --type='strategic' -p '{
        "spec": {
          "template": {
            "spec": {
              "containers": [
                {
                  "name": "virtualization-audit",
                  "image": "${IMAGE}",
                  "ports": [ { "containerPort": 2345, "name": "dlv" } ],
                  "readinessProbe": null,
                  "livenessProbe": null,
                  "command": null
                }
              ]
            }
          }
        }
      }'
      kubectl -n d8-virtualization port-forward deploy/virtualization-audit 2345:2345
      EOF

  _ensure:kubectl:
    desc: "Ensure kubectl is installed"
    internal: true
    cmds:
      - echo "Install kubectl" && exit 1
    status:
      - which kubectl >/dev/null

  _ensure:cluster-available:
    desc: "Ensure kubernetes cluster available"
    internal: true
    preconditions:
      - sh: kubectl version
        msg: |-
          No cluster available setup KUBECONFIG to use remote cluster.

  _ensure:crane:
    desc: "Ensure crane is installed"
    internal: true
    cmds:
      - echo "Install crane" && exit 1
    status:
      - which crane >/dev/null

  _ensure:golangci-lint:
    desc: "Ensure golangci-lint v2+ is available"
    internal: true
    cmds:
      - |
        GOLANGCI_LINT_MIN_VERSION="2.0"
        if ! command -v golangci-lint &> /dev/null; then
          echo "Installing golangci-lint..."
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin
        fi
        CURRENT_VERSION=$(golangci-lint --version 2>/dev/null | grep -oP 'version \K[0-9]+\.[0-9]+' || echo "0.0")
        if [ "$(printf '%s\n' "$GOLANGCI_LINT_MIN_VERSION" "$CURRENT_VERSION" | sort -V | head -n1)" != "$GOLANGCI_LINT_MIN_VERSION" ]; then
          echo "Upgrading golangci-lint from $CURRENT_VERSION to $GOLANGCI_LINT_MIN_VERSION+"
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin
        fi

  _ensure:mirrord:
    desc: "Ensure mirrord tool is installed"
    internal: true
    cmds:
      - echo -e >&2 "Please install mirrord https://mirrord.dev/docs/overview/quick-start/#cli-tool"
      - exit 1
    status:
      - which mirrord >/dev/null
