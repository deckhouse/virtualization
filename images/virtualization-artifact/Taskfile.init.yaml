version: "3"

#silent: true

tasks:
  mod:
    cmds:
      - go mod download

  golangci-lint:
    cmds:
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

  ginkgo:
    cmds:
      - go install github.com/onsi/ginkgo/v2/ginkgo@v2.14.0

  moq:
    cmds:
      - go install github.com/matryer/moq@v0.5.3

  default:
    cmds:
      - task: mod
      - task: ginkgo
      - task: golangci-lint
      - task: moq
