---
image: {{ include "ImageName" (list . ) }}
fromImage: distroless
import:
- image: {{ include "ImageName" (list . "bins") }}
  add: /relocate
  to: /
  before: setup
imageSpec:
  config:
    entrypoint: ["/usr/bin/cloner-startup"]
    user: 64535
---
{{- $name := print $.ImageName "-dependencies" -}}
{{- define "$name" -}}
binaries:
- /usr/bin/cloner-startup
- /usr/bin/hello
- /usr/bin/cdi-cloner
{{- end -}}

{{ $virtCDIClonerDependencies := include "$name" . | fromYaml }}

image: {{ include "ImageName" (list . "bins") }}
final: false
fromImage: base-alt-p11-binaries
import:
- image: {{ include "ImageName" (list . "gobuild") }}
  add: /cdi-binaries
  to: /usr/bin
  includePaths:
  - cloner-startup
  before: install
- image: cdi-artifact-cbuilder
  add: /bins
  to: /usr/bin
  before: install
  includePaths:
  - hello
- image: cdi-artifact
  add: /cdi-binaries
  to: /usr/bin
  includePaths:
  - cdi-cloner
  before: install
# Source https://github.com/kubevirt/containerized-data-importer/blob/v1.60.3/cmd/cdi-cloner/BUILD.bazel
shell:
  install:
  - |
    /relocate_binaries.sh -i "{{ $virtCDIClonerDependencies.binaries | join " " }}" -o /relocate
---
image: {{ include "ImageName" (list . "gobuild") }}
final: false
fromImage: builder/golang-bookworm-1.23
git:
  - add: /images/{{ include "ImageName" (list .) }}/cloner-startup
    to: /app
    stageDependencies:
      install:
        - '**/*'
shell:
  install:
  - |
    mkdir -p /cdi-binaries
    cd /app
    go build -ldflags="-s -w" -o /cdi-binaries/cloner-startup ./cmd/cloner-startup
