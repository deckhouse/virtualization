---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}
final: true
fromImage: base/distroless
git:
  {{- include "image mount points" . }}
import:
  - image: {{ .ModuleNamePrefix }}{{ .ImageName }}-binaries
    add: /relocate
    to: /
    after: install
imageSpec:
  config:
    user: 0

---
{{- $name := print .ImageName "-dependencies" -}}
{{- define "$name" -}}
packages:
- swtpm libtpms numactl dmidecode
- xorriso libburn attr libaudit
- gnutls acl libbsd libgcrypt libmd
- util-linux libfuse nettle
- libnbd libcap-ng libcapstone curl
- json-c keyutils libisofs
- zlib zstd p11-kit
- libssh libssh2
- pixman rdma-core
- krb5 xz libxml2
- readline
- libselinux
- linux-pam
- cyrus-sasl
- snappy
- libtasn1 libtirpc
- glib2
- libxkbcommon
- libaio
- liburing libunistring
- libslirp ncurses libpng libseccomp
- systemd multipath-tools bzip2 libnl
- pcre2
- gnu-glibc nghttp3 ngtcp2 nghttp2 libpsl libidn2 gmp
- openldap openssl
- e2fsprogs libxcrypt lvm2 json-glib
- libffi
- brotli libstdc++ libcap libgpg-error lz4
- userspace-rcu lzo dtc
{{- end -}}

{{ $builderDependencies := include "$name" . | fromYaml }}

{{- $gitRepoName := "libvirt" }}
{{- $version := get .Firmware $gitRepoName }}

image: {{ .ModuleNamePrefix }}{{ .ImageName }}-binaries
final: false
fromImage: builder/distroless
git:
  # Add qemu and virtqemud configs
  - add: {{ .ModuleDir }}/images/{{ .ImageName }}/configs
    to: /relocate/etc/libvirt
    stageDependencies:
      setup:
      - qemu.conf
      - virtqemud.conf
    includePaths:
    - qemu.conf
    - virtqemud.conf
  - add: {{ .ModuleDir }}/images/{{ .ImageName }}/configs
    to: /relocate/etc
    stageDependencies:
      setup:
      - nsswitch.conf
    includePaths:
    - nsswitch.conf
import:
- image: tools/tini-v0.19.0
  add: /usr/bin/tini
  to: /relocate/usr/bin/tini
  before: setup
# Libvirt and QEMU libraries and binaries
- image: {{ .ModuleNamePrefix }}packages/libvirt
  add: /libvirt
  to: /libvirt-bins
  before: install
- image: {{ .ModuleNamePrefix }}qemu
  add: /qemu-img
  to: /qemu-bins
  before: install
# EDK2 (uefi firmware)
- image: {{ .ModuleNamePrefix }}edk2
  add: /FIRMWARE/
  to: /relocate/usr/share/edk2/ovmf
  before: install
  includePaths:
  - '*.fd'
  - '*.bin'
  - '*.efi'
  - '*.iso'
- image: {{ .ModuleNamePrefix }}edk2
  add: /FIRMWARE/
  to: /relocate/usr/share/qemu/firmware
  before: install
  includePaths:
  - '*.json'
# Import from virt artifact
- image: {{ .ModuleNamePrefix }}virt-artifact
  add: /kubevirt-config-files/.version
  to: /.version
  after: install

- image: {{ .ModuleNamePrefix }}virt-artifact
  add: /kubevirt-binaries/
  to: /relocate/usr/bin
  before: setup
  includePaths:
  - container-disk
  - virt-freezer
  - virt-launcher
  - virt-launcher-monitor
  - virt-probe
  - virt-tail
- image: {{ .ModuleNamePrefix }}virt-artifact
  add: /kubevirt-binaries/virt-launcher-hook
  to: /relocate/etc/libvirt/hooks/qemu
  before: setup
- image: {{ .ModuleNamePrefix }}{{ .ImageName }}-gobuilder
  add: /binaries
  to: /relocate/usr/bin
  before: setup
  includePaths:
  - node-labeller
  - vlctl

# Statically built.
- image: {{ .ModuleNamePrefix }}packages/openssl
  add: /openssl
  to: /relocate
  after: setup
  includePaths:
  - usr/bin/openssl
- image: tools/util-linux
  add: /
  to: /relocate/usr
  after: setup
  includePaths:
  - sbin/hwclock
  - sbin/nologin

# GNU utilities
- image: tools/coreutils
  add: /
  to: /relocate
  after: setup
  includePaths:
  - usr/bin/cp
  - usr/bin/sleep
  - usr/bin/coreutils
- image: tools/iproute2
  add: /
  to: /relocate/usr
  after: setup
  includePaths:
  - sbin/tc

- image: {{ .ModuleNamePrefix }}{{ .ImageName }}-cbuilder
  add: /bins
  to: /relocate/usr/bin
  before: setup
  includePaths:
  - temp_pod
shell:
  install:
  - |
    echo "Install packages into /relocate"
    pm install {{ $builderDependencies.packages | join " " }} -d /relocate

    echo "Copy libvirt and qemu binaries into /relocate"
    cp -a /libvirt-bins/. /relocate/
    cp -a /qemu-bins/. /relocate/
    rm -rf /libvirt-bins /qemu-bins

    echo "Create runtime folder hierarchy"
    mkdir -p /relocate/{etc,root}
    mkdir -p /relocate/var/{log/libvirt/qemu,log/swtpm/libvirt/qemu,lib/libvirt/qemu,run/libvirt/qemu,lib/swtpm-localca,lib/libvirt/swtpm}
  {{- include "rebuild relocate ld cache" . | nindent 2 }}

  setup:
  - |
    echo "root:x:0:0:root:/root:/bin/bash" >> /relocate/etc/passwd
    echo "root:x:0:" >> /relocate/etc/group
    echo "root:x:::::::" >> /relocate/etc/shadow

    echo "deckhouse:x:64535:64535:deckhouse:/home/deckhouse:/sbin/nologin" >> /relocate/etc/passwd
    echo "deckhouse:x:64535:" >> /relocate/etc/group
    mkdir -p /relocate/home/deckhouse
    chown -R 64535:64535 /relocate/home/deckhouse

  - |
    echo "Create symlinks for OVMF"
    mkdir -p /relocate/usr/share/OVMF

    cd /relocate/usr/share/edk2/ovmf
    ln -sf OVMF_CODE.fd   OVMF_CODE.cc.fd

    cd /relocate
    ln -sf ../edk2/ovmf/OVMF_CODE.cc.fd       usr/share/OVMF/OVMF_CODE.cc.fd

    ln -s ../edk2/ovmf/OVMF_CODE.secboot.fd   usr/share/OVMF
    ln -s ../edk2/ovmf/OVMF_VARS.fd           usr/share/OVMF
    ln -s ../edk2/ovmf/OVMF_VARS.secboot.fd   usr/share/OVMF
    ln -s ../edk2/ovmf/UefiShell.iso          usr/share/OVMF

    cd /

  - |
    cd /relocate

    echo "Create symlinks for container-disk"
    mkdir -p /relocate/init/usr/bin
    ln -s usr/bin/container-disk ./init/usr/bin/container-disk

    echo "Create symlink for run -> var/run "
    ln -s var/run run

  - |
    SETCAP="/relocate/lib64/ld-linux-x86-64.so.2 --library-path /relocate/lib64:/relocate/usr/lib:/relocate/usr/lib64 /relocate/usr/sbin/setcap"
    $SETCAP cap_net_bind_service=+ep /relocate/usr/bin/virt-launcher-monitor
    $SETCAP cap_net_bind_service=+ep /relocate/usr/bin/tini

  # /etc/libvirt-init will be copied back into /etc/libvirt at runtime. This is necessary because we configure libvirt to mount /etc/libvirt and set readOnlyRootFilesystem for other directories.
  # DO NOT REMOVE. node-labeler.sh uses /etc/libvirt.
  - |
    cp -a etc/libvirt etc/libvirt-init

---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}-gobuilder
final: false
fromImage: builder/golang-1.25
git:
  - add: {{ .ModuleDir }}/images/{{ .ImageName }}/node-labeller
    to: /node-labeller
    includePaths:
      - '**/*'
    stageDependencies:
      install:
      - '**/*'
  - add: {{ .ModuleDir }}/images/{{ .ImageName }}/vlctl
    to: /src-vlctl
    includePaths:
      - '**/*'
    stageDependencies:
      install:
      - '**/*'
secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}
shell:
  install:
  - |
    pm install pkgconf libvirt libvirt-devel glib2 glib2-devel openssl libssh -d /
  - mkdir -p /binaries
  - export GOPROXY=$(cat /run/secrets/GOPROXY)
  - export CGO_ENABLED=1
  - |
    echo "Build node-labeller binaries"
    cd /node-labeller
    echo '== go build -ldflags="-s -w" -o /binaries/node-labeller ./cmd/node-labeller =='
    {{- $_ := set $ "ProjectName" (list .ImageName "node-labeller" | join "/") }}
    {{- include "image-build.build" (set $ "BuildCommand" `go build -ldflags="-s -w" -o /binaries/node-labeller ./cmd/node-labeller`) | nindent 6 }}
    echo "Done"
  - |
    cd /src-vlctl
    export GOOS=linux
    export GOARCH=amd64
    export CGO_ENABLED=0
    echo '== go build -ldflags="-s -w" -o /binaries/vlctl ./cmd/vlctl/main.go =='
    {{- $_ := set $ "ProjectName" (list .ImageName "vlctl" | join "/") }}
    {{- include "image-build.build" (set $ "BuildCommand" `go build -ldflags="-s -w" -o /binaries/vlctl ./cmd/vlctl/main.go`) | nindent 6 }}
    echo "Done"
---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}-cbuilder
final: false
fromImage: {{ eq $.SVACE_ENABLED "false" | ternary "builder/golang-debian-1.25" "builder/golang-alt-1.25" }}
git:
  - add: {{ .ModuleDir }}/images/{{ .ImageName }}/static_binaries
    to: /static_binaries
    stageDependencies:
      install:
        - '*.c'
shell:
  beforeInstall:
{{- if eq $.SVACE_ENABLED "false" }}
  {{- include "debian packages proxy" . | nindent 2 }}
  - apt-get install --yes musl-dev musl-tools
  {{- include "debian packages clean" . | nindent 2 }}
{{- else }}
  {{- include "alt packages proxy" . | nindent 2 }}
  - apt-get -qq install -y musl-devel musl-devel-static
  {{- include "alt packages clean" . | nindent 2 }}
{{- end }}
  install:
  - |
    cd /static_binaries
    echo "Building simple app that prints I'am temp pod"
    mkdir -p /bins

    {{- $_ := set $ "ProjectName" (list .ImageName "temp_pod" | join "/") }}
    {{- include "image-build.build" (set $ "BuildCommand" `musl-gcc -static -Os -o /bins/temp_pod temp_pod.c`) | nindent 6 }}
    strip /bins/temp_pod


{{- include "vex mitigation" (list $ (printf "%s%s" $.ModuleNamePrefix $.ImageName)) }}
