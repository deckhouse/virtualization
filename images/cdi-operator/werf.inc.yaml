---
image: {{ $.ImageName }}
fromImage: base-alt-p11
import:
- image: cdi-artifact
  add: /cdi-binaries
  to: /usr/bin
  includePaths:
  - cdi-operator
  - csv-generator
  before: setup
shell:
  setup:
  - ls -la /usr/bin/cdi* /usr/bin/csv*
# Source https://github.com/kubevirt/containerized-data-importer/blob/v1.58.0/cmd/cdi-operator/BUILD.bazel
docker:
  ENTRYPOINT: ["/usr/bin/cdi-operator"]
  USER: 1001
  WORKDIR: /home/cdi-operator
