---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}
fromImage: {{ .ModuleNamePrefix }}distroless
fromCacheVersion: "{{ now | date "Mon Jan 2 15:04:05 MST 2006" }}"
git:
  {{- include "image mount points" . }}
import:
- image: {{ .ModuleNamePrefix }}virt-artifact
  add: /kubevirt-binaries/
  to: /usr/bin
  includePaths:
  - virt-operator
  before: setup
- image: {{ .ModuleNamePrefix }}virt-artifact
  add: /kubevirt-config-files/
  to: /etc
  includePaths:
  - .version
  before: setup
# Source https://github.com/kubevirt/kubevirt/blob/v1.3.1/cmd/virt-operator/BUILD.bazel
imageSpec:
  config:
    user: 64535
    entrypoint: ["/usr/bin/virt-operator"]
