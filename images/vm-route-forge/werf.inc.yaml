---
image: {{ include "ImageName" (tuple . .ImageName "builder") }}
final: false
fromImage: builder/golang-bookworm-1.23
git:
- add: {{ include "GitPath" . }}/images/{{ $.ImageName }}
  to: /app/images/vm-route-forge
  stageDependencies:
    install:
    - go.mod
    - go.sum
    setup:
    - "**/*.go"
- add: {{ include "GitPath" . }}/api
  to: /app/api
  stageDependencies:
    setup:
    - "**/*.go"
mount:
- fromPath: ~/go-pkg-cache
  to: /go/pkg
shell:
  install:
  - cd /app/images/vm-route-forge
  - go mod download
  setup:
  - cd /app/images/vm-route-forge
  - export GOOS=linux
  - export GOARCH=amd64
  - export CGO_ENABLED=0
  - go build -ldflags="-s -w" -o vm-route-forge cmd/vm-route-forge/main.go
---
image: {{ include "ImageName" (tuple . .ImageName) }}
fromImage: {{ include "ImageName" (tuple . "distroless") }}
import:
- image: {{ include "ImageName" (tuple . .ImageName "builder") }}
  add: /app/images/vm-route-forge/vm-route-forge
  to: /app/vm-route-forge
  after: install
imageSpec:
  config:
    user: 64535
    workingDir: "/app"
    entrypoint: ["/app/vm-route-forge"]
