# https://taskfile.dev

version: "3"

vars:
  DLV_IMAGE:
    sh: if [ -z $DLV_IMAGE ]; then echo "ttl.sh/$(uuidgen | awk '{print tolower($0)}'):10m" ; else echo $DLV_IMAGE ; fi

tasks:
  lint:
    desc: "Run linters locally"
    deps:
      - _ensure:golangci-lint
    cmds:
      - golangci-lint run

  _ensure:golangci-lint:
    desc: "Ensure golangci-lint v2+ is available"
    internal: true
    cmds:
      - |
        GOLANGCI_LINT_MIN_VERSION="2.0"
        if ! command -v golangci-lint &> /dev/null; then
          echo "Installing golangci-lint..."
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin
        fi
        CURRENT_VERSION=$(golangci-lint --version 2>/dev/null | grep -oP 'version \K[0-9]+\.[0-9]+' || echo "0.0")
        if [ "$(printf '%s\n' "$GOLANGCI_LINT_MIN_VERSION" "$CURRENT_VERSION" | sort -V | head -n1)" != "$GOLANGCI_LINT_MIN_VERSION" ]; then
          echo "Upgrading golangci-lint from $CURRENT_VERSION to $GOLANGCI_LINT_MIN_VERSION+"
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin
        fi

  gen:
    desc: "Generate"
    cmd: go generate ./...

  dlv:build:
    desc: "Build image vm-route-forge with dlv"
    cmd: cd ../../ && docker build -f ./images/vm-route-forge/dlv.Dockerfile -t "{{ .DLV_IMAGE }}" .

  dlv:build-push:
    desc: "Build and Push image vm-route-forge with dlv"
    cmds:
      - task: dlv:build
      - docker push "{{ .DLV_IMAGE }}"
      - task: dlv:print

  dlv:print:
    desc: "Print subcommands for debug"
    env:
      IMAGE: "{{ .DLV_IMAGE }}"
    cmd: |
      cat <<EOF
      kubectl -n d8-virtualization patch ds vm-route-forge --type='strategic' -p '{
        "spec": {
          "template": {
            "spec": {
              "containers": [ {
                "name": "vm-route-forge",
                "image": "${IMAGE}",
                "ports": [ { "containerPort": 2345, "name": "dlv" } ]
              }]
            }
          }
        }
      }'
      kubectl -n d8-virtualization port-forward $(kubectl -n d8-virtualization get pod -l app=vm-route-forge -oname | head -1) 2345:2345
      EOF
