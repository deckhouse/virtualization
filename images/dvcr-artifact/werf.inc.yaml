---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}-src-artifact
final: false
fromImage: builder/src
git:
- add: {{ .ModuleDir }}/images/{{ .ImageName }}
  to: /src
  stageDependencies:
    install:
    - go.mod
    - go.sum
    - "**/*.go"
---
{{- $nameDeps := print .ImageName "-dependencies" -}}
{{- define "$nameDeps" -}}
packages:
- libnbd
- libxml2
- glibc
{{- end -}}

{{ $builderDeps := include "$nameDeps" . | fromYaml }}

image: {{ .ModuleNamePrefix }}{{ .ImageName }}-builder
final: false
fromImage: {{ eq $.SVACE_ENABLED "false" | ternary "builder/golang-alt-1.25" "builder/golang-alt-1.25" }}
secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}
import:
- image: {{ .ModuleNamePrefix }}{{ .ImageName }}-src-artifact
  add: /src
  to: /src
  before: install
{{- include "importPackageImages" (list . $builderDeps.packages "install") -}}
shell:
  install:
  - |
    # Install packages
    PKGS="{{ $builderDeps.packages | join " " }}"
    for pkg in $PKGS; do
      cp -a /$pkg/. /
      rm -rf /$pkg
    done
  - cd /src
  - export GOPROXY=$(cat /run/secrets/GOPROXY)
  - go mod download
  setup:
  - mkdir /out
  - cd /src
  - |
    export GO111MODULE=on
    export GOOS=linux
    export CGO_ENABLED=1
    export GOARCH=amd64
  - |
    {{- $_ := set $ "ProjectName" (list .ImageName "dvcr-importer" | join "/") }}
    {{- include "image-build.build" (set $ "BuildCommand" `go build -tags=dvcr_no_gost_tls -ldflags="-s -w" -o /out/dvcr-importer ./cmd/dvcr-importer`) | nindent 6 }}
    {{- $_ := set $ "ProjectName" (list .ImageName "dvcr-uploader" | join "/") }}
    {{- include "image-build.build" (set $ "BuildCommand" `go build -tags=dvcr_no_gost_tls -ldflags="-s -w" -o /out/dvcr-uploader ./cmd/dvcr-uploader`) | nindent 6 }}
  - |
    export CGO_ENABLED=0
    {{- $_ := set $ "ProjectName" (list .ImageName "dvcr-cleaner" | join "/") }}
    {{- include "image-build.build" (set $ "BuildCommand" `go build -ldflags="-s -w" -o /out/dvcr-cleaner ./cmd/dvcr-cleaner`) | nindent 6 }}
  - chown -R 64535:64535 /out

---
{{- $name := print .ImageName "-dependencies" -}}
{{- define "$name" -}}
packages:
- bzip2 file xz libxml2
- libseccomp zlib zstd
- libffi gmp gnutls nettle libidn2
- p11-kit libtasn1 libfuse
- liburing libaio libaudit libcap-ng numactl
- libunistring glib2 libnbd gnu-glibc
{{- end -}}

{{ $builderDependencies := include "$name" . | fromYaml }}

image: {{ .ModuleNamePrefix }}{{ .ImageName }}-bins
final: false
fromImage: builder/distroless
import:
- image: {{ .ModuleNamePrefix }}{{ .ImageName }}-builder
  add: /out
  to: /relocate/usr/local/bin
  before: install
- image: {{ .ModuleNamePrefix }}qemu
  add: /qemu-img
  to: /relocate
  before: install
shell:
  install:
  - pm install {{ $builderDependencies.packages | join " " }} -d /relocate
