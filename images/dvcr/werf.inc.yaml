---
{{- $gitRepoName := "distribution" }}
{{- $gitRepoUrl := (printf "%s/%s.git" "distribution" $gitRepoName) }}
{{- $version := get $.Core $gitRepoName }}

image: {{ .ModuleNamePrefix }}{{ .ImageName }}-src-artifact
final: false
fromImage: builder/src
secrets:
- id: SOURCE_REPO
  value: {{ $.SOURCE_REPO }}
shell:
  install:
  - |
    echo "Git clone CDI repository..."
    mkdir -p /src
    git clone --depth 1 $(cat /run/secrets/SOURCE_REPO)/{{ $gitRepoUrl }} --branch v{{ $version }} /src/distribution


---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}
fromImage: {{ .ModuleNamePrefix }}distroless
git:
  {{- include "image mount points" . }}
import:
- image: {{ .ModuleNamePrefix }}{{ .ImageName }}-builder
  add: /container-registry-binary
  to: /usr/bin
  before: setup
  includePaths:
  - registry
# Registry configuration is stored in configmap: templates/dvcr/configmap.yaml
- image: {{ .ModuleNamePrefix }}dvcr-artifact-bins
  add: /relocate/usr/local/bin/dvcr-cleaner
  to: /usr/local/bin/dvcr-cleaner
  before: setup
imageSpec:
  config:
    user: 64535
---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}-builder
final: false
fromImage: {{ eq $.SVACE_ENABLED "false" | ternary "builder/golang-debian-1.25" "builder/golang-alt-1.25" }}
mount:
{{- include "mount points for golang builds" . }}
import:
- image: {{ .ModuleNamePrefix }}{{ .ImageName }}-src-artifact
  add: /src/distribution
  to: /distribution
  before: install
git:
# DVCR multi-tenant authorization plugin sources, compiled into the registry
# binary (see images/dvcr/dvcr-k8s-auth and images/dvcr/registry-main).
- add: {{ .ModuleDir }}/images/{{ .ImageName }}/dvcr-k8s-auth
  to: /plugin/dvcrk8s
  includePaths:
  - "*.go"
  excludePaths:
  - "*_test.go"
  stageDependencies:
    install:
    - "**/*.go"
- add: {{ .ModuleDir }}/images/{{ .ImageName }}/registry-main
  to: /plugin/registry-main
  includePaths:
  - "*.go"
  stageDependencies:
    install:
    - "**/*.go"
secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}
shell:
  install:
  - |
    export GOPROXY=$(cat /run/secrets/GOPROXY)
    export GOOS=linux
    export GOARCH=amd64
    export CGO_ENABLED=0
    export GO111MODULE=on

    mkdir -p /container-registry-binary
    cd /distribution

    # Graft the DVCR auth plugin and its entrypoint into the distribution module.
    # The plugin depends only on the distribution auth package, go-jose/v4 (already
    # a direct dependency of distribution v3) and the standard library, so no go.mod
    # changes are required.
    mkdir -p /distribution/registry/auth/dvcrk8s /distribution/cmd/dvcr-registry
    cp /plugin/dvcrk8s/*.go /distribution/registry/auth/dvcrk8s/
    cp /plugin/registry-main/*.go /distribution/cmd/dvcr-registry/

    # CVE mitigation: bump vulnerable transitive dependencies of distribution v{{ $version }}.
    # This is a stopgap until distribution is forked (like 3p-kubevirt); once forked the
    # bumps belong in the fork's go.mod. Versions must fix:
    #   x/crypto -> ssh/agent/knownhosts CVEs (CVE-2026-39827..39835, 42508, 46595..46598)
    #   x/net    -> html/http2/idna CVEs (CVE-2026-25680/25681/27136/33814/39821/42502/42506)
    #   x/sys    -> CVE-2026-39824 (0.45.0 is pulled up transitively by the crypto/net bumps)
    # distribution vendors its deps, so go.mod/go.sum edits must be followed by `go mod vendor`
    # to keep vendor/modules.txt consistent (the default build uses -mod=vendor).
    go mod edit \
      -replace golang.org/x/crypto=golang.org/x/crypto@v0.52.0 \
      -replace golang.org/x/net=golang.org/x/net@v0.55.0 \
      -replace golang.org/x/sys=golang.org/x/sys@v0.45.0
    go mod tidy
    go mod vendor

    export VERSION={{ $version }}
    {{- $_ := set $ "ProjectName" (list .ImageName "dvcr" | join "/") }}
    {{- include "image-build.build" (set $ "BuildCommand" `go build -tags dvcr_registry -o /container-registry-binary/registry -ldflags '-s -w -X github.com/distribution/distribution/v3/version.version=v$VERSION -X github.com/distribution/distribution/v3/version.revision=v$VERSION -X github.com/distribution/distribution/v3/version.mainpkg=github.com/distribution/distribution/v3' ./cmd/dvcr-registry`) | nindent 6 }}
{{- include "vex mitigation" (list $ (printf "%s%s" $.ModuleNamePrefix $.ImageName)) }}
