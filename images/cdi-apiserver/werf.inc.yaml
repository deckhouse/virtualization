---
image: {{ $.ImageName }}
# fromImage: base-alt-p11
from: {{ $.Images.BASE_SCRATCH }}
import:
- image: cdi-artifact
  add: /cdi-binaries
  to: /usr/bin
  before: setup
  includePaths:
  - cdi-apiserver
docker:
  ENTRYPOINT: ["/usr/bin/cdi-apiserver", "-alsologtostderr"]
  USER: 64535

