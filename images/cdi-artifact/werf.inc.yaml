---
# Source https://github.com/kubevirt/containerized-data-importer/blob/main/hack/build/config.sh#L31
{{- $builderImage := "quay.io/kubevirt/kubevirt-cdi-bazel-builder:2409041205-8c58c938b" }}
{{- $version := "1.60.3" }}
{{- $goVersion := "1.22.7" }}

# Update Go version in builder to prevent CVEs in CDI components.
image: {{ $.ImageName }}-builder
final: false
from: {{ $builderImage }}
shell:
  install:
  - export GIMME_GO_VERSION={{ $goVersion }}
  - |
    rm -rf /gimme && rm -rf /tmp/gimme && \
    mkdir -p /gimme && curl -sL \
      https://raw.githubusercontent.com/travis-ci/gimme/master/gimme | \
    HOME=/gimme bash > /etc/profile.d/gimme.sh
  - source /etc/profile.d/gimme.sh
docker:
  ENV:
    GIMME_GO_VERSION: "{{ $goVersion }}"
    GOPATH: "/go"
    GO111MODULE: "on"

---
image: {{ $.ImageName }}
final: false
fromImage: {{ $.ImageName }}-builder
git:
  - add: /images/{{ $.ImageName }}
    to: /
    stageDependencies:
      setup:
      - '**/*'
    includePaths:
    - patches
    - unpack-bundle.sh
    - bazel-build-binaries.sh
    excludePaths:
    - patches/README.md
shell:
  setup:
  - git clone --depth 1 --branch v{{ $version }} https://github.com/kubevirt/containerized-data-importer.git /containerized-data-importer
  - cd /containerized-data-importer
  - |
    for p in /patches/*.patch ; do
      echo -n "Apply ${p} ... "
      git apply  --ignore-space-change --ignore-whitespace ${p} && echo OK || (echo FAIL ; exit 1)
    done
  - echo "========== Build CDI binaries ============"
  - echo Start time
  - date
  - time /entrypoint.sh /bazel-build-binaries.sh
  - echo End time
  - date
  - du -h /containerized-data-importer/bazel*
  - ls -la .
  - ls -la bazel-bin
  - find bazel-bin
  - echo "========== Build CDI images ============"
  - echo Start time
  - date
  - time /entrypoint.sh make bazel-build-images DOCKER=0
  - echo End time
  - date
  - echo find cdi-controller
  - find / -type f -name cdi-controller
  - echo find cdi-operator
  - find / -type f -name cdi-operator

    #- echo find images tars
  #- find / -type f -name '*.tar'
  - du -shc /containerized-data-importer/*
  - echo "Calculate garbage size after first build"
  - du -shc /root/.cache /containerized-data-importer /tmp/*
  - echo "====== Create tar bundle with CDI images ========"
  - date Start time
  - time /entrypoint.sh bazel build --config=x86_64 --define container_prefix=kubevirt --define image_prefix= --define container_tag=latest //:container-images-bundle.tar
  - echo End time
  - date
  - echo "======  Unpack CDI images into /  ======"
  - tar tf /containerized-data-importer/bazel-bin/container-images-bundle.tar
  - time tar -C / --one-top-level -xf /containerized-data-importer/bazel-bin/container-images-bundle.tar
  - du -shc /containerized-data-importer/*
  - mkdir -p /images && cd /images && time /unpack-bundle.sh /container-images-bundle/
  - du -shc /images/* || true
  - du -shc /container-images-bundle/*
  # reduce image size (~12Gb)
  - echo "Calculate garbage size"
  - du -sh /root/.cache /container-images-bundle/* /containerized-data-importer/* /tmp/*
  - rm -rf /root/.cache
  - rm -rf /container-images-bundle
  - rm -rf /containerized-data-importer
  - rm -rf /tmp/*
