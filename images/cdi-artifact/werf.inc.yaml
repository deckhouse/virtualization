---
# Source https://github.com/kubevirt/containerized-data-importer/blob/main/hack/build/config.sh#L31
{{- $builderImage := "quay.io/kubevirt/kubevirt-cdi-bazel-builder:2409041205-8c58c938b" }}
{{- $version := "1.60.3" }}
{{- $goVersion := "1.22.7" }}

# Update Go version in builder to prevent CVEs in CDI components.
image: {{ $.ImageName }}-builder
final: false
from: {{ $builderImage }}
shell:
  install:
  - export GIMME_GO_VERSION={{ $goVersion }}
  - |
    rm -rf /gimme && rm -rf /tmp/gimme && \
    mkdir -p /gimme && curl -sL \
      https://raw.githubusercontent.com/travis-ci/gimme/master/gimme | \
    HOME=/gimme bash > /etc/profile.d/gimme.sh
  - source /etc/profile.d/gimme.sh
docker:
  ENV:
    GIMME_GO_VERSION: "{{ $goVersion }}"
    GOPATH: "/go"
    GO111MODULE: "on"

---
image: {{ $.ImageName }}
final: false
fromImage: {{ $.ImageName }}-builder
git:
  - add: /images/{{ $.ImageName }}
    to: /
    stageDependencies:
      setup:
      - '**/*'
    includePaths:
    - patches
    - unpack-bundle.sh
    - bazel-build-binaries.sh
    excludePaths:
    - patches/README.md
shell:
  setup:
  - git clone --depth 1 --branch v{{ $version }} https://github.com/kubevirt/containerized-data-importer.git /containerized-data-importer
  - cd /containerized-data-importer
  - |
    for p in /patches/*.patch ; do
      echo -n "Apply ${p} ... "
      git apply  --ignore-space-change --ignore-whitespace ${p} && echo OK || (echo FAIL ; exit 1)
    done

  - echo "========== Build CDI binaries ============"

  - echo Start time
  - date
  - time /entrypoint.sh /bazel-build-binaries.sh
  - echo End time
  - date

  - echo "Find rpms"
  - find bazel-out -type f -name "*.rpm"

  - echo Find executables in bazel-bin
  - find bazel-bin -type f -executable

  - echo find cdi-controller
  - find bazel-out -type f -name cdi-controller

  - echo find cdi-operator
  - find bazel-out -type f -name cdi-operator

  - df -h

    #- du -h /containerized-data-importer/bazel*
    # 8.0K	/containerized-data-importer/bazel/platforms
    # 8.0K	/containerized-data-importer/bazel/toolchain/aarch64-none-linux-gnu/wrappers
    # 20K	/containerized-data-importer/bazel/toolchain/aarch64-none-linux-gnu
    # 28K	/containerized-data-importer/bazel/toolchain
    # 40K	/containerized-data-importer/bazel
    # 4.0K	/containerized-data-importer/bazel-bin
    # 4.0K	/containerized-data-importer/bazel-containerized-data-importer
    # 4.0K	/containerized-data-importer/bazel-out
    # 4.0K	/containerized-data-importer/bazel-testlogs


  #- ls -la .
    # drwxr-xr-x 21 root root   4096 Sep 26 19:03 .
    # drwxr-xr-x  1 root root   4096 Sep 26 19:02 ..
    # -rw-r--r--  1 root root   2365 Sep 26 19:02 .bazelrc
    # -rw-r--r--  1 root root    362 Sep 26 19:02 .fossa.yml
    # drwxr-xr-x  8 root root   4096 Sep 26 19:03 .git
    # drwxr-xr-x  3 root root   4096 Sep 26 19:02 .github
    # -rw-r--r--  1 root root    248 Sep 26 19:02 .gitignore
    # -rw-r--r--  1 root root   1242 Sep 26 19:02 .golangci.yml
