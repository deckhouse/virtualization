---
# Source https://github.com/kubevirt/containerized-data-importer/blob/main/hack/build/config.sh#L31
{{- $builderImage := "quay.io/kubevirt/kubevirt-cdi-bazel-builder:2409041205-8c58c938b" }}
{{- $version := "1.60.3" }}
{{- $goVersion := "1.22.7" }}

# Update Go version in builder to prevent CVEs in CDI components.
image: {{ $.ImageName }}-builder
final: false
from: {{ $builderImage }}
shell:
  install:
  - export GIMME_GO_VERSION={{ $goVersion }}
  - |
    rm -rf /gimme && rm -rf /tmp/gimme && \
    mkdir -p /gimme && curl -sL \
      https://raw.githubusercontent.com/travis-ci/gimme/master/gimme | \
    HOME=/gimme bash > /etc/profile.d/gimme.sh
  - source /etc/profile.d/gimme.sh
docker:
  ENV:
    GIMME_GO_VERSION: "{{ $goVersion }}"
    GOPATH: "/go"
    GO111MODULE: "on"

---
image: {{ $.ImageName }}
final: false
fromImage: {{ $.ImageName }}-builder
git:
  - add: /images/{{ $.ImageName }}
    to: /
    stageDependencies:
      setup:
      - '**/*'
    includePaths:
    - patches
    - custom-build
    excludePaths:
    - patches/README.md
shell:
  setup:
  - df -h

  - git clone --depth 1 --branch v{{ $version }} https://github.com/kubevirt/containerized-data-importer.git /containerized-data-importer
  - cd /containerized-data-importer
  - |
    for p in /patches/*.patch ; do
      echo -n "Apply ${p} ... "
      git apply  --ignore-space-change --ignore-whitespace ${p} && echo OK || (echo FAIL ; exit 1)
    done
  - cp -r /custom-build .

  - df -h

  - echo "========== Build CDI binaries ============"

  - echo Start time
  - date
  - time /entrypoint.sh /custom-build/build.sh
  - echo End time
  - date

  - mkdir /cdi-binaries
  - tar xf bazel-bin/custom-build/cdi-binaries.tar -C /cdi-binaries
  # Additional script for cdi-cloner image.
  - cp cmd/cdi-cloner/cloner_startup.sh /cdi-binaries
  - chmod +x /cdi-binaries/*
  - ls -la /cdi-binaries

  - df -h /

  # Reduce stored image size (~6.5Gb)
  - echo "Calculate garbage size"
  - du -sch /root/.cache /containerized-data-importer /tmp
  - echo "Cleanup"
  - rm -rf /root/.cache
  - rm -rf /containerized-data-importer
  - rm -rf /tmp/*
  - mount

  - df -h /

---
image: {{ $.ImageName }}-go-builder
final: false
from: {{ .Images.BASE_GOLANG_22_BOOKWORM }}
mount:
  - fromPath: ~/go-pkg-cache
    to: /go/pkg
shell:
  install:
    - git clone --depth 1 --branch v{{ $version }} https://github.com/kubevirt/containerized-data-importer.git /containerized-data-importer
    - cd /containerized-data-importer
    - echo Start downloading modules ...
    - date
    - go mod download
    - export GO111MODULE=on
    - export GOOS=linux
    - export CGO_ENABLED=0
    - export GOARCH=amd64
    - mkdir /cdi-binaries
    - echo Start building binaries ...
    - date
    - echo ============== Build cdi-apiserver ===========
    - go build -v -a -o /cdi-binaries/cdi-apiserver ./cmd/cdi-apiserver
    - df -h /
    - echo ============== Build cdi-cloner ===========
    - go build -v -a -o /cdi-binaries/cdi-cloner ./cmd/cdi-cloner
    - df -h /
    - echo ============== Build cdi-controller ===========
    - go build -v -a -o /cdi-binaries/cdi-controller ./cmd/cdi-controller
    - df -h /
    - echo ============== Build cdi-uploadproxy ===========
    - go build -v -a -o /cdi-binaries/cdi-uploadproxy ./cmd/cdi-uploadproxy
    - df -h /
    - echo ============== Build cdi-uploadserver ===========
    - go build -v -a -o /cdi-binaries/cdi-uploadserver ./cmd/cdi-uploadserver
    - df -h /
    - echo ============== Build cdi-importer ===========
    - go build -v -a -o /cdi-binaries/cdi-importer ./cmd/cdi-importer
    - df -h /
    - echo ============== Build cdi-containerimage-server ===========
    - go build -v -a -o /cdi-binaries/cdi-containerimage-server ./tools/cdi-containerimage-server
    - df -h /
    - echo ============== Build cdi-image-size-detection  ===========
    - go build -v -a -o /cdi-binaries/cdi-image-size-detection ./tools/cdi-image-size-detection
    - df -h /
    - echo ============== Build cdi-source-update-poller  ===========
    - go build -v -a -o /cdi-binaries/cdi-source-update-poller ./tools/cdi-source-update-poller
    - df -h /
    - echo ============== Build cdi-operator  ===========
    - go build -v -a -o /cdi-binaries/cdi-operator ./cmd/cdi-operator
    - df -h /
    - echo ============== Build csv-generator  ===========
    - go build -v -a -o /cdi-binaries/csv-generator ./tools/csv-generator
    - df -h /
    - echo End building binaries ...
    - date
    - cp cmd/cdi-cloner/cloner_startup.sh /cdi-binaries
    - chmod +x /cdi-binaries/*
    - ls -la /cdi-binaries
