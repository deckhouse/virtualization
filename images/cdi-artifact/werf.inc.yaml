    # lrwxrwxrwx  1 root root    108 Sep 26 19:03 bazel-bin -> /root/.cache/bazel/_bazel_root/956820439e927dbd0274199afbe5fe60/execroot/__main__/bazel-out/k8-fastbuild/bin
    # lrwxrwxrwx  1 root root     81 Sep 26 19:03 bazel-containerized-data-importer -> /root/.cache/bazel/_bazel_root/956820439e927dbd0274199afbe5fe60/execroot/__main__
    # lrwxrwxrwx  1 root root     91 Sep 26 19:03 bazel-out -> /root/.cache/bazel/_bazel_root/956820439e927dbd0274199afbe5fe60/execroot/__main__/bazel-out
    # lrwxrwxrwx  1 root root    113 Sep 26 19:03 bazel-testlogs -> /root/.cache/bazel/_bazel_root/956820439e927dbd0274199afbe5fe60/execroot/__main__/bazel-out/k8-fastbuild/testlogs
