---
{{- $version := "local" }}

{{- $name := print .ImageName "-dependencies" -}}
{{- define "$name" -}}
binaries:
- /cdi-binaries/cdi-importer
packages:
- libnbd
- libxml2
- xz
- libtasn1
- libunistring
- libffi libgmp gnutls
- nettle libidn2
- p11-kit zlib
- glibc
{{- end -}}

{{ $builderDependencies := include "$name" . | fromYaml }}

image: {{ .ModuleNamePrefix }}{{ .ImageName }}
final: false
fromImage: {{ eq $.SVACE_ENABLED "false" | ternary "builder/golang-alt-1.25" "builder/golang-alt-svace-1.25" }}
mount:
{{- include "mount points for golang builds" . }}
secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}
git:
- add: {{ .ModuleDir }}/images/{{ .ImageName }}/containerized-data-importer
  to: /containerized-data-importer
  stageDependencies:
    install:
    - go.mod
    - go.sum
    setup:
    - '**/*'
  excludePaths:
  - .git
{{- include "importPackageImages" (list . $builderDependencies.packages "install") -}}
shell:
  install:
  - |
    # Install packages
    PKGS="{{ $builderDependencies.packages | join " " }}"
    for pkg in $PKGS; do
      cp -a /$pkg/. /
      rm -rf /$pkg
    done

  - |
    export GOPROXY=$(cat /run/secrets/GOPROXY)

    echo Download Go modules.
    cd /containerized-data-importer
    go mod download

  setup:
  - mkdir /cdi-binaries
  - cd /containerized-data-importer

  - export GOOS=linux
  - export GOARCH=amd64
  - export CGO_ENABLED=0
  - export CGO_ENABLED=1

  - echo ============== Build cdi-importer ===========
  - |
    {{- $_ := set $ "ProjectName" (list .ImageName "cdi-importer" | join "/") }}
    {{- include "image-build.build" (set $ "BuildCommand" `go build -ldflags="-s -w" -o /cdi-binaries/cdi-importer ./cmd/cdi-importer`) | nindent 6 }}

  - chown -R 64535:64535 /cdi-binaries/*
  - ls -la /cdi-binaries
