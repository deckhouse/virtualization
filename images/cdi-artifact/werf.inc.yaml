    # drwxr-xr-x  3 root root   4096 Sep 26 19:02 staging
    # drwxr-xr-x  7 root root   4096 Sep 26 19:02 tests
    # drwxr-xr-x  3 root root   4096 Sep 26 19:02 third_party
    # drwxr-xr-x 23 root root   4096 Sep 26 19:02 tools
    # -rw-r--r--  1 root root    266 Sep 26 19:02 tools.go
    # drwxr-xr-x 15 root root   4096 Sep 26 19:02 vendor

  #- ls -la bazel-bin
  # lrwxrwxrwx 1 root root 108 Sep 26 19:03 bazel-bin -> /root/.cache/bazel/_bazel_root/956820439e927dbd0274199afbe5fe60/execroot/__main__/bazel-out/k8-fastbuild/bin



  - echo "========== Build CDI images ============"

  - echo Start time
  - date
  - time /entrypoint.sh make bazel-build-images DOCKER=0
  - echo End time
  - date

  - echo "Find tar files"
  - find bazel-out -type f -name "*.tar"

  - du -shc /containerized-data-importer/*

  - echo "Calculate garbage size after building images"
  - du -shc /root/.cache /containerized-data-importer /tmp/*

  - df -h

  - echo "====== Create tar bundle with CDI images ========"
  - echo Start time
  - date
  - time /entrypoint.sh bazel build --config=x86_64 --define container_prefix=kubevirt --define image_prefix= --define container_tag=latest //:container-images-bundle.tar
  - echo End time
  - date

  - df -h

  - echo "======  Unpack CDI images into /  ======"
  - echo Start time
  - date
  - tar tf /containerized-data-importer/bazel-bin/container-images-bundle.tar
  - time tar -C / --one-top-level -xf /containerized-data-importer/bazel-bin/container-images-bundle.tar
  - mkdir -p /images && cd /images && time /unpack-bundle.sh /container-images-bundle/
  - echo End time
  - date
  - du -shc /containerized-data-importer/* || true
  - du -shc /images/* || true
  - du -shc /container-images-bundle/* || true

  - df -h

    # reduce image size (~12Gb)
  - echo "Calculate garbage size"
  - du -sh /root/.cache /container-images-bundle/* /containerized-data-importer/* /tmp/*
  - rm -rf /root/.cache
  - rm -rf /container-images-bundle
  - rm -rf /containerized-data-importer
  - rm -rf /tmp/*

  - df -h
