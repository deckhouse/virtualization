---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}
final: false
fromImage: builder/scratch
import:
- image: {{ .ModuleNamePrefix }}{{ .ImageName }}-builder
  add: /out
  to: /{{ $.ImageName }}-img
  before: setup
---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}-builder
final: false
fromImage: builder/distroless
shell:
  install:
    - pm install qemu -d /out
