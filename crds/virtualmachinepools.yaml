                        pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                        type: string
                      reclaim:
                        description:
                          Reclaim controls what happens to the disk when
                          its replica is removed.
                        properties:
                          keep:
                            default: 0
                            description: |-
                              Keep is the number of free (Retain) disks always kept warm for fast
                              scale-up; these are immune to the ttl. Only meaningful with Retain.
                            format: int32
                            minimum: 0
                            type: integer
                          onScaleDown:
                            default: Delete
                            description: OnScaleDown is Delete (default) or Retain.
                            enum:
                              - Delete
                              - Retain
                            type: string
                          ttl:
                            description: |-
                              TTL is how long a free disk lives beyond the warm buffer before it is
                              garbage-collected. Only meaningful with Retain.
                            type: string
                        type: object
                        x-kubernetes-validations:
                          - message: "keep and ttl are only valid with onScaleDown: Retain"
                            rule: self.onScaleDown == 'Retain' || (self.keep == 0 && !has(self.ttl))
                          - message:
                              keep requires ttl; without ttl free disks are never
                              garbage-collected, so keep would have no effect
                            rule: self.keep == 0 || has(self.ttl)
