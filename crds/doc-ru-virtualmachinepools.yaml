spec:
  versions:
    - name: v1alpha2
      schema:
        openAPIV3Schema:
          description: |
            VirtualMachinePool декларативно управляет группой одинаковых виртуальных машин: поддерживает заданное число реплик, масштабируется через стандартный сабресурс `scale` и переиспользует «тяжёлые» диски между поколениями реплик.

            Ресурс доступен только в платных редакциях (EE/SE+) и включается feature gate `VirtualMachinePool` модуля.
          properties:
            spec:
              description: |
                Желаемое состояние пула виртуальных машин.
              properties:
                replicas:
                  description: |
                    Желаемое число виртуальных машин в пуле.

                    Поле пишет только его владелец — автоскейлер или человек через сабресурс `scale`, либо обработчик адресного сжатия. Контроллер его не изменяет. Границы удерживает автоскейлер; жёсткий потолок — ResourceQuota пространства имён.
                scaleDownPolicy:
                  description: |
                    Определяет, какая реплика удаляется при безадресном сжатии пула через сабресурс `scale`. Поле обязательно и не имеет значения по умолчанию — выбор делается осознанно.

                    * `NewestFirst` — безадресное сжатие разрешено; первыми удаляются самые молодые реплики (с наименьшим накопленным состоянием).
                    * `OldestFirst` — безадресное сжатие разрешено; первыми удаляются самые старые реплики (быстрая ротация).
                    * `Explicit` — безадресное сжатие через `scale` отклоняется вебхуком; реплики убираются только по имени. Для «занятых» нагрузок — раннеров CI и VDI.
                virtualMachineTemplate:
                  description: |
                    Шаблон, из которого создаётся каждая реплика. Его `spec` — это обычный VirtualMachineSpec, поэтому реплика ничем не отличается от вручную созданной виртуальной машины.
                  properties:
                    metadata:
                      description: |
                        Метаданные, применяемые к каждой реплике. Произвольные пользовательские метки и аннотации разрешены; управляемые метки пула контроллер добавляет поверх них.
                      properties:
                        labels:
                          description: |
                            Метки, добавляемые каждой реплике.
                        annotations:
                          description: |
                            Аннотации, добавляемые каждой реплике.
                    spec:
                      description: |
                        Спецификация виртуальной машины, из которой создаётся каждая реплика (обычный VirtualMachineSpec, см. [VirtualMachine](cr.html#virtualmachine)).

                        Per-replica диски указываются в `blockDeviceRefs` по имени своего шаблона из `virtualDiskTemplates` — так задаётся полный список устройств и порядок загрузки, как в обычной виртуальной машине.
                virtualDiskTemplates:
                  description: |
                    Описание дисков на каждую реплику. Диск с политикой возврата `Delete` принадлежит своей виртуальной машине и удаляется вместе с ней; диск с политикой `Retain` принадлежит пулу, переживает реплику и переиспользуется при последующем scale-up.
                  items:
                    properties:
                      name:
                        description: |
                          Имя шаблона диска в пуле. DNS-1123 label (без точек), так как встраивается в имена VirtualDisk.
                      reclaim:
                        description: |
                          Управляет судьбой диска при удалении его реплики.
                        properties:
                          onScaleDown:
                            description: |
                              `Delete` (по умолчанию) — диск удаляется вместе с репликой; `Retain` — диск сохраняется и переиспользуется.
                          keep:
                            description: |
                              Сколько свободных (`Retain`) дисков всегда держать «тёплыми» для быстрого scale-up; они иммунны к `ttl`. Имеет смысл только с `Retain`.
                          ttl:
                            description: |
                              Время жизни свободного диска сверх «тёплого» буфера, после которого он удаляется сборщиком мусора. Имеет смысл только с `Retain`.
                      spec:
                        description: |
                          Спецификация диска (обычный VirtualDiskSpec, см. [VirtualDisk](cr.html#virtualdisk)).
            status:
              description: |
                Наблюдаемое состояние пула виртуальных машин.
              properties:
                observedGeneration:
                  description: |
                    Поколение спецификации, обработанное контроллером.
                replicas:
                  description: |
                    Число существующих членов пула, включая находящиеся в состоянии `Terminating`: такая машина всё ещё занимает ресурсы, поэтому это реальная ёмкость.
                readyReplicas:
                  description: |
                    Число членов, готовых обслуживать нагрузку (без учёта `Terminating`).
                desiredTemplateHash:
                  description: |
                    Хэш текущего `virtualMachineTemplate` — ревизия, к которой контроллер приводит реплики.
                updatedReplicas:
                  description: |
                    Число реплик, фактически находящихся на ревизии `desiredTemplateHash` (полностью синхронизированных).
                restartPendingReplicas:
                  description: |
                    Число реплик, спека которых уже приведена к новому шаблону, но применение его disruptive-части ждёт перезапуска.
                selector:
                  description: |
                    Строковый селектор меток, публикуемый контроллером для сабресурса `scale`; HPA/KEDA читают его самостоятельно.
                conditions:
                  description: |
                    Условия, описывающие текущее состояние пула.
