                        blockDeviceRefs:
                          description: |
                            Список блочных устройств, которые могут быть смонтированы в ВМ.

                            Порядок загрузки определяется порядком в списке.
                          items:
                            properties:
                              bootOrder:
                                description: |
                                  Порядок загрузки блочного устройства. Меньшее значение означает более высокий приоритет.
                                  Если параметр не задан ни для одного устройства, порядок загрузки определяется позицией устройства в списке (начиная с 1).
                                  Если параметр задан хотя бы для одного устройства, порядок загрузки определяется указанными значениями.
                              kind:
                                description: |
                                  Поддерживаемые типы устройств:

                                  * `ClusterVirtualImage` — использовать ClusterVirtualImage в качестве диска. Данный тип всегда монтируется в режиме для чтения (`ReadOnly`). ISO-образ будет смонтирован как устройство CD-ROM;
                                  * `VirtualImage` — использовать VirtualImage в качестве диска. Данный тип всегда монтируется в режиме для чтения (`ReadOnly`). ISO-образ будет смонтирован как устройство CD-ROM;
                                  * `VirtualDisk` — использовать VirtualDisk в качестве диска. Данный тип всегда монтируется в режиме для чтения и записи (`ReadWrite`).
                              name:
                                description: |
                                  Имя ресурса заданного типа.
                        bootloader:
                          description: |
                            Загрузчик для ВМ:

                            * `BIOS` — использовать BIOS;
                            * `EFI` — использовать Unified Extensible Firmware (EFI/UEFI);
                            * `EFIWithSecureBoot` — использовать UEFI/EFI с поддержкой функции Secure Boot.
                        cpu:
                          description: |
                            Блок определяет настройки CPU для виртуальной машины.
                          properties:
                            coreFraction:
                              description: |
                                Гарантированная доля времени CPU, выделяемая ВМ. Указывается в процентах или значением `auto`, чтобы долей управлял вертикальный автоскейлер ВМ (доступен в EE); в этом случае фактическое значение публикуется в `.status.resources.cpu.coreFraction`.
                                Допустимый диапазон значений определяется параметром `sizePolicy` в используемом VirtualMachineClass. Если `sizePolicy` не задан, используйте значения в диапазоне `1–100%`.
                                Если значение параметра не указано, применяется значение по умолчанию из `sizePolicy` используемого VirtualMachineClass.
                                Если значение по умолчанию в классе не задано, применяется `100%`.
                            cores:
                              description: |
                                Количество ядер.
                        disruptions:
                          description: |
                            Описание политики применения изменений, требующих перезагрузки ВМ.

                            Для применения изменений в некоторых параметрах конфигурации ВМ потребуется перезагрузка. Данная политика позволяет задать поведение, определяющее как ВМ будет реагировать на такие изменения.
                          properties:
                            restartApprovalMode:
                              description: |
                                Режим одобрения для изменений, требующих перезагрузки ВМ:

                                - `Manual` — изменения не будут применены до тех пор, пока пользователь самостоятельно не осуществит перезагрузку ВМ;
                                - `Automatic` — ВМ будет перезагружена сразу после сохранения параметров, требующих перезагрузки.
                        enableParavirtualization:
                          description: |
                            Использовать шину `virtio` для подключения виртуальных устройств ВМ. Чтобы отключить `virtio` для ВМ, установите значение `False`.

                            > **Внимание**: Для использования режима паравиртуализации некоторые ОС требуют установки соответствующих драйверов.

                            > **Внимание**: При значении `false` горячее подключение блочных устройств через `.spec.blockDeviceRefs` не поддерживается. Изменения блочных устройств требуют перезагрузки ВМ. Горячее подключение через `VirtualMachineBlockDeviceAttachment` по-прежнему поддерживается.
                        liveMigrationPolicy:
                          description: |
                            Политика для процесса живой миграции:

                            * `AlwaysSafe` — использовать безопасный вариант для автоматических миграций и для ручного запуска. Не включать замедление CPU.
                            * `PreferSafe` — использовать безопасный вариант для автоматических миграций. Замедление CPU можно включить вручную с помощью поля `force=true` в VMOP.
                            * `AlwaysForced` — включать замедление CPU для автоматических миграций и для ручного запуска. Нельзя отключить замедление CPU.
                            * `PreferForced` — включать замедление CPU для автоматических миграций. Замедление CPU можно выключить вручную с помощью поля `force=false` в VMOP.
                        memory:
                          description: |
                            Блок настроек оперативной памяти для виртуальной машины.
                        nodeSelector:
                          description: |
                            [По аналогии](https://kubernetes.io/docs/tasks/configure-pod-container/assign-pods-nodes//) c параметром подов `spec.nodeSelector` в Kubernetes.
                        osType:
                          description: |
                            Параметр позволяет выбрать тип используемой ОС, для которой будет создана ВМ с оптимальным набором необходимых виртуальных устройств и параметров.

                            * `Windows` — для ОС семейства Microsoft Windows;
                            * `Generic` — для других типов ОС.
                        priorityClassName:
                          description: |
                            [По аналогии](https://kubernetes.io/docs/concepts/scheduling-eviction/pod-priority-preemption/) с параметром подов `spec.priorityClassName` в Kubernetes.
                        provisioning:
                          description: |
                            Блок описания сценария начальной инициализации ВМ.
                          properties:
                            sysprepRef:
                              description: |
                                Ссылка на существующий ресурс со сценарием автоматизации Windows.

                                Структура ресурса для типа `SysprepRef`:

                                * `.data.autounattend.xml`;
                                * `.data.unattend.xml`.
                              properties:
                                kind:
                                  description: |
                                    Тип ресурса.
                                    Используйте секрет с типом `provisioning.virtualization.deckhouse.io/sysprep`.
                            type:
                              description: |
                                Поддерживаемые параметры для использования сценария инициализации:

                                * `UserData` — использовать сценарий `cloud-init` в секции `.spec.provisioning.UserData`;
                                * `UserDataRef` — использовать сценарий `cloud-init`, который находится в другом ресурсе;
                                * `SysprepRef` — использовать сценарий автоматизации установки Windows, который находится в другом ресурсе.
                            userData:
                              description: |
                                Текст сценария `cloud-init`.

                                [Дополнительная информация о `cloud-init` и примеры конфигурации](https://cloudinit.readthedocs.io/en/latest/reference/examples.html).
                            userDataRef:
                              description: |
                                Ссылка на существующий ресурс со сценарием `cloud-init`.

                                Структура ресурса для типа `userDataRef`:

                                * `.data.userData`.
                              properties:
                                kind:
                                  description: |
                                    Тип ресурса.
                        runPolicy:
                          description: |
                            Параметр определяет политику запуска ВМ:

                            * `AlwaysOn` — после создания ВМ всегда находится в работающем состоянии, даже в случае отключения средствами ОС;
                            * `AlwaysOff` — после создания ВМ всегда находится в выключенном состоянии;
                            * `Manual` — после создания ВМ выключается. Включение и выключение ВМ контролируется через API-сервисы или средства ОС;
                            * `AlwaysOnUnlessStoppedManually` — после создания ВМ всегда находится в работающем состоянии. ВМ можно выключить средствами ОС или воспользоваться командой для утилиты d8: `d8 v stop <vm_name>`.
                        terminationGracePeriodSeconds:
                          description: |
                            Период ожидания после подачи сигнала о прекращении работы ВМ (`SIGTERM`), по истечении которого работа ВМ принудительно завершается.
                        tolerations:
                          description: |
                            [По аналогии](https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/) с параметром подов `spec.tolerations` в Kubernetes.
                          items:
                            description:
                              Под, к которому привязан этот toleration, допускает
                              любой taint, соответствующий тройке <key, value, effect>
                              с учётом оператора <operator>.
                            properties:
                              effect:
                                description:
                                  "Effect задаёт эффект taint, которому нужно
                                  соответствовать. Пустое значение означает соответствие
                                  всем эффектам. Если задано, допустимые значения: NoSchedule,
                                  PreferNoSchedule и NoExecute."
                              key:
                                description:
                                  Key — ключ taint, к которому применяется
                                  toleration. Пустое значение означает соответствие
                                  всем ключам. Если ключ пуст, оператор должен быть
                                  Exists; такая комбинация означает соответствие всем
                                  значениям и всем ключам.
                              operator:
                                description:
                                  "Operator задаёт отношение ключа к значению.
                                  Допустимые операторы: Exists и Equal, по умолчанию
                                  Equal. Exists эквивалентен подстановочному значению,
                                  поэтому под может допускать все taint определённой
                                  категории."
                              tolerationSeconds:
                                description:
                                  TolerationSeconds задаёт время, в течение
                                  которого toleration (должен иметь эффект NoExecute,
                                  иначе поле игнорируется) допускает taint. По умолчанию
                                  не задано — taint допускается бесконечно (без вытеснения).
                                  Нулевые и отрицательные значения трактуются системой
                                  как 0 (немедленное вытеснение).
                              value:
                                description:
                                  Value — значение taint, которому соответствует
                                  toleration. Для оператора Exists значение должно быть
                                  пустым, иначе — обычная строка.
                        topologySpreadConstraints:
                          items:
                            description: |
                              Задаёт способ распределения подходящих подов по заданной топологии.
                            properties:
                              labelSelector:
                                description:
                                  LabelSelector используется для поиска подходящих
                                  подов. Поды, соответствующие этому селектору меток,
                                  учитываются при подсчёте числа подов в соответствующем
                                  домене топологии.
                                properties:
                                  matchExpressions:
                                    description:
                                      matchExpressions — список требований
                                      селектора меток. Требования объединяются по И.
                                    items:
                                      description: |
                                        Требование селектора меток — это селектор, содержащий ключ, набор значений и оператор, связывающий ключ со значениями.
                                      properties:
                                        key:
                                          description:
                                            key — ключ метки, к которому
                                            применяется селектор.
                                        operator:
                                          description:
                                            "operator задаёт отношение ключа
                                            к набору значений. Допустимые операторы:
                                            In, NotIn, Exists и DoesNotExist."
                                        values:
                                          description:
                                            values — массив строковых значений.
                                            Для операторов In и NotIn массив должен
                                            быть непустым; для Exists и DoesNotExist
                                            — пустым. При strategic merge patch массив
                                            заменяется целиком.
                                  matchLabels:
                                    description:
                                      matchLabels — набор пар {ключ, значение}.
                                      Одна пара {ключ, значение} эквивалентна элементу
                                      matchExpressions с полем key = «ключ», оператором
                                      In и массивом values, содержащим только «значение».
                                      Требования объединяются по И.
                              matchLabelKeys:
                                description: |
                                  Набор ключей лейблов пода для выбора подов, по которым вычисляется распределение.
                                  Ключи используются для получения значений из лейблов размещаемого пода; пары «ключ–значение» объединяются по И с `labelSelector`, чтобы выбрать группу существующих подов, по которым вычисляется распределение для нового пода.
                                  Один и тот же ключ не может присутствовать одновременно в `matchLabelKeys` и `labelSelector`.
                                  `matchLabelKeys` нельзя задавать, если `labelSelector` не задан.
                                  Ключи, отсутствующие в лейблах размещаемого пода, игнорируются.
                                  Пустой или незаданный список означает выбор только по `labelSelector`.

                                  Поле находится в статусе beta и требует включения feature gate `MatchLabelKeysInPodTopologySpread` (включён по умолчанию).
                              maxSkew:
                                description: |
                                  Задаёт допустимую степень неравномерности распределения ВМ.

                                  При `whenUnsatisfiable=DoNotSchedule` — максимально допустимая разница между числом подходящих ВМ в целевой топологии и глобальным минимумом.
                                  Глобальный минимум — минимальное число подходящих ВМ в подходящем домене (или ноль, если число подходящих доменов меньше `MinDomains`).

                                  Например, в кластере из трёх зон при `MaxSkew=1` и распределении ВМ с одинаковым `labelSelector` как 2/2/1 (в зонах zone1, zone2 и zone3 соответственно) глобальный минимум равен 1:

                                  * при `MaxSkew=1` новую ВМ можно разместить только в zone3 (станет 2/2/2); размещение в zone1 или zone2 нарушит `MaxSkew`, так как ActualSkew составит 3−1;
                                  * при `MaxSkew=2` новую ВМ можно разместить в любой зоне.

                                  При `whenUnsatisfiable=ScheduleAnyway` поле используется, чтобы отдавать приоритет топологиям, которые его удовлетворяют.

                                  Обязательное поле. Значение по умолчанию — 1; значение 0 не допускается.
                              minDomains:
                                description: |
                                  Задаёт минимальное число подходящих доменов.

                                  Если число подходящих доменов с совпадающими ключами топологии меньше `minDomains`, Topology Spread считает «глобальный минимум» равным 0, и затем вычисляется перекос (Skew).
                                  Когда число подходящих доменов с совпадающими ключами топологии равно или больше `minDomains`, это значение не влияет на планирование.
                                  В результате, когда число подходящих доменов меньше `minDomains`, планировщик не разместит в этих доменах больше `maxSkew` ВМ.

                                  Если значение не задано, ограничение ведёт себя так, как если бы `MinDomains` было равно 1.
                                  Допустимые значения — целые числа больше 0.
                                  Если значение задано, `whenUnsatisfiable` должно быть `DoNotSchedule`.

                                  Например, в кластере из трёх зон при `MaxSkew=2`, `MinDomains=5` и распределении ВМ с одинаковым `labelSelector` как 2/2/2 число доменов меньше 5 (`MinDomains`), поэтому «глобальный минимум» считается равным 0.
                                  В этой ситуации новая ВМ с тем же `labelSelector` не может быть запланирована: если разместить её в любой из трёх зон, вычисленный перекос составит 3 (3−0), что нарушит `MaxSkew`.
                              nodeAffinityPolicy:
                                description: |
                                  Определяет, как учитывать `nodeAffinity`/`nodeSelector` пода при вычислении перекоса распределения по топологии. Варианты:

                                  - `Honor` — в расчётах участвуют только узлы, соответствующие `nodeAffinity`/`nodeSelector`;
                                  - `Ignore` — `nodeAffinity`/`nodeSelector` игнорируются, в расчётах участвуют все узлы.

                                  Если значение не задано, поведение эквивалентно политике `Honor`.
                              nodeTaintsPolicy:
                                description: |
                                  Определяет, как учитывать taints узлов при вычислении перекоса распределения по топологии. Варианты:

                                  - `Honor` — участвуют узлы без taints, а также узлы с taints, для которых у размещаемого пода есть toleration;
                                  - `Ignore` — taints узлов игнорируются, в расчётах участвуют все узлы.

                                  Если значение не задано, поведение эквивалентно политике `Ignore`.
                              topologyKey:
                                description:
                                  TopologyKey — ключ меток узлов. Узлы с
                                  меткой с этим ключом и одинаковыми значениями считаются
                                  принадлежащими одной топологии. Каждая пара <ключ,
                                  значение> рассматривается как «корзина», и в каждую
                                  корзину стараются поместить сбалансированное число
                                  подов. Домен — конкретный экземпляр топологии; подходящий
                                  домен — домен, узлы которого удовлетворяют nodeAffinityPolicy
                                  и nodeTaintsPolicy. Например, при TopologyKey «kubernetes.io/hostname»
                                  доменом топологии является каждый узел, а при «topology.kubernetes.io/zone»
                                  — каждая зона. Обязательное поле.
                              whenUnsatisfiable:
                                description: |
                                  Задаёт, что делать с ВМ, если она не удовлетворяет ограничению распределения.

                                  - `DoNotSchedule` (по умолчанию) — планировщик не размещает ВМ.
                                  - `ScheduleAnyway` — планировщик размещает ВМ в любом месте, отдавая приоритет топологиям, помогающим уменьшить перекос.

                                  Ограничение считается «невыполнимым» для новой ВМ тогда и только тогда, когда любое возможное размещение ВМ нарушило бы `MaxSkew` в какой-либо топологии.
                                  Например, в кластере из трёх зон при `MaxSkew=1` и распределении ВМ с одинаковым `labelSelector` как 3/1/1 (в зонах zone1, zone2 и zone3 соответственно) при `WhenUnsatisfiable=DoNotSchedule` новую ВМ можно разместить только в zone2 или zone3 (станет 3/2/1 или 3/1/2), так как ActualSkew (2−1) в zone2 (zone3) удовлетворяет `MaxSkew` (1).
                                  Иными словами, кластер может оставаться несбалансированным, но планировщик не усилит дисбаланс.

                                  Обязательное поле.
                        usbDevices:
                          description: |
                            Список USB-устройств для подключения к виртуальной машине.
                            Устройства указываются по имени ресурса `USBDevice` в том же пространстве имен.
                          items:
                            properties:
                              name:
                                description: |
                                  Имя ресурса `USBDevice` в том же пространстве имен.
                        virtualMachineClassName:
                          description: |
                            Имя ресурса VirtualMachineClass, который описывает требования к виртуальному CPU и памяти, а также политику размещения ресурсов.
                        virtualMachineIPAddressName:
                          description: |
                            Имя для связанного ресурса virtualMachineIPAddress.

                            Указывается при необходимости использования ранее созданного IP-адреса ВМ.

                            Если не указано явно, по умолчанию для ВМ создаётся ресурс virtualMachineIPAddress с именем, аналогичным ресурсу ВМ (`.metadata.name`).
            status:
              description: |
                Наблюдаемое состояние пула виртуальных машин.
              properties:
                conditions:
                  description: |
                    Условия, описывающие текущее состояние пула.
                  items:
                    description: |
                      Подробные сведения об одном аспекте текущего состояния данного API-ресурса.
                    properties:
                      lastTransitionTime:
                        description: Время перехода условия из одного состояния в другое.
                      message:
                        description: Удобочитаемое сообщение с подробной информацией о последнем переходе.
                      observedGeneration:
                        description: |
                          `.metadata.generation`, на основе которого было установлено условие.
                          Например, если `.metadata.generation` в настоящее время имеет значение `12`, а `.status.conditions[x].observedGeneration` имеет значение `9`, то условие устарело.
                      reason:
                        description: Краткая причина последнего перехода состояния.
                      status:
                        description: |
                          Статус условия. Возможные значения: `True`, `False`, `Unknown`.
                      type:
                        description: Тип условия.
                desiredTemplateHash:
                  description: |
                    Хеш текущего `virtualMachineTemplate` — ревизия, к которой контроллер приводит реплики.
                observedGeneration:
                  description: |
                    Поколение спецификации, обработанное контроллером.
                readyReplicas:
                  description: |
                    Число членов, готовых обслуживать нагрузку (без учёта `Terminating`).
                replicas:
                  description: |
                    Число существующих членов пула, включая находящиеся в состоянии `Terminating`: такая машина всё ещё занимает ресурсы, поэтому это реальная ёмкость.
                restartPendingReplicas:
                  description: |
                    Число реплик, спецификация которых уже приведена к новому шаблону, но изменения, требующие перезапуска, ещё не применены.
                selector:
                  description: |
                    Строковый селектор меток, публикуемый контроллером для субресурса `scale`; HPA/KEDA читают его самостоятельно.
                updatedReplicas:
                  description: |
                    Число реплик, фактически находящихся на ревизии `desiredTemplateHash` (полностью синхронизированных).
