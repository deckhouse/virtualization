spec:
  versions:
    - name: v1alpha2
      schema:
        openAPIV3Schema:
          description: |
            VirtualMachinePool декларативно управляет группой одинаковых виртуальных машин: поддерживает заданное число реплик, масштабируется через стандартный субресурс `scale` и переиспользует «тяжёлые» диски между поколениями реплик.

            Ресурс доступен только в платных редакциях (EE/SE+) и требует включения feature gate `VirtualMachinePool`.
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            spec:
              description: |
                Желаемое состояние пула виртуальных машин.
              properties:
                replicas:
                  description: |
                    Желаемое число виртуальных машин в пуле.

                    Поле пишет только его владелец — автоскейлер или человек через субресурс `scale`, либо обработчик адресного сжатия. Контроллер его не изменяет. Границы удерживает автоскейлер; жёсткий потолок — ResourceQuota неймспейса.
                scaleDownPolicy:
                  description: |
                    Определяет, какая реплика удаляется при безадресном сжатии пула через субресурс `scale`. Поле обязательно и не имеет значения по умолчанию — выбор делается осознанно.

                    * `NewestFirst` — безадресное сжатие разрешено; первыми удаляются самые молодые реплики (с наименьшим накопленным состоянием).
                    * `OldestFirst` — безадресное сжатие разрешено; первыми удаляются самые старые реплики (быстрая ротация).
                    * `Explicit` — безадресное сжатие через `scale` отклоняется validating-вебхуком; реплики убираются только по имени. Для «занятых» нагрузок, например раннеров CI и VDI.
                virtualDiskTemplates:
                  description: |
                    Описание дисков на каждую реплику и, по их порядку, block-девайсов реплики — первый шаблон является загрузочным устройством. Это единственный источник дисков реплики: в `virtualMachineTemplate` поля `blockDeviceRefs` нет, контроллер строит его сам из этих шаблонов. Диск с политикой возврата `Delete` принадлежит своей виртуальной машине и удаляется вместе с ней; диск с политикой `Retain` принадлежит пулу, переживает реплику и переиспользуется при последующем scale-up.
                  items:
                    description: |
                      Описание диска на одну реплику.
                    properties:
                      name:
                        description: |
                          Имя шаблона диска в пуле. DNS-1123 label (без точек), так как встраивается в имена VirtualDisk.
                      reclaim:
                        description: |
                          Управляет судьбой диска при удалении его реплики.
                        properties:
                          keep:
                            description: |
                              Сколько свободных (`Retain`) дисков всегда держать в резерве для быстрого масштабирования вверх; на них не распространяется `ttl`. Имеет смысл только с `Retain`.
                          onScaleDown:
                            description: |
                              `Delete` (по умолчанию) — диск удаляется вместе с репликой; `Retain` — диск сохраняется и переиспользуется.
                          ttl:
                            description: |
                              Время жизни свободного диска сверх резервного буфера, после которого он удаляется сборщиком мусора. Имеет смысл только с `Retain`.
                      spec:
                        description: |
                          Спецификация диска (см. [VirtualDisk](cr.html#virtualdisk)).
                        properties:
                          dataSource:
                            properties:
                              containerImage:
                                description:
                                  Use an image stored in an external container
                                  registry. Only registries with enabled TLS are supported.
                                  To provide a custom Certificate Authority (CA) chain,
                                  use the `caBundle` field.
                                properties:
                                  caBundle:
                                    description:
                                      CA chain in Base64 format to verify
                                      the container registry.
                                  image:
                                    description:
                                      Path to the image in the container
                                      registry.
                                  imagePullSecret:
                                    properties:
                                      name:
                                        description:
                                          Name of the secret keeping container
                                          registry credentials, which must be located
                                          in the same namespace.
                              http:
                                description: |-
                                  Fill the image with data from an external URL. The following schemas are supported:

                                  * HTTP
                                  * HTTPS

                                  For HTTPS schema, there is an option to skip the TLS verification.
                                properties:
                                  caBundle:
                                    description:
                                      CA chain in Base64 format to verify
                                      the URL.
                                  checksum:
                                    description:
                                      Checksum to verify integrity and consistency
                                      of the downloaded file. The file must match all
                                      specified checksums.
                                  url:
                                    description: |-
                                      URL of the file for creating an image. The following file formats are supported:
                                      * qcow2
                                      * vmdk
                                      * vdi
                                      * iso
                                      * raw
                                      The file can be compressed into an archive in one of the following formats:
                                      * gz
                                      * xz
                              objectRef:
                                description:
                                  Use an existing VirtualImage, ClusterVirtualImage,
                                  or VirtualDiskSnapshot resource to create a disk.
                                properties:
                                  kind:
                                    description:
                                      Kind of the existing VirtualImage,
                                      ClusterVirtualImage, or VirtualDiskSnapshot resource.
                                  name:
                                    description:
                                      Name of the existing VirtualImage,
                                      ClusterVirtualImage, or VirtualDiskSnapshot resource.
                              type:
                                description: |-
                                  The following image sources are available for creating an image:

                                  * `HTTP`: From a file published on an HTTP/HTTPS service at a given URL.
                                  * `ContainerImage`: From another image stored in a container registry.
                                  * `ObjectRef`: From an existing resource.
                                  * `Upload`: From data uploaded by the user via a special interface.
                          persistentVolumeClaim:
                            description: Settings for creating PVCs to store the disk.
                            properties:
                              size:
                                description: |-
                                  Desired size for PVC to store the disk. If the disk is created from an image, the size must be at least as large as the original unpacked image.

                                  This parameter can be omitted if the `.spec.dataSource` section is filled out. In this case, the controller will determine the disk size automatically, based on the size of the extracted image from the source specified in `.spec.dataSource`.
                              storageClassName:
                                description: |-
                                  StorageClass name required by the claim. For details on using StorageClass for PVC, refer to https://kubernetes.io/docs/concepts/storage/persistent-volumes#class-1.

                                  When creating disks, the user can specify the required StorageClass. If not specified, the default StorageClass will be used.

                                  The disk features and virtual machine behavior depend on the selected StorageClass.

                                  The `VolumeBindingMode` parameter in the StorageClass affects the disk creation process. The following values are allowed:
                                  - `Immediate`: The disk will be created and becomes available for use immediately after creation.
                                  - `WaitForFirstConsumer`: The disk will be created when first used on the node where the virtual machine will be started.

                                  StorageClass supports multiple storage settings:
                                  - Creating a block device (`Block`) or file system (`FileSystem`).
                                  - Multiple access (`ReadWriteMany`) or single access (`ReadWriteOnce`). The `ReadWriteMany` disks support multiple access, which enables a "live" migration of virtual machines. In contrast, the `ReadWriteOnce` disks, which can be accessed from only one node, don't have this feature.

                                  For known storage types, Deckhouse automatically determines the most efficient settings when creating disks (by priority, in descending order):
                                  1. `Block` + `ReadWriteMany`
                                  2. `FileSystem` + `ReadWriteMany`
                                  3. `Block` + `ReadWriteOnce`
                                  4. `FileSystem` + `ReadWriteOnce`
                virtualMachineTemplate:
                  description: |
                    Шаблон, из которого создаётся каждая реплика. Поле `spec` совпадает со спецификацией VirtualMachine, поэтому реплика ничем не отличается от вручную созданной виртуальной машины.
                  properties:
                    metadata:
                      description: |
                        Метаданные, применяемые к каждой реплике. Произвольные пользовательские лейблы и аннотации разрешены; управляемые лейблы пула контроллер добавляет поверх них.
                    spec:
                      description: |
                        Спецификация виртуальной машины, из которой создаётся каждая реплика (обычный VirtualMachineSpec, см. [VirtualMachine](cr.html#virtualmachine)).
                      properties:
                        affinity:
                          description: |
                            [По аналогии](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity), как и в параметре подов `spec.affinity` в Kubernetes.

                            Настройка `affinity` полностью аналогична приведённой выше документации, за исключением названий некоторых параметров. Используются следующие аналоги:

                            * `podAffinity` -> `virtualMachineAndPodAffinity`;
                            * `podAffinityTerm` -> `virtualMachineAndPodAffinityTerm`.
                          properties:
                            nodeAffinity:
                              description: Описывает affinity-правила узлов для ВМ.
                              properties:
                                preferredDuringSchedulingIgnoredDuringExecution:
                                  description:
                                    "Планировщик предпочтёт размещать поды
                                    на узлах, удовлетворяющих affinity-выражениям из
                                    этого поля, но может выбрать и узел, нарушающий
                                    одно или несколько выражений. Наиболее предпочтителен
                                    узел с наибольшей суммой весов: для каждого узла,
                                    удовлетворяющего всем требованиям планирования (запрос
                                    ресурсов, обязательные affinity-выражения и т. п.),
                                    сумма вычисляется перебором элементов этого поля
                                    с прибавлением «веса», если узел соответствует соответствующим
                                    matchExpressions; узлы с наибольшей суммой наиболее
                                    предпочтительны."
                                  items:
                                    description:
                                      Пустой предпочитаемый терм планирования
                                      соответствует всем объектам с неявным весом 0
                                      (то есть ничего не делает). Терм со значением
                                      null не соответствует ни одному объекту (также
                                      ничего не делает).
                                    properties:
                                      preference:
                                        description:
                                          Терм селектора узлов, связанный
                                          с соответствующим весом.
                                        properties:
                                          matchExpressions:
                                            description:
                                              Список требований селектора
                                              узлов по меткам узла.
                                            items:
                                              description:
                                                Требование селектора узлов
                                                — это селектор, содержащий ключ, набор
                                                значений и оператор, связывающий ключ
                                                со значениями.
                                              properties:
                                                key:
                                                  description:
                                                    Ключ метки, к которому
                                                    применяется селектор.
                                                operator:
                                                  description:
                                                    "Задаёт отношение ключа
                                                    к набору значений. Допустимые операторы:
                                                    In, NotIn, Exists, DoesNotExist,
                                                    Gt и Lt."
                                                values:
                                                  description:
                                                    Массив строковых значений.
                                                    Для операторов In и NotIn массив
                                                    должен быть непустым; для Exists
                                                    и DoesNotExist — пустым; для Gt
                                                    и Lt — содержать ровно один элемент,
                                                    интерпретируемый как целое число.
                                                    При strategic merge patch массив
                                                    заменяется целиком.
                                          matchFields:
                                            description:
                                              Список требований селектора
                                              узлов по полям узла.
                                            items:
                                              description:
                                                Требование селектора узлов
                                                — это селектор, содержащий ключ, набор
                                                значений и оператор, связывающий ключ
                                                со значениями.
                                              properties:
                                                key:
                                                  description:
                                                    Ключ метки, к которому
                                                    применяется селектор.
                                                operator:
                                                  description:
                                                    "Задаёт отношение ключа
                                                    к набору значений. Допустимые операторы:
                                                    In, NotIn, Exists, DoesNotExist,
                                                    Gt и Lt."
                                                values:
                                                  description:
                                                    Массив строковых значений.
                                                    Для операторов In и NotIn массив
                                                    должен быть непустым; для Exists
                                                    и DoesNotExist — пустым; для Gt
                                                    и Lt — содержать ровно один элемент,
                                                    интерпретируемый как целое число.
                                                    При strategic merge patch массив
                                                    заменяется целиком.
                                      weight:
                                        description:
                                          Вес, связанный с соответствием
                                          данному nodeSelectorTerm, в диапазоне 1–100.
                                requiredDuringSchedulingIgnoredDuringExecution:
                                  description:
                                    Если заданные этим полем требования affinity
                                    не выполнены на момент планирования, под не будет
                                    размещён на узле. Если они перестают выполняться
                                    во время работы пода (например, из-за обновления),
                                    система может как попытаться в итоге вытеснить под
                                    с узла, так и не делать этого.
                                  properties:
                                    nodeSelectorTerms:
                                      description:
                                        Обязательное поле. Список термов
                                        селектора узлов. Термы объединяются по ИЛИ.
                                      items:
                                        description:
                                          Пустой терм селектора узлов или
                                          терм со значением null не соответствует ни
                                          одному объекту. Требования внутри терма объединяются
                                          по И. Тип TopologySelectorTerm реализует подмножество
                                          NodeSelectorTerm.
                                        properties:
                                          matchExpressions:
                                            description:
                                              Список требований селектора
                                              узлов по меткам узла.
                                            items:
                                              description:
                                                Требование селектора узлов
                                                — это селектор, содержащий ключ, набор
                                                значений и оператор, связывающий ключ
                                                со значениями.
                                              properties:
                                                key:
                                                  description:
                                                    Ключ метки, к которому
                                                    применяется селектор.
                                                operator:
                                                  description:
                                                    "Задаёт отношение ключа
                                                    к набору значений. Допустимые операторы:
                                                    In, NotIn, Exists, DoesNotExist,
                                                    Gt и Lt."
                                                values:
                                                  description:
                                                    Массив строковых значений.
                                                    Для операторов In и NotIn массив
                                                    должен быть непустым; для Exists
                                                    и DoesNotExist — пустым; для Gt
                                                    и Lt — содержать ровно один элемент,
                                                    интерпретируемый как целое число.
                                                    При strategic merge patch массив
                                                    заменяется целиком.
                                          matchFields:
                                            description:
                                              Список требований селектора
                                              узлов по полям узла.
                                            items:
                                              description:
                                                Требование селектора узлов
                                                — это селектор, содержащий ключ, набор
                                                значений и оператор, связывающий ключ
                                                со значениями.
                                              properties:
                                                key:
                                                  description:
                                                    Ключ метки, к которому
                                                    применяется селектор.
                                                operator:
                                                  description:
                                                    "Задаёт отношение ключа
                                                    к набору значений. Допустимые операторы:
                                                    In, NotIn, Exists, DoesNotExist,
                                                    Gt и Lt."
                                                values:
                                                  description:
                                                    Массив строковых значений.
                                                    Для операторов In и NotIn массив
                                                    должен быть непустым; для Exists
                                                    и DoesNotExist — пустым; для Gt
                                                    и Lt — содержать ровно один элемент,
                                                    интерпретируемый как целое число.
                                                    При strategic merge patch массив
                                                    заменяется целиком.
                            virtualMachineAndPodAffinity:
                              properties:
                                preferredDuringSchedulingIgnoredDuringExecution:
                                  items:
                                    properties:
                                      virtualMachineAndPodAffinityTerm:
                                        description:
                                          Обязательное поле. Терм affinity
                                          виртуальных машин, связанный с соответствующим
                                          весом.
                                        properties:
                                          labelSelector:
                                            description:
                                              Селектор меток — это запрос
                                              по меткам к набору ресурсов. Результаты
                                              matchLabels и matchExpressions объединяются
                                              по И. Пустой селектор соответствует всем
                                              объектам, селектор со значением null —
                                              ни одному.
                                            properties:
                                              matchExpressions:
                                                description:
                                                  matchExpressions — список
                                                  требований селектора меток. Требования
                                                  объединяются по И.
                                                items:
                                                  description:
                                                    Требование селектора
                                                    меток — это селектор, содержащий
                                                    ключ, набор значений и оператор,
                                                    связывающий ключ со значениями.
                                                  properties:
                                                    key:
                                                      description:
                                                        key — ключ метки,
                                                        к которому применяется селектор.
                                                    operator:
                                                      description:
                                                        "operator задаёт
                                                        отношение ключа к набору значений.
                                                        Допустимые операторы: In, NotIn,
                                                        Exists и DoesNotExist."
                                                    values:
                                                      description:
                                                        values — массив строковых
                                                        значений. Для операторов In
                                                        и NotIn массив должен быть непустым;
                                                        для Exists и DoesNotExist —
                                                        пустым. При strategic merge
                                                        patch массив заменяется целиком.
                                              matchLabels:
                                                description:
                                                  matchLabels — набор пар
                                                  {ключ, значение}. Одна пара {ключ,
                                                  значение} эквивалентна элементу matchExpressions
                                                  с полем key = «ключ», оператором In
                                                  и массивом values, содержащим только
                                                  «значение». Требования объединяются
                                                  по И.
                                          namespaceSelector:
                                            description:
                                              Селектор меток — это запрос
                                              по меткам к набору ресурсов. Результаты
                                              matchLabels и matchExpressions объединяются
                                              по И. Пустой селектор соответствует всем
                                              объектам, селектор со значением null —
                                              ни одному.
                                            properties:
                                              matchExpressions:
                                                description:
                                                  matchExpressions — список
                                                  требований селектора меток. Требования
                                                  объединяются по И.
                                                items:
                                                  description:
                                                    Требование селектора
                                                    меток — это селектор, содержащий
                                                    ключ, набор значений и оператор,
                                                    связывающий ключ со значениями.
                                                  properties:
                                                    key:
                                                      description:
                                                        key — ключ метки,
                                                        к которому применяется селектор.
                                                    operator:
                                                      description:
                                                        "operator задаёт
                                                        отношение ключа к набору значений.
                                                        Допустимые операторы: In, NotIn,
                                                        Exists и DoesNotExist."
                                                    values:
                                                      description:
                                                        values — массив строковых
                                                        значений. Для операторов In
                                                        и NotIn массив должен быть непустым;
                                                        для Exists и DoesNotExist —
                                                        пустым. При strategic merge
                                                        patch массив заменяется целиком.
                                              matchLabels:
                                                description:
                                                  matchLabels — набор пар
                                                  {ключ, значение}. Одна пара {ключ,
                                                  значение} эквивалентна элементу matchExpressions
                                                  с полем key = «ключ», оператором In
                                                  и массивом values, содержащим только
                                                  «значение». Требования объединяются
                                                  по И.
                                      weight:
                                        description:
                                          Вес, связанный с соответствием
                                          данному vmAndPodAffinityTerm, в диапазоне
                                          1–100.
                                requiredDuringSchedulingIgnoredDuringExecution:
                                  items:
                                    properties:
                                      labelSelector:
                                        description:
                                          Селектор меток — это запрос по
                                          меткам к набору ресурсов. Результаты matchLabels
                                          и matchExpressions объединяются по И. Пустой
                                          селектор соответствует всем объектам, селектор
                                          со значением null — ни одному.
                                        properties:
                                          matchExpressions:
                                            description:
                                              matchExpressions — список требований
                                              селектора меток. Требования объединяются
                                              по И.
                                            items:
                                              description:
                                                Требование селектора меток
                                                — это селектор, содержащий ключ, набор
                                                значений и оператор, связывающий ключ
                                                со значениями.
                                              properties:
                                                key:
                                                  description:
                                                    key — ключ метки, к которому
                                                    применяется селектор.
                                                operator:
                                                  description:
                                                    "operator задаёт отношение
                                                    ключа к набору значений. Допустимые
                                                    операторы: In, NotIn, Exists и DoesNotExist."
                                                values:
                                                  description:
                                                    values — массив строковых
                                                    значений. Для операторов In и NotIn
                                                    массив должен быть непустым; для
                                                    Exists и DoesNotExist — пустым.
                                                    При strategic merge patch массив
                                                    заменяется целиком.
                                          matchLabels:
                                            description:
                                              matchLabels — набор пар {ключ,
                                              значение}. Одна пара {ключ, значение}
                                              эквивалентна элементу matchExpressions
                                              с полем key = «ключ», оператором In и
