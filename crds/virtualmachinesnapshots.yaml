      - vmsnapshots
    singular: virtualmachinesnapshot
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - description: VirtualMachineSnapshot phase.
          jsonPath: .status.phase
          name: Phase
          type: string
        - description: VirtualMachineSnapshot consistency.
          jsonPath: .status.consistent
          name: Consistent
          type: boolean
        - description: VirtualMachineSnapshot age.
          jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      name: v1alpha2
      schema:
        openAPIV3Schema:
          description:
            Provides a resource for creating snapshots of virtual machines.
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                Must be written in CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              properties:
                keepIPAddress:
                  default: Always
                  description: |-
                    Defines whether to keep the IP address of a virtual machine or not:

                    * `Always`: When creating a snapshot, the virtual machine's IP address will be converted from `Auto` to `Static` and saved.
                    * `Never`: When creating a snapshot, the virtual machine's IP address won't be converted.
                  enum:
                    - Always
                    - Never
                  type: string
                requiredConsistency:
                  default: true
                  description: |-
                    Create a virtual machine snapshot only if it's possible to freeze it through an agent.

                    If set to `True`, the virtual machine snapshot will be created only in the following cases:
                    - When the virtual machine is powered off.
                    - When the virtual machine has an agent, and the freeze operation was successful.
                  type: boolean
                virtualMachineName:
                  description: Virtual machine name to take a snapshot of.
                  minLength: 1
                  type: string
                volumeSnapshotClasses:
                  items:
                    description:
                      Sets up a correspondence between a StorageClass and VolumeSnapshotClass.
                    properties:
                      storageClassName:
                        description: StorageClass name associated with the specified VolumeSnapshotClass resource.
                        type: string
                      volumeSnapshotClassName:
                        description:
                          VolumeSnapshotClass resource name to use for virtual disk snapshotting with a corresponding storage class.
                        type: string
                    required:
                      - storageClassName
                      - volumeSnapshotClassName
                    type: object
                  type: array
              required:
                - keepIPAddress
                - requiredConsistency
                - virtualMachineName
              type: object
            status:
              properties:
                conditions:
