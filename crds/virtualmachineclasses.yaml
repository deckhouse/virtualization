---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
  labels:
    backup.deckhouse.io/cluster-config: "true"
    heritage: deckhouse
    module: virtualization
  name: virtualmachineclasses.virtualization.deckhouse.io
spec:
  group: virtualization.deckhouse.io
  names:
    categories:
      - virtualization
    kind: VirtualMachineClass
    listKind: VirtualMachineClassList
    plural: virtualmachineclasses
    shortNames:
      - vmc
      - vmcs
      - vmclass
      - vmclasses
    singular: virtualmachineclass
  scope: Cluster
  versions:
    - additionalPrinterColumns:
        - description: VirtualMachineClass phase.
          jsonPath: .status.phase
          name: Phase
          type: string
        - description: Time of resource creation.
          jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      name: v1alpha2
      schema:
        openAPIV3Schema:
          description: |-
            Describes the following:
            - Virtual CPU requirements.
            - Requirements to virtual machine (VM) placement on nodes.
            - VM resource sizing policy.

            This resource can't be deleted as long as it's used at least in one of the VMs.
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                Must be written in CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              properties:
                cpu:
                  description: Section describing virtual CPU requirements.
                  properties:
                    discovery:
                      description: |-
                        Create a universal virtual CPU model based on a set of instructions
                        supported by all physical CPUs on selected nodes.

                        For example, there are three nodes with physical CPUs on each one, with different instruction sets.
                        The instruction set of a physical CPU node 1: `[f1, f2, f3, f4]`, for node 2: `[f1, f2]`, and for node 3: `[f1, f2, f3]`.
                        To create a universal CPU model for these nodes, you have to combine the instructions common for all nodes, meaning `[f1, f2]`.
                        As a result, you get a virtual CPU with the following instruction set: `[f1, f2]`.
                      properties:
                        nodeSelector:
                          description:
                            Selection of nodes that will be the basis
                            for a created universal CPU model.
                          properties:
                            matchExpressions:
                              description:
                                List of label selectors. Selector requirements are combined, meaning all listed conditions must be met.
                                A label is defined as a `key = value` pair.
                              items:
                                description: |-
                                  Label selector description.
                                properties:
                                  key:
                                    description:
                                      Label key name that the selector
                                      applies to.
                                    type: string
                                  operator:
                                    description: |-
                                      Defines a label key relationship to its value set.
                                      The valid operators are `In`, `NotIn`, `Exists` and `DoesNotExist`:

                                      `In`: The label key value is included in the set label list of `values`.
                                      `NotIn`: The label key value isn't included in the set label list of `values`.
                                      `Exist`: The label key exists.
                                      `DoesNotExist`: The label key doesn't exist.
                                    type: string
                                  values:
                                    description: |-
                                      Inline list of values. If the selected operator is `In` or `NotIn`,
                                      the list must not be empty. If the operator is `Exists` or `DoesNotExist`,
                                      the list must be empty.
                                    items:
                                      type: string
                                    type: array
                                required:
                                  - key
                                  - operator
                                type: object
                              type: array
                            matchLabels:
                              additionalProperties:
                                type: string
                              description: |-
                                Map of `key=value` pairs. A single `key=value` pair for `matchLabels`
                                equals a `matchExpressions` element. The key field of the `matchExpressions` element is `key`, the operator is `In`, and the list of values contains only the `value` items.
                                
                                For a selection under this criterion, all values are logically summed.
                              type: object
                          type: object
                          x-kubernetes-map-type: atomic
                      type: object
                    features:
                      description: |-
                        List of CPU instructions.
                        [More information about the supported instructions](https://libvirt.org/formatdomain.html#cpu-model-and-topology).
                      example:
                        - mmx
                        - vmx
                        - sse2
                      items:
                        type: string
                      minItems: 1
                      type: array
                    model:
                      description:
                        CPU model name. [More information about models](https://libvirt.org/formatdomain.html#cpu-model-and-topology).
                      example: IvyBridge
                      minLength: 1
                      type: string
                    type:
                      description: |-
                        Defines the resource type. Supported options:

                        * `Host`: Uses a virtual CPU with an instruction set closely matching the platform node's CPU.
                        This provides high performance and functionality, as well as compatibility with "live" migration for nodes with similar processor types.
                        For example, VM migration between nodes with Intel and AMD processors will not work.
                        This is also true for different CPU generations, as their instruction set is different.
                        * `HostPassthrough`: Uses the platform node's physical CPU directly, without any modifications.
                        When using this class, the guest VM can only be transferred to a target node with a CPU exactly matching the source node's CPU.
                        * `Discovery`: Create a virtual CPU based on instruction sets of physical CPUs for a selected set of nodes.
                        * `Model`: CPU model. A CPU model is a named and previously defined set of supported CPU instructions.
                        * `Features`: A required set of supported instructions for the CPU.
                      enum:
                        - Host
                        - HostPassthrough
                        - Discovery
                        - Model
                        - Features
                      type: string
                  required:
                    - type
                  type: object
                  x-kubernetes-validations:
                    - message: `.spec.cpu` is immutable.
                      rule: self == oldSelf
                    - message:
                        HostPassthrough and Host cannot have model, features, or
                        discovery.
                      rule:
                        "self.type == 'HostPassthrough' || self.type == 'Host'
                        ? !has(self.model) && !has(self.features) && !has(self.discovery)
                        : true"
                    - message: Discovery cannot have model or features.
                      rule:
                        "self.type == 'Discovery' ? !has(self.model) && !has(self.features)
                        : true"
                    - message: Model requires model and cannot have features or discovery.
                      rule:
                        "self.type == 'Model' ? has(self.model) && !has(self.features)
                        && !has(self.discovery) : true"
                    - message: Features requires features and cannot have model or discovery.
                      rule:
                        "self.type == 'Features' ? has(self.features) && !has(self.model)
                        && !has(self.discovery): true"
                nodeSelector:
                  description:
                    Selector of nodes that are allowed for use in VM scheduling.
                  properties:
                    matchExpressions:
                      description: List of label selectors. requirements by node's labels.
                      items:
                        description: |-
                          List of label selectors. Selector requirements are combined, meaning all listed conditions must be met.
                          A label is defined as a `key = value` pair.
                        properties:
                          key:
                            description: Label key name that the selector applies to.
                            type: string
                          operator:
                            description: |-
                              Defines a label key relationship to its value set.
                              The valid operators are `In`, `NotIn`, `Exists` and `DoesNotExist`:

                              `In`: The label key value is included in the set label list of `values`.
                              `NotIn`: The label key value isn't included in the set label list of `values`.
                              `Exist`: The label key exists.
                              `DoesNotExist`: The label key doesn't exist.
                            type: string
                          values:
                            description: |-
                              Inline list of values. If the selected operator is `In` or `NotIn`,
                              the list must not be empty. If the operator is `Exists` or `DoesNotExist`,
                              the list must be empty.
                            items:
                              type: string
                            type: array
                        required:
                          - key
                          - operator
                        type: object
                      type: array
                    matchLabels:
                      additionalProperties:
                        type: string
                      description: |-
                        Map of `key=value` pairs. A single `key=value` pair for `matchLabels`
                        equals a `matchExpressions` element. The key field of the `matchExpressions` element is `key`, the operator is `In`, and the list of values contains only the `value` items.

                        For a selection under this criterion, all values are logically summed.
                      type: object
                  type: object
                sizingPolicies:
                  items:
                    description: |-
                      Defines a policy for allocating computational resources to VMs, structured as a list.
                      The `cores.min` - `cores.max` ranges for different elements of the list must not overlap.
                    properties:
                      coreFractions:
                        description: Allowed values of the `coreFraction` parameter.
                        items:
                          maximum: 100
                          minimum: 1
                          type: integer
                        type: array
                      cores:
                        description:
                          Policy applies for a specified range of the
                          number of CPU cores.
                        properties:
                          max:
                            description: Maximum number of CPU cores.
                            example: 10
                            maximum: 1024
                            type: integer
                          min:
                            description: Minimum number of CPU cores.
                            example: 1
                            minimum: 1
                            type: integer
                          step:
                            description:
                              Discretization step for the CPU core number.
                            example: 1
                            minimum: 1
                            type: integer
                        required:
                          - max
                          - min
                        type: object
                        x-kubernetes-validations:
                          - message: The maximum must be greater than the minimum.
                            rule: self.max > self.min
                          - message: The maximum must be greater than the step.
                            rule: "has(self.step) ? self.max > self.step : true"
                      dedicatedCores:
                        description: Allowed values of the `dedicatedCores` parameter.
                        items:
                          type: boolean
                        type: array
                      memory:
                        description: Memory-sizing policy.
                        properties:
                          max:
                            anyOf:
                              - type: integer
                              - type: string
                            description: Maximum amount of memory.
                            example: 8Gi
                            pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                            x-kubernetes-int-or-string: true
                          min:
                            anyOf:
                              - type: integer
                              - type: string
                            description: Minimum amount of memory.
                            example: 1Gi
                            pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                            x-kubernetes-int-or-string: true
                          perCore:
                            description: Amount of memory per a CPU core.
                            properties:
                              max:
                                anyOf:
                                  - type: integer
                                  - type: string
                                description: Maximum amount of memory.
                                example: 8Gi
                                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                x-kubernetes-int-or-string: true
                              min:
                                anyOf:
                                  - type: integer
                                  - type: string
                                description: Minimum amount of memory.
                                example: 1Gi
                                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                x-kubernetes-int-or-string: true
                            type: object
                          step:
                            anyOf:
                              - type: integer
                              - type: string
                            description:
                              Discretization step for the amount of memory.
                            example: 512Mi
                            pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                            x-kubernetes-int-or-string: true
                        type: object
                    type: object
                  type: array
                tolerations:
                  description: |-
                    Tolerations are the same as `spec.tolerations` for pods. [About taints and tolerations](https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/).
                    These tolerations will be merged with the tolerations specified in the VirtualMachine resource. VirtualMachine tolerations have a higher priority.
                  items:
                    description: |-
                      The pod this toleration is attached to tolerates any taint that matches
                      the triple <key,value,effect> using the matching operator <operator>.
                    properties:
                      effect:
                        description: |-
                          Effect indicates the taint effect to match. If empty, it means matching all taint effects.
                          When specified, allowed values are `NoSchedule`, `PreferNoSchedule`, and `NoExecute`.
                        type: string
                      key:
                        description: |-
                          Key is the taint key that the toleration applies to. If empty, it means matching all taint keys.
                          If the key is empty, the operator must be `Exists`; this combination means to match all values and all keys.
                        type: string
                      operator:
                        description: |-
                          Represents a key's relationship to the value.
                          Valid operators are `Exists` and `Equal`. The default is `Equal`.
                          `Exists` is equivalent to a wildcard for value, so that a pod can
                          tolerate all taints of a particular category.
                        type: string
                      tolerationSeconds:
                        description: |-
                          Represents a period of time the toleration (which must be
                          of the `NoExecute` effect, otherwise this field is ignored) tolerates the taint. By default,
                          it's not set, which means tolerating the taint forever (do not evict). Zero and
                          negative values will be treated by the system as `0` (evict immediately).
                        format: int64
                        type: integer
                      value:
                        description: |-
                          Taint value the toleration matches to.
                          If the operator is `Exists`, the value must be empty. Otherwise, just a regular string.
                        type: string
                    type: object
                  type: array
              required:
                - cpu
              type: object
            status:
              properties:
                availableNodes:
                  description: |-
                    List of nodes that support this CPU model.
                    Not displayed for the following types: `Host`, `HostPassthrough`.
                  example:
                    - node-1
                    - node-2
                  items:
                    type: string
                  type: array
                conditions:
                  description:
                    Last confirmed status of the resource.
                  items:
                    description:
                      Details of a single aspect of the current
                      state for this API resource.
                    properties:
                      lastTransitionTime:
                        description: |-
                          Last time the condition transitioned from one status to another.
                        format: date-time
                        type: string
                      message:
                        description: |-
                          Human-readable message with details about the last transition.
                        maxLength: 32768
                        type: string
                      observedGeneration:
                        description: |-
                          `.metadata.generation` the condition was based upon.
                          For instance, if `.metadata.generation` is currently `12` but `.status.conditions[x].observedGeneration` is `9`, the condition is considered outdated.
                        format: int64
                        minimum: 0
                        type: integer
                      reason:
                        description: |-
                          Brief reason for the condition's last transition.
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                        type: string
                      status:
                        description: |-
                          Condition status. Possible values: `True`, `False`, or `Unknown`.
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                        type: string
                      type:
                        description: Condition type.
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                        type: string
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    type: object
                  type: array
                cpuFeatures:
                  description: |-
                    Information on CPU instruction sets supported by this model.
                    Displayed only when `type=Features`.
                  properties:
                    enabled:
                      description: List of CPU instruction sets for this model.
                      example:
                        - mmx
                        - vmx
                        - sse2
                      items:
                        type: string
                      type: array
                    notEnabledCommon:
                      description:
                        List of unused CPU instructions,
                        additionally available for this node group.
                      example:
                        - ssse3
                        - vme
                      items:
                        type: string
                      type: array
                  type: object
                maxAllocatableResources:
                  additionalProperties:
                    anyOf:
                      - type: integer
                      - type: string
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  description:
                    Maximum amount of free CPU and memory resources observed
                    among all available nodes.
                  example:
                    - 'maxAllocatableResources: {"cpu": 1, "memory": "10Gi"}'
                  type: object
                observedGeneration:
                  description: Resource generation last processed by the controller.
                  format: int64
                  type: integer
                phase:
                  description: |-
                    Current resource status:

                    * `Pending`: The resource isn't ready and waits until suitable nodes supporting the required CPU model become available.
                    * `Ready`: The resource is ready and available for use.
                    * `Terminating`: The resource is being deleted.
                  enum:
                    - Pending
                    - Ready
                    - Terminating
                  type: string
              required:
                - phase
              type: object
          required:
            - spec
          type: object
      served: true
      storage: true
      subresources:
        status: {}
